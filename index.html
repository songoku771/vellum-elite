<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vellum Elite - Premium 4K & Live Wallpapers</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b0f19; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px rgba(255, 255, 255, 0.05) solid; }
        .pinterest-grid { columns: 2; column-gap: 16px; }
        @media (min-width: 640px) { .pinterest-grid { columns: 3; } }
        @media (min-width: 1024px) { .pinterest-grid { columns: 4; } }
        @media (min-width: 1280px) { .pinterest-grid { columns: 5; } }
        .pin-card { break-inside: avoid; margin-bottom: 16px; display: inline-block; width: 100%; }
    </style>
</head>
<body>

    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center space-x-2 cursor-pointer" onclick="location.reload()">
            <i class="fa-solid fa-wand-magic-sparkles text-amber-400 text-2xl"></i>
            <span class="text-xl font-black tracking-wider bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent">VELLUM ELITE</span>
        </div>
        <div id="authStatus" class="flex items-center space-x-4">
            <button onclick="openAuthModal('login')" class="px-5 py-2.5 rounded-xl bg-gradient-to-r from-amber-500 to-orange-600 font-bold text-sm shadow-md hover:opacity-90 transition-all cursor-pointer">Login / Sign Up</button>
        </div>
    </nav>

    <header class="text-center py-12 px-4">
        <h1 class="text-4xl md:text-5xl font-black mb-4 tracking-tight"><i class="fa-solid fa-bolt text-amber-400 mr-2"></i>PREMIUM WALLPAPERS</h1>
        <p class="text-slate-400 max-w-xl mx-auto">High-refresh-rate ultra premium wallpapers dashboard synced with real-time cloud database.</p>
    </header>

    <main class="max-w-[1600px] mx-auto px-4 md:px-8 pb-24">
        <div class="pinterest-grid" id="wallpaperContainer">
            <div class="text-center col-span-full py-12 text-slate-500" id="loadingText">
                <i class="fa-solid fa-spinner fa-spin text-2xl mb-2 text-amber-400"></i><br>Connecting Secure Database...
            </div>
        </div>
    </main>

    <div id="authModal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden z-50 flex items-center justify-center p-4">
        <div class="w-full max-w-md glass p-8 rounded-3xl relative shadow-2xl">
            <button onclick="closeAuthModal()" class="absolute top-5 right-5 text-slate-400 hover:text-white cursor-pointer"><i class="fa-solid fa-xmark text-xl"></i></button>
            <h2 id="modalTitle" class="text-2xl font-black text-center mb-6 tracking-wide text-amber-400">LOGIN TO VELLUM</h2>
            <form id="authForm" class="space-y-4">
                <div>
                    <label class="text-xs font-bold tracking-wider text-slate-400 uppercase block mb-2">Email Address</label>
                    <input type="email" id="authEmail" required class="w-full px-4 py-3 rounded-xl bg-slate-900/80 border border-slate-700 text-white focus:outline-none focus:border-amber-400 transition-all" placeholder="yourname@gmail.com">
                </div>
                <div id="passwordField">
                    <label class="text-xs font-bold tracking-wider text-slate-400 uppercase block mb-2">Password</label>
                    <input type="password" id="authPassword" class="w-full px-4 py-3 rounded-xl bg-slate-900/80 border border-slate-700 text-white focus:outline-none focus:border-amber-400 transition-all" placeholder="••••••••">
                    <div class="text-right mt-2">
                        <a href="#" onclick="openAuthModal('forgot')" class="text-xs text-amber-400 hover:underline">Forgot Password?</a>
                    </div>
                </div>
                <button type="submit" id="submitBtn" class="w-full py-3.5 rounded-xl bg-gradient-to-r from-amber-500 to-orange-600 font-black tracking-wide shadow-lg hover:opacity-95 transition-all mt-4 cursor-pointer">Continue <i class="fa-solid fa-arrow-right-to-bracket ml-2"></i></button>
            </form>
            <div class="text-center mt-6 text-sm text-slate-400">
                <span id="switchText">Don't have an account?</span>
                <a href="#" id="switchLink" onclick="toggleAuthMode()" class="text-amber-400 font-bold ml-1 hover:underline">Sign Up Now</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://ezfxgevsjxfyluxprkls.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_jlyevQqezPjFmlqar5pmNw_EV8DTtVL"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log("Supabase Client Status Loaded Successfully!");

        let currentMode = 'login';

        // FETCH FROM DATABASE
        async function fetchWallpapers() {
            const container = document.getElementById('wallpaperContainer');
            const loadingEl = document.getElementById('loadingText');
            
            try {
                if (!container) return;

                const { data: wallpapers, error } = await supabaseClient
                    .from('wallpapers')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                
                if (loadingEl) {
                    loadingEl.style.display = 'none';
                }

                container.innerHTML = '';

                if (!wallpapers || wallpapers.length === 0) {
                    container.innerHTML = `
                        <div class="text-center text-gray-400 col-span-full py-10 w-full">
                            <i class="fa-solid fa-folder-open text-3xl mb-3 text-slate-600"></i>
                            <p>Database is empty. Please add wallpapers in Supabase!</p>
                        </div>`;
                    return;
                }

                wallpapers.forEach(wp => {
                    const card = document.createElement('div');
                    card.className = "pin-card bg-slate-900/60 backdrop-blur-md rounded-2xl border border-slate-800 overflow-hidden hover:border-amber-500/50 transition-all duration-300 group";
                    card.innerHTML = `
                        <div class="relative w-full overflow-hidden bg-slate-950">
                            <img src="${wp.image_url || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe'}" alt="${wp.title}" class="w-full h-auto object-cover group-hover:scale-102 transition-transform duration-500" loading="lazy">
                            <span class="absolute top-3 right-3 bg-slate-950/80 text-amber-400 text-xs font-bold px-2.5 py-1 rounded-full border border-amber-500/30 backdrop-blur-sm">${wp.resolution || '4K Ultra'}</span>
                        </div>
                        <div class="p-4">
                            <h3 class="text-base font-bold text-white mb-1 group-hover:text-amber-400 transition-colors">${wp.title}</h3>
                            <div class="flex items-center justify-between pt-2 mt-2 border-t border-slate-800/60">
                                <div class="flex items-center gap-3 text-slate-400 text-xs">
                                    <span class="flex items-center gap-1"><i class="fa-solid fa-eye"></i> ${wp.views || 0}</span>
                                    <span class="flex items-center gap-1"><i class="fa-solid fa-download"></i> ${wp.downloads || 0}</span>
                                </div>
                                <button onclick="triggerDownload('${wp.id}', '${wp.image_url}', '${wp.title}')" class="bg-gradient-to-r from-amber-500 to-orange-600 text-slate-950 text-xs font-bold px-3 py-1.5 rounded-lg flex items-center gap-1 cursor-pointer transition-transform active:scale-95">
                                    <i class="fa-solid fa-download"></i> Get
                                </button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                console.error('Error fetching wallpapers:', error);
                if (loadingEl) loadingEl.style.display = 'none';
                if (container) container.innerHTML = `<div class="text-center text-red-400 col-span-full py-10 w-full">Database connection failed.</div>`;
            }
        }

        // IMAGE KO DIRECT FORCE DOWNLOAD KARWANE KA FUNCTION
        async function triggerDownload(id, imageUrl, title) {
            try {
                // 1. Database mein counter badhao
                await supabaseClient.rpc('increment_downloads', { row_id: id });
            } catch (e) {
                console.log("Counter update skipped:", e);
            }

            try {
                // 2. Image ko fetch karke blob mein badlo taaki force download ho sake
                const response = await fetch(imageUrl);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `${title.replace(/\s+/g, '_')}_Vellum_4K.jpg`; 
                document.body.appendChild(a);
                a.click();
                
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
            } catch (error) {
                console.error("Direct download blocked by browser cors, opening in new tab:", error);
                window.open(imageUrl, '_blank');
            }
        }

        // Run on load
        window.onload = fetchWallpapers;
    </script>
</body>
</html>
