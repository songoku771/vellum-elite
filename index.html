<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELLUM ELITE | Premium System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght=600;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #0b0f19; 
            color: #f3f4f6; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        /* PREMIUM MASONRY MESH GRID */
        .pinterest-grid {
            column-count: 2;
            column-gap: 16px;
            width: 100%;
        }
        @media (min-width: 640px) { .pinterest-grid { column-count: 3; } }
        @media (min-width: 1024px) { .pinterest-grid { column-count: 5; } }
        @media (min-width: 1280px) { .pinterest-grid { column-count: 6; } }

        .pinterest-card {
            break-inside: avoid;
            margin-bottom: 16px;
            display: inline-block;
            width: 100%;
        }

        .brand-font {
            font-family: 'Cinzel', serif;
            letter-spacing: 0.1em;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#0b0f19] text-gray-200">

    <div id="appGlobalToast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-amber-500 text-neutral-900 text-xs font-bold px-6 py-3 rounded-full shadow-2xl z-[999] opacity-0 pointer-events-none transition-all duration-300 transform translate-y-4">
        <span id="toastMessageText">Notification Log Matrix</span>
    </div>

    <div class="flex min-h-screen w-full">
        
        <aside class="fixed left-0 top-0 h-full w-20 flex flex-col items-center justify-between py-6 bg-[#070a13] border-r border-slate-900/80 z-50">
            <div class="flex flex-col items-center gap-8 w-full">
                <div onclick="forceResetToHomeGrid()" class="w-12 h-12 bg-gradient-to-br from-amber-400 to-amber-600 rounded-xl flex items-center justify-center text-neutral-900 font-extrabold text-base tracking-tighter cursor-pointer shadow-[0_0_15px_rgba(245,158,11,0.3)] brand-font hover:scale-105 transition-transform">
                    VE
                </div>
                
                <div class="flex flex-col items-center gap-6 w-full">
                    <button onclick="forceResetToHomeGrid()" class="w-12 h-12 rounded-xl flex flex-col items-center justify-center text-amber-500 hover:bg-slate-800/40 transition-all gap-1" title="Home">
                        <i class="fa-solid fa-house text-base"></i>
                        <span class="text-[9px] font-medium tracking-wide">Home</span>
                    </button>

                    <button onclick="openLeftSliderUploadEngine()" class="w-12 h-12 rounded-xl flex flex-col items-center justify-center text-slate-400 hover:text-emerald-400 hover:bg-slate-800/40 transition-all gap-1" title="Create Vector">
                        <i class="fa-solid fa-square-plus text-base"></i>
                        <span class="text-[9px] font-medium tracking-wide">Create</span>
                    </button>

                    <button onclick="toggleGlobalNotificationDrawer()" class="w-12 h-12 rounded-xl flex flex-col items-center justify-center text-slate-400 hover:text-gray-100 hover:bg-slate-800/40 relative transition-all gap-1" title="Updates Log">
                        <i class="fa-solid fa-bell text-base"></i>
                        <span class="text-[9px] font-medium tracking-wide">Updates</span>
                        <span class="absolute top-2 right-3 w-1.5 h-1.5 bg-amber-500 rounded-full animate-pulse"></span>
                    </button>

                    <button onclick="navigateToAppSection('boards')" class="w-12 h-12 rounded-xl flex flex-col items-center justify-center text-slate-400 hover:text-gray-100 hover:bg-slate-800/40 transition-all gap-1" title="Analytics System">
                        <i class="fa-solid fa-chart-pie text-base"></i>
                        <span class="text-[9px] font-medium tracking-wide">Analytics</span>
                    </button>
                </div>
            </div>

            <button class="w-12 h-12 rounded-xl flex flex-col items-center justify-center text-slate-500 hover:text-gray-300 transition-all gap-1" title="Settings Panel">
                <i class="fa-solid fa-gear text-base"></i>
                <span class="text-[9px] font-medium tracking-wide">Settings</span>
            </button>
        </aside>

        <div id="updatesDrawerPanel" class="fixed inset-y-0 left-20 w-80 bg-[#070a13] border-r border-slate-900/90 z-40 transform -translate-x-full transition-transform duration-300 ease-out shadow-2xl flex flex-col p-5">
            <div class="flex items-center justify-between border-b border-slate-800 pb-3 mb-4">
                <span class="font-bold text-xs text-gray-400 uppercase tracking-wider">System Live Stream</span>
                <button onclick="toggleGlobalNotificationDrawer()" class="text-slate-500 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="updatesTimelineWrapper" class="flex-1 overflow-y-auto space-y-3 no-scrollbar"></div>
        </div>

        <div id="premiumUploadSideDrawer" class="fixed inset-y-0 left-20 w-88 bg-[#070a13] border-r border-slate-900 z-40 transform -translate-x-full transition-transform duration-300 ease-out shadow-2xl flex flex-col p-6">
            <div class="flex items-center justify-between border-b border-slate-900 pb-4 mb-5">
                <div class="flex flex-col">
                    <span class="font-bold text-xs text-gray-200 uppercase tracking-widest brand-font">Upload Matrix</span>
                    <span class="text-[9px] text-amber-500 font-semibold uppercase tracking-wider mt-0.5">Payload Generator</span>
                </div>
                <button onclick="closeLeftSliderUploadEngine()" class="text-slate-500 hover:text-white bg-slate-900 w-7 h-7 rounded-lg flex items-center justify-center"><i class="fa-solid fa-xmark text-xs"></i></button>
            </div>

            <form onsubmit="handleLocalFormUploadSubmit(event)" class="space-y-5 flex-1 flex flex-col justify-between">
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 tracking-wider">Artwork Label / Title</label>
                        <input type="text" id="formUploadTitle" required class="w-full px-3 py-2.5 bg-[#111827] border border-slate-800 rounded-xl text-xs text-gray-200 focus:outline-none focus:border-amber-500/50 transition-colors" placeholder="e.g. Dark Samurai Core">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 tracking-wider">Payload Design Source</label>
                        <div class="relative w-full h-48 border-2 border-dashed border-slate-800 rounded-2xl flex flex-col items-center justify-center bg-slate-950/40 overflow-hidden cursor-pointer hover:border-amber-500/30 transition-all">
                            <div id="formPromptUploadContainer" class="flex flex-col items-center pointer-events-none">
                                <i class="fa-solid fa-arrow-up-from-bracket text-amber-500 text-xl mb-2"></i>
                                <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Drop or Choose Image</span>
                            </div>
                            <img id="formLiveImagePreview" class="hidden absolute inset-0 w-full h-full object-cover">
                            <input type="file" id="formFileInputTrigger" accept="image/*" required onchange="processLocalFileSelection(this)" class="absolute inset-0 opacity-0 cursor-pointer">
                        </div>
                    </div>
                </div>
                <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-amber-500 to-amber-600 text-neutral-900 font-bold text-xs rounded-xl uppercase tracking-widest shadow-xl hover:brightness-110 transition-all">Publish Vector Asset</button>
            </form>
        </div>

        <div class="flex-1 pl-20 min-w-0 flex flex-col">
            
            <header class="sticky top-0 z-30 px-8 py-4 bg-[#0b0f19]/90 backdrop-blur-md flex items-center justify-between gap-4 border-b border-slate-900/60">
                <div onclick="forceResetToHomeGrid()" class="brand-font text-base font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-amber-400 to-amber-500 tracking-widest cursor-pointer hidden md:block">
                    VELLUM ELITE.
                </div>

                <div class="flex-1 relative max-w-xl">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="text" id="appSearchEngineInput" oninput="executeLiveSearchQuery()" class="w-full pl-11 pr-4 py-2.5 bg-[#111827] border border-slate-800 rounded-full text-xs text-gray-200 placeholder-slate-500 focus:outline-none focus:border-amber-500/50 transition-colors" placeholder="Search premium matrix designs...">
                </div>
                
                <div class="flex items-center gap-2 relative">
                    <div class="w-8 h-8 rounded-full bg-amber-500/10 border border-amber-500/30 flex items-center justify-center text-amber-400 font-bold text-xs brand-font shadow-[0_0_10px_rgba(245,158,11,0.1)] cursor-pointer">
                        P
                    </div>

                    <button onclick="toggleTopProfileDropdownMenu(event)" class="w-7 h-7 rounded-full flex items-center justify-center hover:bg-slate-800/60 text-slate-400 hover:text-white transition-colors">
                        <i class="fa-solid fa-ellipsis-vertical text-xs"></i>
                    </button>

                    <div id="topProfileDropdownNode" class="hidden absolute right-0 top-10 w-44 bg-[#070a13] border border-slate-800 rounded-xl shadow-2xl py-1.5 z-50">
                        <button onclick="triggerNotificationToast('Profile Matrix Sync Active.')" class="w-full text-left px-3 py-2 text-[10px] font-bold text-gray-300 hover:bg-slate-900 flex items-center gap-2 uppercase tracking-wide border-b border-slate-900"><i class="fa-solid fa-user-gear text-amber-500"></i> Edit Profile</button>
                        <button onclick="navigateToAppSection('boards')" class="w-full text-left px-3 py-2 text-[10px] font-bold text-gray-300 hover:bg-slate-900 flex items-center gap-2 uppercase tracking-wide"><i class="fa-solid fa-images text-amber-500"></i> Active Boards</button>
                        <button onclick="triggerNotificationToast('Profile Link Matrix copied!')" class="w-full text-left px-3 py-2 text-[10px] font-bold text-gray-300 hover:bg-slate-900 flex items-center gap-2 uppercase tracking-wide"><i class="fa-solid fa-arrow-up-right-from-square text-amber-500"></i> Share Profile</button>
                    </div>
                </div>
            </header>

            <div id="dashboardSection" class="w-full flex-1 app-view-block p-6">
                <div id="pinterestMainMasonryContainer" class="pinterest-grid"></div>
            </div>

            <div id="boardsSection" class="hidden w-full flex-1 app-view-block p-8">
                <div class="flex justify-between items-center border-b border-slate-900 pb-6 mb-6">
                    <div>
                        <h1 class="text-xl font-bold text-gray-100 brand-font">Your Saved Ideas</h1>
                        <p class="text-[10px] text-amber-500/70 mt-1 uppercase tracking-wider font-semibold">Active Directories</p>
                    </div>
                    <button onclick="createNewCustomBoardDialog()" class="px-5 py-2.5 bg-gradient-to-r from-amber-500 to-amber-600 text-neutral-900 font-bold text-xs rounded-xl uppercase tracking-wider shadow-lg hover:brightness-110 transition-all">+ Create Custom Board</button>
                </div>
                <div id="customBoardsGridOutput" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6"></div>
            </div>

            <div id="detailSection" class="hidden w-full flex-1 app-view-block p-6">
                <button onclick="triggerBackNavigation()" class="mb-6 px-4 py-2 bg-slate-900 border border-slate-800 text-gray-300 font-bold text-xs rounded-xl flex items-center gap-2 hover:bg-slate-800 transition-all"><i class="fa-solid fa-arrow-left text-amber-500"></i> Back to Grid</button>
                
                <div class="grid grid-cols-1 md:grid-cols-12 gap-8 items-start">
                    <div class="md:col-span-6 bg-slate-950/40 rounded-2xl p-4 flex items-center justify-center border border-slate-900">
                        <img id="detailPreviewImageNode" src="" class="max-w-full max-h-[70vh] object-contain rounded-xl shadow-2xl">
                    </div>

                    <div class="md:col-span-3 bg-[#070a13] border border-slate-900 rounded-xl p-5">
                        <h2 id="detailAssetTitleText" class="text-sm font-bold text-gray-200 mb-4 truncate brand-font tracking-wide">Premium Design Core</h2>
                        <div class="space-y-2">
                            <button id="detailActionDownloadBtn" class="w-full text-left px-4 py-3 text-xs font-bold text-gray-300 bg-slate-900/60 border border-slate-800 hover:border-amber-500/30 rounded-xl flex items-center gap-3 transition-colors"><i class="fa-solid fa-circle-down text-amber-500 text-sm"></i> Download Asset</button>
                            <button id="detailActionSaveBtn" class="w-full text-left px-4 py-3 text-xs font-bold text-gray-300 bg-slate-900/60 border border-slate-800 hover:border-amber-500/30 rounded-xl flex items-center gap-3 transition-colors"><i class="fa-solid fa-folder-plus text-amber-500 text-sm"></i> Pin to Board</button>
                            <button id="detailActionShareBtn" class="w-full text-left px-4 py-3 text-xs font-bold text-gray-300 bg-slate-900/60 border border-slate-800 hover:border-amber-500/30 rounded-xl flex items-center gap-3 transition-colors"><i class="fa-solid fa-link text-amber-500 text-sm"></i> Copy Design URL</button>
                        </div>
                    </div>

                    <div class="md:col-span-3">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-slate-500 block mb-3 pb-1 border-b border-slate-900">Recommended Stream</span>
                        <div id="sideCascadedStreamGrid" class="flex flex-col gap-4 max-h-[65vh] overflow-y-auto no-scrollbar"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://ezfxgevsjxfyluxprkls.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_jlyevQqezPjFmlqar5pmNw_EV8DTtVL"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allAssetsDatabaseMemory = [];
        let navigationHistoryBuffer = [];
        let base64TempImageString = "";
        let currentlyOpenDropdownMenuId = null;

        let localLiveUpdatesTimeline = [
            { id: 101, title: "Take a moment for yourself ❤️", date: "2d ago", img: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=400&q=80" },
            { id: 102, title: "Inspired by you", date: "3d ago", img: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400&q=80" },
            { id: 103, title: "You just get it", date: "4d ago", img: "https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?w=400&q=80" }
        ];

        let customUserAlbumBoards = JSON.parse(localStorage.getItem('lusso_boards_cache')) || {
            "Wallpaper": [], "Anime wallpaper": [], "Skull wallpaper": [], "Japanese art samurai": [], "Art wallpaper": []
        };

        function triggerNotificationToast(msg) {
            const toastNode = document.getElementById('appGlobalToast');
            document.getElementById('toastMessageText').innerText = msg;
            toastNode.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
            setTimeout(() => { toastNode.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4'); }, 2500);
        }

        function navigateToAppSection(targetViewId) {
            document.querySelectorAll('.app-view-block').forEach(view => view.classList.add('hidden'));
            document.getElementById(`${targetViewId}Section`).classList.remove('hidden');
            window.scrollTo({ top: 0 });
            closeAllOpenDrawers();
            if (targetViewId === 'boards') renderCustomUserBoardsMarkup();
        }

        function forceResetToHomeGrid() {
            document.getElementById('appSearchEngineInput').value = ""; 
            navigateToAppSection('dashboard');
            renderPinterestGridItems(allAssetsDatabaseMemory);
        }

        function closeAllOpenDrawers() {
            document.getElementById('updatesDrawerPanel').classList.add('-translate-x-full');
            closeLeftSliderUploadEngine();
            closeAllActiveDropdowns();
        }

        function toggleGlobalNotificationDrawer() {
            const panel = document.getElementById('updatesDrawerPanel');
            const isOpen = !panel.classList.contains('-translate-x-full');
            closeAllOpenDrawers();
            if (!isOpen) panel.classList.remove('-translate-x-full');
        }

        function openLeftSliderUploadEngine() {
            closeAllOpenDrawers();
            document.getElementById('premiumUploadSideDrawer').classList.remove('-translate-x-full');
        }

        function closeLeftSliderUploadEngine() {
            document.getElementById('premiumUploadSideDrawer').classList.add('-translate-x-full');
            document.getElementById('formPromptUploadContainer').classList.remove('hidden');
            document.getElementById('formLiveImagePreview').classList.add('hidden');
            document.getElementById('formUploadTitle').value = "";
            base64TempImageString = "";
        }

        function toggleTopProfileDropdownMenu(e) {
            e.stopPropagation();
            const drop = document.getElementById('topProfileDropdownNode');
            const hidden = drop.classList.contains('hidden');
            closeAllActiveDropdowns();
            if (hidden) drop.classList.remove('hidden');
        }

        function closeAllActiveDropdowns() {
            document.querySelectorAll('.dropdown-menu-list').forEach(m => m.classList.add('hidden'));
            document.getElementById('topProfileDropdownNode').classList.add('hidden');
            currentlyOpenDropdownMenuId = null;
        }

        function refreshLiveUpdatesDrawerTimeline() {
            const wrapper = document.getElementById('updatesTimelineWrapper');
            wrapper.innerHTML = "";
            localLiveUpdatesTimeline.forEach(item => {
                wrapper.innerHTML += `
                    <div class="p-2 bg-slate-900/40 hover:bg-slate-900 rounded-xl flex gap-3 items-center border border-slate-900 transition-colors">
                        <img src="${item.img}" class="w-10 h-12 object-cover rounded-md flex-shrink-0 bg-slate-800">
                        <div class="min-w-0 flex-1">
                            <h4 class="text-xs font-semibold text-gray-300 line-clamp-1">${item.title}</h4>
                            <span class="text-[9px] font-bold text-slate-500 block mt-0.5">${item.date}</span>
                        </div>
                    </div>`;
            });
        }

        function executeLiveSearchQuery() {
            const query = document.getElementById('appSearchEngineInput').value.toLowerCase().trim();
            const filtered = allAssetsDatabaseMemory.filter(item => item.title.toLowerCase().includes(query));
            renderPinterestGridItems(filtered);
        }

        async function initializeApplicationDataEngine() {
            try {
                const { data, error } = await supabaseClient.from('wallpapers').select('*').order('created_at', { ascending: false });
                let dbData = data || [];
                let localUploaded = JSON.parse(localStorage.getItem('lusso_local_pins')) || [];
                allAssetsDatabaseMemory = [...localUploaded, ...dbData];
                
                if(allAssetsDatabaseMemory.length === 0) {
                    allAssetsDatabaseMemory = [
                        { id: "1", title: "Berserk Dark Mark", image_url: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=500&q=80" },
                        { id: "2", title: "Welcome to my Mind Skull", image_url: "https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?w=500&q=80" },
                        { id: "3", title: "Sakura Cranium Death Art", image_url: "https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=500&q=80" }
                    ];
                }

                renderPinterestGridItems(allAssetsDatabaseMemory);
                refreshLiveUpdatesDrawerTimeline();
            } catch (err) { console.error("Database Engine Fault:", err); }
        }

        function renderPinterestGridItems(list) {
            const container = document.getElementById('pinterestMainMasonryContainer');
            container.innerHTML = "";
            if (list.length === 0) {
                container.innerHTML = `<div class="col-span-full py-12 text-center text-xs font-bold text-slate-600 uppercase tracking-widest">No matching vector data tracked</div>`;
                return;
            }

            list.forEach(item => {
                const card = document.createElement('div');
                card.className = "pinterest-card group relative";
                card.innerHTML = `
                    <div class="relative w-full overflow-hidden rounded-2xl bg-slate-900 border border-slate-900/60 transition-all duration-200">
                        <img src="${item.image_url}" onclick="openImageDetailStudioView('${item.id}', true)" class="w-full h-auto object-cover cursor-pointer block hover:scale-[1.01] transition-transform duration-300">
                    </div>
                    <div class="mt-2 px-1 flex justify-between items-center relative">
                        <span class="text-xs font-medium text-gray-300 truncate pr-2 max-w-[85%] pointer-events-none tracking-wide">${item.title}</span>
                        <div class="relative">
                            <button onclick="toggleCardActionDropdownMenu(event, '${item.id}')" class="w-7 h-7 rounded-full flex items-center justify-center hover:bg-slate-800 text-gray-400 hover:text-white transition-colors">
                                <i class="fa-solid fa-ellipsis text-xs"></i>
                            </button>
                            <div id="dropdown-${item.id}" class="dropdown-menu-list hidden absolute right-0 bottom-8 w-40 bg-[#070a13] border border-slate-800 rounded-xl shadow-2xl z-50 py-1.5 transition-all">
                                <button onclick="triggerDirectImageDownload('${item.image_url}')" class="w-full text-left px-3 py-2 text-[10px] font-bold text-gray-300 hover:bg-slate-800 flex items-center gap-2 uppercase tracking-wide"><i class="fa-solid fa-circle-arrow-down text-amber-500"></i> Download</button>
                                <button onclick="pinAssetToTargetCustomBoard('${item.id}')" class="w-full text-left px-3 py-2 text-[10px] font-bold text-gray-300 hover:bg-slate-800 flex items-center gap-2 uppercase tracking-wide"><i class="fa-solid fa-folder-plus text-amber-500"></i> Pin Board</button>
                                <button onclick="executeSecureImageLinkCopy('${item.image_url}')" class="w-full text-left px-3 py-2 text-[10px] font-bold text-gray-300 hover:bg-slate-800 flex items-center gap-2 uppercase tracking-wide"><i class="fa-solid fa-link text-amber-500"></i> Copy URL</button>
                            </div>
                        </div>
                    </div>`;
                container.appendChild(card);
            });
        }

        function toggleCardActionDropdownMenu(e, id) {
            e.stopPropagation();
            const targetMenu = document.getElementById(`dropdown-${id}`);
            const isCurrentlyHidden = targetMenu.classList.contains('hidden');
            closeAllActiveDropdowns();
            if (isCurrentlyHidden) {
                targetMenu.classList.remove('hidden');
                currentlyOpenDropdownMenuId = id;
            }
        }

        document.addEventListener('click', () => { closeAllActiveDropdowns(); });

        function triggerDirectImageDownload(url) { window.open(url, '_blank'); triggerNotificationToast("Download payload triggered."); }
        function executeSecureImageLinkCopy(url) { navigator.clipboard.writeText(url).then(() => triggerNotificationToast("Matrix URL verified & copied!")); }

        function openImageDetailStudioView(id, clearHistory = false) {
            const item = allAssetsDatabaseMemory.find(w => w.id.toString() === id.toString());
            if (!item) return;

            if (clearHistory) navigationHistoryBuffer = [];
            navigationHistoryBuffer.push(id);

            navigateToAppSection('detail');
            document.getElementById('detailPreviewImageNode').src = item.image_url;
            document.getElementById('detailAssetTitleText').innerText = item.title;

            document.getElementById('detailActionDownloadBtn').onclick = () => triggerDirectImageDownload(item.image_url);
            document.getElementById('detailActionSaveBtn').onclick = () => pinAssetToTargetCustomBoard(item.id);
            document.getElementById('detailActionShareBtn').onclick = () => executeSecureImageLinkCopy(item.image_url);

            renderSideCascadeStreamEngine(item.id);
        }

        function renderSideCascadeStreamEngine(currentId) {
            const container = document.getElementById('sideCascadedStreamGrid');
            container.innerHTML = "";
            let remainingItems = allAssetsDatabaseMemory.filter(w => w.id.toString() !== currentId.toString());
            let visibleSlice = remainingItems.slice(0, 5);

            visibleSlice.forEach(item => {
                container.innerHTML += `
                    <div class="w-full rounded-xl overflow-hidden border border-slate-900 bg-slate-950/40 group relative transition-transform duration-200 hover:scale-[1.01]">
                        <img src="${item.image_url}" onclick="openImageDetailStudioView('${item.id}', false)" class="w-full h-auto object-cover cursor-pointer block">
                        <div class="absolute bottom-0 inset-x-0 bg-gradient-to-t from-black/90 p-2 text-[9px] font-bold text-gray-200 truncate opacity-0 group-hover:opacity-100 transition-opacity uppercase tracking-wider">${item.title}</div>
                    </div>`;
            });
        }

        function triggerBackNavigation() {
            navigationHistoryBuffer.pop();
            if (navigationHistoryBuffer.length > 0) {
                openImageDetailStudioView(navigationHistoryBuffer.pop(), false);
            } else { forceResetToHomeGrid(); }
        }

        function renderCustomUserBoardsMarkup() {
            const grid = document.getElementById('customBoardsGridOutput');
            grid.innerHTML = "";
            Object.keys(customUserAlbumBoards).forEach(bName => {
                const list = customUserAlbumBoards[bName];
                grid.innerHTML += `
                    <div class="bg-[#070a13] border border-slate-900 rounded-2xl p-5 flex flex-col justify-between h-40 hover:border-slate-800 transition-colors">
                        <div>
                            <h3 class="text-gray-200 font-bold text-xs truncate brand-font tracking-wide"><i class="fa-solid fa-folder text-amber-500/60 mr-2"></i> ${bName}</h3>
                            <p class="text-[9px] text-slate-500 font-bold mt-1 uppercase tracking-wider">${list.length} Vectors Registered</p>
                        </div>
                        <button onclick="displayTargetAlbumFilteredPins('${bName}')" class="w-full py-2 bg-slate-900 text-gray-300 font-bold text-[10px] rounded-xl border border-slate-800 uppercase tracking-widest hover:bg-slate-800 transition-colors">Open Matrix</button>
                    </div>`;
            });
        }

        function pinAssetToTargetCustomBoard(id) {
            const keys = Object.keys(customUserAlbumBoards);
            const selected = prompt(`Select Target Board Destination:\n[ ${keys.join(' | ')} ]`);
            if (selected && customUserAlbumBoards[selected]) {
                if (!customUserAlbumBoards[selected].includes(id.toString())) {
                    customUserAlbumBoards[selected].push(id.toString());
                    localStorage.setItem('lusso_boards_cache', JSON.stringify(customUserAlbumBoards));
                    triggerNotificationToast(`Pinned to ${selected}`);
                } else { triggerNotificationToast("Asset already loaded here."); }
            } else if (selected) { triggerNotificationToast("Matrix directory error."); }
        }

        function displayTargetAlbumFilteredPins(name) {
            const pinnedIds = customUserAlbumBoards[name] || [];
            const filteredList = allAssetsDatabaseMemory.filter(w => pinnedIds.includes(w.id.toString()));
            navigateToAppSection('dashboard');
            renderPinterestGridItems(filteredList);
            triggerNotificationToast(`Board Filtered: ${name}`);
        }

        function createNewCustomBoardDialog() {
            const bName = prompt("Enter Custom Directory Target Name:");
            if (bName && !customUserAlbumBoards[bName]) {
                customUserAlbumBoards[bName] = [];
                localStorage.setItem('lusso_boards_cache', JSON.stringify(customUserAlbumBoards));
                renderCustomUserBoardsMarkup();
                triggerNotificationToast(`Board initialized: ${bName}`);
            }
        }

        function processLocalFileSelection(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    base64TempImageString = e.target.result;
                    document.getElementById('formPromptUploadContainer').classList.add('hidden');
                    const preview = document.getElementById('formLiveImagePreview');
                    preview.src = base64TempImageString;
                    preview.classList.remove('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function handleLocalFormUploadSubmit(e) {
            e.preventDefault();
            const title = document.getElementById('formUploadTitle').value.trim();
            if (!base64TempImageString) { alert("Missing matrix design data stream."); return; }

            const generatedNewPinNode = {
                id: "local_asset_" + Date.now().toString(),
                title: title,
                image_url: base64TempImageString
            };

            let localPins = JSON.parse(localStorage.getItem('lusso_local_pins')) || [];
            localPins.unshift(generatedNewPinNode);
            localStorage.setItem('lusso_local_pins', JSON.stringify(localPins));

            localLiveUpdatesTimeline.unshift({
                id: Date.now(),
                title: title,
                date: "Just Now",
                img: base64TempImageString
            });

            closeLeftSliderUploadEngine();
            triggerNotificationToast("Matrix asset successfully compiled!");
            initializeApplicationDataEngine();
            forceResetToHomeGrid();
        }

        window.onload = () => { initializeApplicationDataEngine(); };
    </script>
</body>
</html>
