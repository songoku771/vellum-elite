       async function fetchWallpapers() {

    try {

        if (!container) return;

        const { data: wallpapers, error } = await supabaseClient
            .from('wallpapers')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) throw error;

        if (loadingEl) {
            loadingEl.style.display = 'none';

        container.innerHTML = '';

        if (!wallpapers || wallpapers.length === 0) {
            container.innerHTML = `
                <div class="text-center text-gray-400 col-span-full py-10">
                    <i class="fa-solid fa-folder-open text-3xl mb-3 text-slate-600"></i>
                    <p>Database is empty. Please add wallpapers in Supabase!</p>
                </div>`;
            return;
        }

        // 4. Agar data hai, toh cards banao
        wallpapers.forEach(wp => {
            const card = document.createElement('div');
            card.className = "bg-slate-900/60 backdrop-blur-md rounded-2xl border border-slate-800 overflow-hidden hover:border-amber-500/50 transition-all duration-300 group";
            card.innerHTML = `
                <div class="relative aspect-video w-full overflow-hidden bg-slate-950">
                    <img src="${wp.image_url || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe'}" alt="${wp.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy">
                    <span class="absolute top-3 right-3 bg-slate-950/80 text-amber-400 text-xs font-bold px-2.5 py-1 rounded-full border border-amber-500/30 backdrop-blur-sm">${wp.resolution || '4K Ultra'}</span>

                <div class="p-5">
                    <h3 class="text-lg font-bold text-white mb-1 group-hover:text-amber-400 transition-colors">${wp.title}</h3>
                    <p class="text-slate-400 text-xs mb-4">Premium High-Refresh Rate Wallpaper</p>
                    <div class="flex items-center justify-between pt-3 border-t border-slate-800/60">
                        <div class="flex items-center gap-4 text-slate-400 text-xs">
                            <span class="flex items-center gap-1"><i class="fa-solid fa-eye text-slate-500"></i> ${wp.views || 0}</span>

                        <a href="${wp.image_url}" target="_blank" class="bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-slate-950 text-xs font-bold px-4 py-2 rounded-xl transition-all shadow-lg shadow-orange-500/10 hover:shadow-orange-500/20 flex items-center gap-1.5">
                            <i class="fa-solid fa-download"></i> Get Wall
                        </a>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });

    } catch (error) {
        console.error('Error fetching wallpapers:', error);
        // Error aane par bhi loader hatao aur message dikhao
        if (loadingEl) loadingEl.style.display = 'none';
        if (container) container.innerHTML = `<div class="text-center text-red-400 col-span-full py-10">Database connection failed. Please refresh.</div>`;
    }
}
