<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUSSO | Premium Matrix System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #0b0f19; 
            color: #f3f4f6; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        
        #mainContentScrollNode {
            height: 100vh;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .pinterest-grid {
            column-count: 2; column-gap: 16px; width: 100%;
        }
        @media (min-width: 640px) { .pinterest-grid { column-count: 3; } }
        @media (min-width: 1024px) { .pinterest-grid { column-count: 5; } }
        @media (min-width: 1280px) { .pinterest-grid { column-count: 6; } }

        .pinterest-card {
            break-inside: avoid; margin-bottom: 16px; display: inline-block; width: 100%;
        }

        .brand-font { font-family: 'Cinzel', serif; letter-spacing: 0.1em; }
        
        #mainContentScrollNode::-webkit-scrollbar { width: 6px; }
        #mainContentScrollNode::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        .settings-nav-btn { width: 100%; text-align: left; padding: 10px 15px; font-size: 13px; font-weight: 600; color: #94a3b8; border-radius: 8px; transition: all 0.2s; }
        .settings-nav-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .settings-active { color: #fff !important; background: rgba(251, 191, 36, 0.1) !important; border-left: 3px solid #fbbf24; }

        .toggle-checkbox:checked + .toggle-label { background-color: #fbbf24; }
        .toggle-checkbox:checked + .toggle-label .toggle-dot { transform: translateX(100%); background-color: #070a13; }
    </style>
</head>
<body>

    <div id="appGlobalToast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-amber-500 text-neutral-900 text-xs font-bold px-6 py-3 rounded-full shadow-2xl z-[999] opacity-0 pointer-events-none transition-all duration-300 transform translate-y-4">
        <span id="toastMessageText">Syncing...</span>
    </div>

    <div class="flex h-screen w-full">
        
        <aside class="w-20 flex flex-col items-center justify-between py-6 bg-[#070a13] border-r border-slate-900/80 z-50">
            <div class="flex flex-col items-center gap-8 w-full">
                <div onclick="forceResetToHomeGrid()" class="w-12 h-12 bg-gradient-to-br from-amber-400 to-amber-600 rounded-xl flex items-center justify-center text-neutral-900 font-extrabold text-base cursor-pointer shadow-lg brand-font hover:scale-105 transition-transform">LU</div>
                
                <div class="flex flex-col items-center gap-5 w-full">
                    <button onclick="forceResetToHomeGrid()" class="w-12 h-12 rounded-xl flex flex-col items-center justify-center text-amber-500 hover:bg-slate-800/40 transition-all gap-1"><i class="fa-solid fa-house text-base"></i><span class="text-[9px] font-medium">Home</span></button>
                    <button onclick="openLeftSliderUploadEngine()" class="w-12 h-12 rounded-xl flex flex-col items-center justify-center text-slate-400 hover:text-emerald-400 hover:bg-slate-800/40 transition-all gap-1"><i class="fa-solid fa-square-plus text-base"></i><span class="text-[9px] font-medium">Create</span></button>
                    <button onclick="toggleGlobalNotificationDrawer()" class="w-12 h-12 rounded-xl flex flex-col items-center justify-center text-slate-400 hover:text-gray-100 hover:bg-slate-800/40 relative transition-all gap-1"><i class="fa-solid fa-bell text-base"></i><span class="text-[9px] font-medium">Updates</span><span class="absolute top-2 right-3 w-1.5 h-1.5 bg-amber-500 rounded-full animate-pulse"></span></button>
                    <button onclick="navigateToAppSection('boards')" class="w-12 h-12 rounded-xl flex flex-col items-center justify-center text-slate-400 hover:text-gray-100 hover:bg-slate-800/40 transition-all gap-1"><i class="fa-solid fa-chart-pie text-base"></i><span class="text-[9px] font-medium">Analytics</span></button>
                </div>
            </div>
            <button onclick="navigateToAppSection('settings')" class="w-12 h-12 rounded-xl flex flex-col items-center justify-center text-slate-500 hover:text-amber-500 transition-all gap-1"><i class="fa-solid fa-gear text-base"></i><span class="text-[9px] font-medium">Settings</span></button>
        </aside>

        <div id="updatesDrawerPanel" class="fixed inset-y-0 left-20 w-80 bg-[#070a13] border-r border-slate-900/90 z-40 transform -translate-x-full transition-transform duration-300 ease-out shadow-2xl flex flex-col p-5">
            <div class="flex items-center justify-between border-b border-slate-800 pb-3 mb-4"><span class="font-bold text-xs text-gray-400 uppercase tracking-wider">Updates</span><button onclick="toggleGlobalNotificationDrawer()" class="text-slate-500"><i class="fa-solid fa-xmark"></i></button></div>
            <div id="updatesTimelineWrapper" class="flex-1 overflow-y-auto space-y-3"></div>
        </div>

        <div id="premiumUploadSideDrawer" class="fixed inset-y-0 left-20 w-88 bg-[#070a13] border-r border-slate-900 z-40 transform -translate-x-full transition-transform duration-300 ease-out shadow-2xl flex flex-col p-6">
            <div class="flex items-center justify-between border-b border-slate-800 pb-4 mb-5"><span class="font-bold text-xs text-gray-200 uppercase brand-font">Upload Matrix</span><button onclick="closeLeftSliderUploadEngine()" class="text-slate-500"><i class="fa-solid fa-xmark"></i></button></div>
            <form onsubmit="handleLocalFormUploadSubmit(event)" class="space-y-4">
                <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Title</label><input type="text" id="formUploadTitle" required class="w-full px-3 py-2 bg-[#111827] border border-slate-800 rounded-xl text-xs text-gray-200 outline-none"></div>
                <div class="relative w-full h-48 border-2 border-dashed border-slate-800 rounded-2xl flex flex-col items-center justify-center bg-slate-950/40 cursor-pointer">
                    <img id="formLiveImagePreview" class="hidden absolute inset-0 w-full h-full object-cover">
                    <input type="file" id="formFileInputTrigger" accept="image/*" required onchange="processLocalFileSelection(this)" class="absolute inset-0 opacity-0 cursor-pointer">
                    <i class="fa-solid fa-upload text-amber-500 text-xl"></i>
                </div>
                <button type="submit" class="w-full py-3 bg-amber-500 text-neutral-900 font-bold text-xs rounded-xl uppercase">Publish Asset</button>
            </form>
        </div>

        <div id="mainContentScrollNode" class="flex-1 flex flex-col relative">
            
            <header class="sticky top-0 z-30 px-8 py-4 bg-[#0b0f19]/90 backdrop-blur-md flex items-center justify-between gap-4 border-b border-slate-900/60">
                <div onclick="forceResetToHomeGrid()" class="brand-font text-base font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-amber-400 to-amber-500 tracking-widest cursor-pointer hidden md:block">LUSSO.</div>
                <div class="flex-1 relative max-w-xl">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="text" id="appSearchEngineInput" oninput="executeLiveSearchQuery()" class="w-full pl-11 pr-4 py-2.5 bg-[#111827] border border-slate-800 rounded-full text-xs text-gray-200 outline-none" placeholder="Search matrix...">
                </div>
                <div class="flex items-center gap-2 relative">
                    <div id="navUserInitial" onclick="navigateToAppSection('boards')" class="w-8 h-8 rounded-full bg-amber-500/10 border border-amber-500/30 flex items-center justify-center text-amber-400 font-bold text-xs cursor-pointer">T</div>
                    <button onclick="toggleTopProfileDropdownMenu(event)" class="w-7 h-7 rounded-full flex items-center justify-center hover:bg-slate-800 text-slate-400 transition-colors"><i class="fa-solid fa-ellipsis-vertical text-xs"></i></button>
                    <div id="topProfileDropdownNode" class="hidden absolute right-0 top-10 w-44 bg-[#070a13] border border-slate-800 rounded-xl shadow-2xl py-1.5 z-50">
                        <button onclick="navigateToAppSection('settings')" class="w-full text-left px-3 py-2 text-[10px] font-bold text-gray-300 hover:bg-slate-900 flex items-center gap-2 uppercase border-b border-slate-900"><i class="fa-solid fa-user-gear text-amber-500"></i> Edit Profile</button>
                        <button onclick="navigateToAppSection('boards')" class="w-full text-left px-3 py-2 text-[10px] font-bold text-gray-300 hover:bg-slate-900 flex items-center gap-2 uppercase"><i class="fa-solid fa-images text-amber-500"></i> Active Boards</button>
                    </div>
                </div>
            </header>

            <div id="dashboardSection" class="w-full app-view-block p-6">
                <div id="pinterestMainMasonryContainer" class="pinterest-grid"></div>
            </div>

            <div id="boardsSection" class="hidden w-full app-view-block p-8">
                <div class="flex justify-between items-center border-b border-slate-900 pb-6 mb-6">
                    <div><h1 class="text-xl font-bold text-gray-100 brand-font" id="boardsProfileName">Tejendar Prajapati</h1><p class="text-[10px] text-amber-500/70 uppercase">Elite Collector</p></div>
                    <button onclick="triggerNotificationToast('Custom board integration dynamic.')" class="px-5 py-2.5 bg-amber-500 text-neutral-900 font-bold text-xs rounded-xl uppercase">+ Create Board</button>
                </div>
                <div class="flex gap-4 border-b border-slate-900 pb-2 mb-6"><button onclick="toggleSavedProfileTabs('pins')" id="tabBtn-pins" class="text-xs font-bold text-amber-500 border-b-2 border-amber-500 pb-2 px-2">PINS</button><button onclick="toggleSavedProfileTabs('boards')" id="tabBtn-boards" class="text-xs font-bold text-gray-400 pb-2 px-2">BOARDS</button></div>
                <div id="tabContent-pins" class="pinterest-grid"></div>
                <div id="tabContent-boards" class="hidden grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6"></div>
            </div>

            <div id="detailSection" class="hidden w-full app-view-block p-6">
                <button onclick="triggerBackNavigation()" class="mb-6 px-4 py-2 bg-slate-900 border border-slate-800 text-gray-300 font-bold text-xs rounded-xl flex items-center gap-2"><i class="fa-solid fa-arrow-left text-amber-500"></i> Back</button>
                <div class="grid grid-cols-1 md:grid-cols-12 gap-8 items-start">
                    <div class="md:col-span-6 bg-slate-950/40 rounded-2xl p-4 flex items-center justify-center border border-slate-900"><img id="detailPreviewImageNode" src="" class="max-w-full max-h-[75vh] object-contain rounded-xl shadow-2xl"></div>
                    <div class="md:col-span-3 bg-[#070a13] border border-slate-900 rounded-xl p-5">
                        <h2 id="detailAssetTitleText" class="text-sm font-bold text-gray-200 mb-6 truncate brand-font">Matrix Detail</h2>
                        <div class="space-y-2">
                            <button onclick="triggerNotificationToast('Downloading pipeline processing...')" class="w-full text-left px-4 py-3 text-xs font-bold text-gray-300 bg-white/5 border border-slate-800 hover:bg-slate-800 rounded-xl flex items-center gap-3"><i class="fa-solid fa-circle-down text-amber-500"></i> Download Image</button>
                            <button onclick="triggerNotificationToast('Saved to Core Array Board')" class="w-full text-left px-4 py-3 text-xs font-bold text-gray-300 bg-white/5 border border-slate-800 hover:bg-slate-800 rounded-xl flex items-center gap-3"><i class="fa-solid fa-folder-plus text-amber-500"></i> Save to Board</button>
                            <button onclick="triggerNotificationToast('Link copied to clipboard')" class="w-full text-left px-4 py-3 text-xs font-bold text-gray-300 bg-white/5 border border-slate-800 hover:bg-slate-800 rounded-xl flex items-center gap-3"><i class="fa-solid fa-link text-amber-500"></i> Copy Link</button>
                        </div>
                    </div>
                    <div class="md:col-span-3"><span class="text-[10px] font-bold uppercase text-slate-500 block mb-3 border-b border-slate-900 pb-1 tracking-widest">More Like This</span><div id="sideCascadedStreamGrid" class="flex flex-col gap-4"></div></div>
                </div>
            </div>

            <div id="settingsSection" class="hidden w-full app-view-block min-h-screen bg-[#0b0f19] flex flex-col md:flex-row">
                <div class="w-full md:w-64 border-r border-slate-900 p-4 space-y-1 bg-[#070a13] flex-shrink-0">
                    <button onclick="showSettingTab('edit-profile')" class="settings-nav-btn settings-active" id="sbtn-edit-profile">Edit profile</button>
                    <button onclick="showSettingTab('account')" class="settings-nav-btn" id="sbtn-account">Account management</button>
                    <button onclick="showSettingTab('visibility')" class="settings-nav-btn" id="sbtn-visibility">Profile visibility</button>
                    <button onclick="showSettingTab('refine')" class="settings-nav-btn" id="sbtn-refine">Refine recommendations</button>
                    <button onclick="showSettingTab('link')" class="settings-nav-btn" id="sbtn-link">Link to Pinterest</button>
                    <button onclick="showSettingTab('social')" class="settings-nav-btn" id="sbtn-social">Social permissions</button>
                    <button onclick="showSettingTab('notifications')" class="settings-nav-btn" id="sbtn-notifications">Notifications</button>
                    <button onclick="showSettingTab('privacy')" class="settings-nav-btn" id="sbtn-privacy">Privacy and data</button>
                    <button onclick="showSettingTab('security')" class="settings-nav-btn" id="sbtn-security">Security</button>
                    <button onclick="showSettingTab('labs')" class="settings-nav-btn" id="sbtn-labs">Labs Matrix</button>
                </div>

                <div class="flex-1 p-6 md:p-10 max-w-3xl overflow-y-auto">
                    <div id="settingsTabContent" class="space-y-6"></div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://ezfxgevsjxfyluxprkls.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_jlyevQqezPjFmlqar5pmNw_EV8DTtVL"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allAssetsDatabaseMemory = [];
        let navigationHistoryBuffer = [];
        let base64TempImageString = "";
        
        let profile = JSON.parse(localStorage.getItem('lusso_profile')) || { 
            name: "Tejendar Prajapati", 
            about: "Elite System Designer & Computer Application Architect.",
            username: "prajapatitejendar",
            website: "https://github.com",
            email: "prajapatitejendar@gmail.com",
            birthdate: "2007-09-10",
            gender: "male",
            country: "India",
            privateProfile: false,
            searchPrivacy: true
        };

        let localLiveUpdatesTimeline = [
            { id: 1, title: "Cyber-Vampire Eclipse Drops", date: "Just Now", img: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400&q=80" },
            { id: 2, title: "Dark Samurai Mesh Sync", date: "1h ago", img: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=400&q=80" }
        ];

        let customUserAlbumBoards = JSON.parse(localStorage.getItem('lusso_boards')) || {
            "Anime wallpaper": [], "Skull wallpaper": [], "Japanese art samurai": []
        };

        function triggerNotificationToast(msg) {
            const node = document.getElementById('appGlobalToast');
            document.getElementById('toastMessageText').innerText = msg;
            node.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
            setTimeout(() => node.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4'), 2500);
        }

        function navigateToAppSection(viewId) {
            document.querySelectorAll('.app-view-block').forEach(v => v.classList.add('hidden'));
            document.getElementById(`${viewId}Section`).classList.remove('hidden');
            const mainContent = document.getElementById('mainContentScrollNode');
            if(mainContent) mainContent.scrollTop = 0;
            closeAllOpenDrawers();
            if(viewId === 'boards') renderCustomUserBoardsMarkup();
            if(viewId === 'settings') showSettingTab('edit-profile');
        }

        function forceResetToHomeGrid() {
            document.getElementById('appSearchEngineInput').value = ""; 
            navigateToAppSection('dashboard');
            renderPinterestGridItems(allAssetsDatabaseMemory);
        }

        function closeAllOpenDrawers() {
            document.getElementById('updatesDrawerPanel').classList.add('-translate-x-full');
            document.getElementById('premiumUploadSideDrawer').classList.add('-translate-x-full');
            document.getElementById('topProfileDropdownNode').classList.add('hidden');
        }

        function toggleGlobalNotificationDrawer() {
            const panel = document.getElementById('updatesDrawerPanel');
            const hidden = panel.classList.contains('-translate-x-full');
            closeAllOpenDrawers(); if(hidden) panel.classList.remove('-translate-x-full');
        }

        /* --- SENSITIVE IMAGES UPLOAD PROTECTION LAYER --- */
        function openLeftSliderUploadEngine() {
            closeAllOpenDrawers(); document.getElementById('premiumUploadSideDrawer').classList.remove('-translate-x-full');
        }

        function closeLeftSliderUploadEngine() {
            document.getElementById('premiumUploadSideDrawer').classList.add('-translate-x-full');
            base64TempImageString = "";
        }

        function toggleTopProfileDropdownMenu(e) {
            e.stopPropagation();
            const node = document.getElementById('topProfileDropdownNode');
            const hidden = node.classList.contains('hidden');
            closeAllOpenDrawers(); if(hidden) node.classList.remove('hidden');
        }

        function updateGlobalUI() {
            const initial = profile.name.charAt(0).toUpperCase();
            document.getElementById('navUserInitial').innerText = initial;
            document.getElementById('boardsProfileName').innerText = profile.name;
        }

        function updateSettingsTabActiveStyle(tabId) {
            document.querySelectorAll('.settings-nav-btn').forEach(b => b.classList.remove('settings-active'));
            const dynamicButtonNode = document.getElementById(`sbtn-${tabId}`);
            if(dynamicButtonNode) dynamicButtonNode.classList.add('settings-active');
        }

        function saveConfigStateMatrix() {
            localStorage.setItem('lusso_profile', JSON.stringify(profile));
            updateGlobalUI();
            triggerNotificationToast("Matrix settings system updated locally!");
        }

        function showSettingTab(tab) {
            updateSettingsTabActiveStyle(tab);
            const content = document.getElementById('settingsTabContent');
            
            switch(tab) {
                case 'edit-profile':
                    content.innerHTML = `
                        <h2 class="text-2xl font-bold text-white mb-2">Edit profile</h2>
                        <p class="text-xs text-slate-400 mb-8">Keep your personal details secure. Information verified active on grid.</p>
                        <div class="space-y-6">
                            <div class="flex items-center gap-4">
                                <div class="w-16 h-16 rounded-full bg-amber-500/20 border border-amber-500/40 flex items-center justify-center text-xl font-bold text-amber-500">${profile.name.charAt(0).toUpperCase()}</div>
                                <button onclick="triggerNotificationToast('Asset change requested')" class="px-4 py-2 bg-slate-800 text-xs font-bold rounded-full hover:bg-slate-700 transition-colors">Change Photo</button>
                            </div>
                            <div><label class="text-[11px] font-bold text-slate-400 block mb-1 uppercase tracking-wider">Name</label><input type="text" id="setNameInput" class="w-full bg-[#111827] border border-slate-800 p-2.5 rounded-xl text-sm outline-none text-gray-200 focus:border-amber-500" value="${profile.name}"></div>
                            <div><label class="text-[11px] font-bold text-slate-400 block mb-1 uppercase tracking-wider">About</label><textarea id="setAboutInput" rows="3" class="w-full bg-[#111827] border border-slate-800 p-2.5 rounded-xl text-sm outline-none text-gray-200 focus:border-amber-500">${profile.about}</textarea></div>
                            <div><label class="text-[11px] font-bold text-slate-400 block mb-1 uppercase tracking-wider">Website URL</label><input type="text" id="setWebsiteInput" class="w-full bg-[#111827] border border-slate-800 p-2.5 rounded-xl text-sm outline-none text-gray-200 focus:border-amber-500" value="${profile.website}"></div>
                            <div><label class="text-[11px] font-bold text-slate-400 block mb-1 uppercase tracking-wider">Username</label><input type="text" id="setCustomUsername" class="w-full bg-[#111827] border border-slate-800 p-2.5 rounded-xl text-sm outline-none text-gray-400" value="${profile.username}" readonly><p class="text-[10px] text-slate-600 mt-1">www.lusso-matrix.com/${profile.username}</p></div>
                            <div class="flex justify-end gap-3 pt-4"><button onclick="saveEditProfileForm()" class="px-6 py-2.5 bg-amber-500 text-neutral-900 text-xs font-bold rounded-full uppercase tracking-wider">Save Matrix</button></div>
                        </div>`;
                    break;

                case 'account':
                    content.innerHTML = `
                        <h2 class="text-2xl font-bold text-white mb-2">Account management</h2>
                        <p class="text-xs text-slate-400 mb-8">Make modifications to your standard personal data configuration layers.</p>
                        <div class="space-y-6">
                            <div><label class="text-[11px] font-bold text-slate-400 block mb-1 uppercase tracking-wider">Email - Private</label><input type="email" id="setAccEmail" class="w-full bg-[#111827] border border-slate-800 p-2.5 rounded-xl text-sm text-gray-300 outline-none" value="${profile.email}"></div>
                            <div class="flex items-center justify-between border-b border-slate-900 pb-4"><div><h4 class="text-sm font-bold text-gray-200">Password</h4><p class="text-xs text-slate-500">Update security entry credentials strings</p></div><button onclick="triggerNotificationToast('Recovery secure protocol sent')" class="px-4 py-2 bg-slate-800 text-xs font-bold rounded-xl">Change</button></div>
                            <div class="flex items-center justify-between border-b border-slate-900 pb-4"><div><h4 class="text-sm font-bold text-gray-200">Convert to Business</h4><p class="text-xs text-slate-500">Unlock corporate tracking and algorithmic metrics tools</p></div><button onclick="triggerNotificationToast('Business Node Deployed')" class="px-4 py-2 bg-amber-500 text-neutral-900 text-xs font-bold rounded-xl uppercase">Convert Account</button></div>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="text-[11px] font-bold text-slate-400 block mb-1">BIRTHDATE</label><input type="date" id="setAccBirth" class="w-full bg-[#111827] border border-slate-800 p-2.5 rounded-xl text-xs" value="${profile.birthdate}"></div>
                                <div><label class="text-[11px] font-bold text-slate-400 block mb-1">GENDER</label><select id="setAccGender" class="w-full bg-[#111827] border border-slate-800 p-2.5 rounded-xl text-xs"><option value="male" ${profile.gender==='male'?'selected':''}>Male</option><option value="female" ${profile.gender==='female'?'selected':''}>Female</option><option value="non-binary" ${profile.gender==='non-binary'?'selected':''}>Non-binary</option></select></div>
                            </div>
                            <div class="pt-6 border-t border-slate-900 flex justify-end"><button onclick="saveAccountManagementForm()" class="px-6 py-2.5 bg-amber-500 text-neutral-900 text-xs font-bold rounded-full uppercase">Update Account</button></div>
                        </div>`;
                    break;

                case 'visibility':
                    content.innerHTML = `
                        <h2 class="text-2xl font-bold text-white mb-2">Profile visibility</h2>
                        <p class="text-xs text-slate-400 mb-8">Manage how your global visual profile can be discovered on or off grid.</p>
                        <div class="space-y-6 bg-[#070a13] p-6 rounded-2xl border border-slate-900">
                            <div class="flex items-center justify-between">
                                <div class="max-w-[80%]"><h4 class="text-sm font-bold text-gray-200">Private Profile</h4><p class="text-xs text-slate-500 mt-0.5">Only nodes approved manually can monitor assets.</p></div>
                                <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in"><input type="checkbox" id="tglPrivate" onchange="toggleProfileVisibilityState('privateProfile')" ${profile.privateProfile?'checked':''} class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-slate-700 border-4 border-slate-900 appearance-none cursor-pointer"><label class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-800 cursor-pointer"></label></div>
                            </div>
                            <div class="flex items-center justify-between border-t border-slate-900 pt-4">
                                <div class="max-w-[80%]"><h4 class="text-sm font-bold text-gray-200">Search Privacy</h4><p class="text-xs text-slate-500 mt-0.5">Hide architecture arrays from search indexing engines.</p></div>
                                <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in"><input type="checkbox" id="tglSearch" onchange="toggleProfileVisibilityState('searchPrivacy')" ${profile.searchPrivacy?'checked':''} class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-slate-700 border-4 border-slate-900 appearance-none cursor-pointer"><label class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-800 cursor-pointer"></label></div>
                            </div>
                        </div>`;
                    break;

                case 'refine':
                    content.innerHTML = `
                        <h2 class="text-2xl font-bold text-white mb-2">Refine recommendations</h2>
                        <p class="text-xs text-slate-400 mb-6">Modify details LUSSO algorithms utilize to stream custom high-resolution items.</p>
                        <div class="flex gap-4 border-b border-slate-900 pb-2 mb-6"><button class="text-xs font-bold text-amber-500 border-b-2 border-amber-500 pb-2">AI content Tuning</button><button onclick="triggerNotificationToast('History clean')" class="text-xs font-bold text-slate-500 pb-2">History Active</button></div>
                        <div class="space-y-4 max-h-96 overflow-y-auto pr-2">

                                <div class="flex items-center justify-between bg-slate-950/40 border border-slate-900/60 p-3 rounded-xl">
                                    <span class="text-xs font-bold text-gray-300 uppercase">${topic}</span>
                                    <div class="relative inline-block w-10 align-middle select-none transition duration-200 ease-in"><input type="checkbox" checked class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-slate-700 border-4 border-slate-900 appearance-none cursor-pointer"><label class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-800 cursor-pointer"></label></div>
                                </div>`).join('')}
                        </div>`;
                    break;

                case 'link':
                    content.innerHTML = `
                        <h2 class="text-2xl font-bold text-white mb-2">Link to Pinterest & External Syncs</h2>
                        <p class="text-xs text-slate-400 mb-8">Claim synchronization assets tracking for cross-publishing distribution pipelines.</p>
                        <div class="space-y-4">
                            <div class="p-4 bg-[#070a13] border border-slate-900 rounded-xl flex items-center justify-between"><div><h4 class="text-xs font-bold text-gray-200 uppercase tracking-wide">Instagram Module</h4><p class="text-[11px] text-slate-500">Auto-publish tracking vectors directly</p></div><button onclick="triggerNotificationToast('Oauth requested')" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-xs font-bold rounded-xl">Link Link</button></div>
                            <div class="p-4 bg-[#070a13] border border-slate-900 rounded-xl flex items-center justify-between"><div><h4 class="text-xs font-bold text-gray-200 uppercase tracking-wide">Websites Domain Vector</h4><p class="text-[11px] text-slate-500">Inject dynamic script verification tags</p></div><button onclick="triggerNotificationToast('Verification engine active')" class="px-4 py-2 bg-amber-500 text-neutral-900 text-xs font-bold rounded-xl uppercase">Claim Node</button></div>
                        </div>`;
                    break;

                case 'social':
                    content.innerHTML = `
                        <h2 class="text-2xl font-bold text-white mb-2">Social permissions</h2>
                        <p class="text-xs text-slate-400 mb-8">Manage how other entities interact with your node profile variables.</p>
                        <div class="space-y-6">
                            <div><label class="text-xs font-bold text-slate-400 block mb-2 uppercase tracking-wide">@Mentions Rules</label>
                                <div class="space-y-2 bg-[#070a13] p-4 rounded-xl border border-slate-900">
                                    <label class="flex items-center gap-3 text-xs font-medium cursor-pointer text-gray-300"><input type="radio" name="mentions" checked class="accent-amber-500"> Anyone on LUSSO Matrix Grid</label>
                                    <label class="flex items-center gap-3 text-xs font-medium cursor-pointer text-gray-500"><input type="radio" name="mentions" class="accent-amber-500"> Only profiles you track closely</label>
                                    <label class="flex items-center gap-3 text-xs font-medium cursor-pointer text-gray-500"><input type="radio" name="mentions" class="accent-amber-500"> Turn off mentions permanently</label>
                                </div>
                            </div>
                            <div><label class="text-xs font-bold text-slate-400 block mb-2 uppercase tracking-wide">Comments Settings Configuration</label>
                                <div class="flex items-center justify-between bg-[#070a13] p-4 rounded-xl border border-slate-900"><div><h5 class="text-xs font-bold text-gray-300">Allow comments on your Pins</h5><p class="text-[11px] text-slate-500">Global algorithmic switch controller</p></div><div class="relative inline-block w-10 align-middle select-none transition duration-200 ease-in"><input type="checkbox" checked class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-slate-700 border-4 border-slate-900 appearance-none cursor-pointer"><label class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-800 cursor-pointer"></label></div></div>
                            </div>
                            <div class="flex justify-end"><button onclick="triggerNotificationToast('Social configuration updated')" class="px-5 py-2 bg-amber-500 text-neutral-900 font-bold text-xs rounded-full uppercase">Save Changes</button></div>
                        </div>`;
                    break;

                case 'notifications':
                    content.innerHTML = `
                        <h2 class="text-2xl font-bold text-white mb-2">Notifications System</h2>
                        <p class="text-xs text-slate-400 mb-8">Determine which warning signals and update logs dispatch to your active station.</p>
                        <div class="space-y-3">
                            ${['On LUSSO platform log updates', 'By Email dispatch arrays', 'Push alert telemetry vectors'].map(item => `
                                <div class="p-4 bg-slate-950/40 border border-slate-900 rounded-xl flex justify-between items-center"><span class="text-xs font-bold text-gray-300 uppercase">${item}</span><button onclick="triggerNotificationToast('Config channel active')" class="text-xs font-bold text-amber-500 bg-amber-500/10 px-3 py-1.5 rounded-lg border border-amber-500/30">Configure</button></div>
                            `).join('')}
                        </div>`;
                    break;

                case 'privacy':
                    content.innerHTML = `
                        <h2 class="text-2xl font-bold text-white mb-2">Privacy and data control</h2>
                        <p class="text-xs text-slate-400 mb-8">Review data compliance structures and analytical processing blocks.</p>
                        <div class="bg-[#070a13] border border-slate-900 rounded-xl p-5 space-y-4">
                            <label class="flex items-start gap-3 text-xs text-gray-400"><input type="checkbox" checked class="mt-1 accent-amber-500"> <span><strong>Use personalization records:</strong> Utilize asset histories to refine AI matrix distribution grids.</span></label>
                            <label class="flex items-start gap-3 text-xs text-gray-400 border-t border-slate-900 pt-3"><input type="checkbox" checked class="mt-1 accent-amber-500"> <span><strong>Third-party ads coordination:</strong> Share secure hash tokens with networks to optimize system banners mapping.</span></label>
                        </div>`;
                    break;

                case 'security':
                    content.innerHTML = `
                        <h2 class="text-2xl font-bold text-white mb-2">Security Hub</h2>
                        <p class="text-xs text-slate-400 mb-8">Maintain cryptographic safety logs and connection token authentication schemas.</p>
                        <div class="p-4 bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 rounded-xl flex items-center gap-3 text-xs font-bold"><i class="fa-solid fa-shield-halved text-base"></i> 2-Factor Authentication Verified Secure On-Grid</div>`;
                    break;

                case 'labs':
                    content.innerHTML = `
                        <h2 class="text-2xl font-bold text-white mb-2">Labs Experimental Matrix</h2>
                        <p class="text-xs text-slate-400 mb-8">Test advanced structural blueprints before global master compile routines roll out.</p>
                        <div class="p-8 border border-dashed border-slate-800 rounded-2xl text-center text-xs text-slate-600 uppercase tracking-widest font-bold">Quantum Sync Engine Layer V2.5 under simulation protocol blocks</div>`;
                    break;
            }
        }

        function saveEditProfileForm() {
            profile.name = document.getElementById('setNameInput').value;
            profile.about = document.getElementById('setAboutInput').value;
            profile.website = document.getElementById('setWebsiteInput').value;
            saveConfigStateMatrix();
            navigateToAppSection('boards');
        }

        function saveAccountManagementForm() {
            profile.email = document.getElementById('setAccEmail').value;
            profile.birthdate = document.getElementById('setAccBirth').value;
            profile.gender = document.getElementById('setAccGender').value;
            saveConfigStateMatrix();
        }

        function toggleProfileVisibilityState(key) {
            if(key === 'privateProfile') profile.privateProfile = document.getElementById('tglPrivate').checked;
            if(key === 'searchPrivacy') profile.searchPrivacy = document.getElementById('tglSearch').checked;
            saveConfigStateMatrix();
        }

        async function initializeApplicationDataEngine() {
            try {
                const { data } = await supabaseClient.from('wallpapers').select('*').order('created_at', { ascending: false });
                let dbData = data || [];
                let locals = JSON.parse(localStorage.getItem('lusso_local_items')) || [];
                allAssetsDatabaseMemory = [...locals, ...dbData];
                
                if(allAssetsDatabaseMemory.length === 0) {
                    allAssetsDatabaseMemory = [{ id: "1", title: "Berserk Dark Mark", image_url: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=500&q=80" }];
                }
                renderPinterestGridItems(allAssetsDatabaseMemory);
                refreshUpdates();
                updateGlobalUI();
            } catch (err) { console.error(err); }
        }

        function renderPinterestGridItems(list) {
            const container = document.getElementById('pinterestMainMasonryContainer');
            container.innerHTML = "";
            list.forEach(item => {
                const card = document.createElement('div');
                card.className = "pinterest-card group relative";
                card.innerHTML = `
                    <div class="relative w-full overflow-hidden rounded-2xl bg-slate-900 border border-slate-800/60"><img src="${item.image_url}" onclick="openImageDetailStudioView('${item.id}', true)" class="w-full h-auto object-cover cursor-pointer block hover:scale-[1.01] transition-transform duration-300"></div>
                    <div class="mt-2 px-1 flex justify-between items-center relative">
                        <span class="text-[11px] font-bold text-gray-300 truncate pr-2 max-w-[85%]">${item.title}</span>
                        <div class="relative"><button onclick="toggleCardActionDropdownMenu(event, '${item.id}')" class="w-7 h-7 rounded-full flex items-center justify-center hover:bg-slate-800 text-gray-400 transition-colors"><i class="fa-solid fa-ellipsis text-xs"></i></button>
                            <div id="dropdown-${item.id}" class="dropdown-menu-list hidden absolute right-0 bottom-8 w-52 bg-[#070a13] border border-slate-800 rounded-xl shadow-2xl z-[60] py-2">
                                <button onclick="triggerNotificationToast('Algorithm refined.')" class="w-full text-left px-3 py-2 text-[10px] font-bold text-gray-300 hover:bg-slate-800 flex items-center gap-2 uppercase">See more like this</button>
                                <button onclick="triggerNotificationToast('Asset hidden.')" class="w-full text-left px-3 py-2 text-[10px] font-bold text-gray-300 hover:bg-slate-800 flex items-center gap-2 uppercase">See less like this</button>
                                <button onclick="window.open('${item.image_url}','_blank')" class="w-full text-left px-3 py-2 text-[10px] font-bold text-gray-300 hover:bg-slate-800 flex items-center gap-2 uppercase border-t border-slate-800 mt-1"><i class="fa-solid fa-circle-arrow-down text-emerald-500"></i> Download image</button>
                            </div>
                        </div>
                    </div>`;
                container.appendChild(card);
            });
        }

        function toggleCardActionDropdownMenu(e, id) { e.stopPropagation(); const node = document.getElementById(`dropdown-${id}`); const hidden = node.classList.contains('hidden'); closeAllActiveDropdowns(); if(hidden) node.classList.remove('hidden'); }
        function closeAllActiveDropdowns() { document.querySelectorAll('.dropdown-menu-list').forEach(m => m.classList.add('hidden')); }

        function openImageDetailStudioView(id, clearHistory = false) {
            const item = allAssetsDatabaseMemory.find(w => w.id.toString() === id.toString());
            if (!item) return;
            if (clearHistory) navigationHistoryBuffer = [];
            navigationHistoryBuffer.push(id);
            navigateToAppSection('detail');
            document.getElementById('detailPreviewImageNode').src = item.image_url;
            document.getElementById('detailAssetTitleText').innerText = item.title;
            renderStream(item.id);
        }

        function renderStream(currentId) {
            const container = document.getElementById('sideCascadedStreamGrid'); container.innerHTML = "";
            let items = allAssetsDatabaseMemory.filter(w => w.id.toString() !== currentId.toString()).slice(0, 4);
            items.forEach(item => {
                container.innerHTML += `<div class="w-full rounded-xl overflow-hidden border border-slate-900 bg-slate-950 group relative"><img src="${item.image_url}" onclick="openImageDetailStudioView('${item.id}', false)" class="w-full h-auto object-cover cursor-pointer"></div>`;
            });
        }

        function renderCustomUserBoardsMarkup() {
            toggleSavedProfileTabs('pins');
            const gBoards = document.getElementById('tabContent-boards'); gBoards.innerHTML = "";
            Object.keys(customUserAlbumBoards).forEach(bName => {
                gBoards.innerHTML += `<div class="bg-[#070a13] border border-slate-900 rounded-2xl p-5 flex flex-col justify-between h-40"><div><h3 class="text-gray-200 font-bold text-xs truncate brand-font">${bName}</h3><p class="text-[9px] text-slate-500 font-bold uppercase">${customUserAlbumBoards[bName].length} Pins</p></div><button class="w-full py-2 bg-slate-900 text-gray-300 font-bold text-[10px] rounded-xl border border-slate-800">Open Board</button></div>`;
            });
        }

        function toggleSavedProfileTabs(name) {
            document.getElementById('tabBtn-pins').className = "text-xs font-bold text-gray-400 pb-2 px-2";
            document.getElementById('tabBtn-boards').className = "text-xs font-bold text-gray-400 pb-2 px-2";
            document.getElementById('tabContent-pins').classList.add('hidden');
            document.getElementById('tabContent-boards').classList.add('hidden');
            document.getElementById(`tabBtn-${name}`).className = "text-xs font-bold text-amber-500 border-b-2 border-amber-500 pb-2 px-2";
            document.getElementById(`tabContent-${name}`).classList.remove('hidden');
            
            if(name === 'pins') {
                const pinsContainer = document.getElementById('tabContent-pins'); pinsContainer.innerHTML = "";
                allAssetsDatabaseMemory.slice(0, 10).forEach(w => {
                    pinsContainer.innerHTML += `<div class="pinterest-card overflow-hidden rounded-2xl border border-slate-800"><img src="${w.image_url}" class="w-full object-cover"></div>`;
                });
            }
        }

        function processLocalFileSelection(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => { base64TempImageString = e.target.result; document.getElementById('formLiveImagePreview').src = base64TempImageString; document.getElementById('formLiveImagePreview').classList.remove('hidden'); };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function handleLocalFormUploadSubmit(e) {
            e.preventDefault();
            const node = { id: Date.now().toString(), title: document.getElementById('formUploadTitle').value, image_url: base64TempImageString };
            let pins = JSON.parse(localStorage.getItem('lusso_local_items')) || [];
            pins.unshift(node); localStorage.setItem('lusso_local_items', JSON.stringify(pins));
            closeLeftSliderUploadEngine(); triggerNotificationToast("Asset Compiled!");
            initializeApplicationDataEngine(); navigateToAppSection('dashboard');
        }

        function refreshUpdates() {
            const wrapper = document.getElementById('updatesTimelineWrapper'); wrapper.innerHTML = "";
            localLiveUpdatesTimeline.forEach(item => {
                wrapper.innerHTML += `<div class="p-2 bg-slate-900/40 rounded-xl flex gap-3 items-center border border-slate-900"><img src="${item.img}" class="w-10 h-12 object-cover rounded-md flex-shrink-0"><div class="min-w-0 flex-1"><h4 class="text-xs font-semibold text-gray-300 line-clamp-1">${item.title}</h4><span class="text-[9px] font-bold text-slate-500 block mt-0.5">${item.date}</span></div></div>`;
            });
        }

        function executeLiveSearchQuery() {
            const query = document.getElementById('appSearchEngineInput').value.toLowerCase().trim();
            renderPinterestGridItems(allAssetsDatabaseMemory.filter(item => item.title.toLowerCase().includes(query)));
        }

        function triggerBackNavigation() {
            navigationHistoryBuffer.pop();
            if (navigationHistoryBuffer.length > 0) openImageDetailStudioView(navigationHistoryBuffer.pop(), false);
            else forceResetToHomeGrid();
        }

        document.addEventListener('click', () => closeAllActiveDropdowns());
        window.onload = () => initializeApplicationDataEngine();
    </script>
</body>
</html>
