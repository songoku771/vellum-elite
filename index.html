<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUSSO | Premium Matrix Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@500;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #05070c;
            --sidebar-color: #020306;
            --card-bg: #0b0f19;
            --text-primary: #f3f4f6;
            --text-secondary: #94a3b8;
            --gold-primary: #dfb76c;
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-primary); 
            font-family: 'Poppins', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        #mainContentScrollNode { height: 100vh; overflow-y: auto; scroll-behavior: smooth; }
        .luxury-brand-title {
            font-family: 'Cinzel Decorative', serif;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #f7e7c4 0%, #dfb76c 50%, #b2873f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 10px rgba(223, 183, 108, 0.3));
        }
        .pinterest-grid { column-gap: 16px; width: 100%; }
        .pinterest-card { break-inside: avoid; margin-bottom: 16px; width: 100%; display: block; position: relative; }
        #mainContentScrollNode::-webkit-scrollbar { width: 6px; }
        #mainContentScrollNode::-webkit-scrollbar-thumb { background: rgba(223, 183, 108, 0.2); border-radius: 10px; }
        .custom-lightbox-scroll::-webkit-scrollbar { width: 6px; }
        .custom-lightbox-scroll::-webkit-scrollbar-thumb { background: #dfb76c; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Global Toast Alert -->
    <div id="appGlobalToast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-amber-500 text-neutral-900 text-xs font-bold px-6 py-3 rounded-full shadow-2xl z-[999] opacity-0 pointer-events-none transition-all duration-300 transform translate-y-4">
        <span id="toastMessageText">Syncing...</span>
    </div>

    <!-- PINTEREST-STYLE SCROLLABLE MODAL INTERFACE -->
    <div id="premiumLightboxModal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-[150] p-4 md:p-8" onclick="closePremiumLightbox()">
        <button class="absolute top-6 right-6 text-slate-400 hover:text-white text-3xl transition z-[160]" onclick="closePremiumLightbox()"><i class="fa-solid fa-xmark"></i></button>
        
        <!-- Navigation Controls -->
        <button onclick="navigateLightboxAsset(-1, event)" class="absolute left-6 top-1/2 -translate-y-1/2 w-12 h-12 bg-neutral-900/80 border border-neutral-800 rounded-full flex items-center justify-center text-white text-xl hover:bg-white hover:text-black transition z-[160]"><i class="fa-solid fa-chevron-left"></i></button>
        <button onclick="navigateLightboxAsset(1, event)" class="absolute right-6 top-1/2 -translate-y-1/2 w-12 h-12 bg-neutral-900/80 border border-neutral-800 rounded-full flex items-center justify-center text-white text-xl hover:bg-white hover:text-black transition z-[160]"><i class="fa-solid fa-chevron-right"></i></button>

        <div class="max-w-4xl w-full h-[90vh] bg-[#0b0f19] border border-slate-800/80 rounded-3xl shadow-2xl overflow-y-auto custom-lightbox-scroll" onclick="event.stopPropagation()">
            <div class="flex flex-col md:flex-row border-b border-slate-900">
                <div class="w-full md:w-1/2 bg-black/40 flex items-center justify-center p-6 min-h-[45vh]">
                    <img id="lightboxImage" src="" class="max-w-full max-h-[60vh] object-contain rounded-2xl shadow-lg">
                </div>
                <div class="w-full md:w-1/2 p-8 flex flex-col justify-between bg-[#070a12]">
                    <div>
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-xs font-bold text-amber-500 uppercase tracking-widest">Premium Node</span>
                            <div class="flex gap-2 relative">
                                <button onclick="toggleModalDropdown(event)" class="w-9 h-9 bg-slate-900 hover:bg-slate-800 text-white rounded-full flex items-center justify-center transition"><i class="fa-solid fa-ellipsis"></i></button>
                                <button onclick="saveFromLightbox()" class="px-5 py-2 bg-[#e60023] hover:bg-[#b6001a] text-white font-bold text-xs rounded-full transition">Save</button>
                                
                                <!-- Modal Dropdown Menu -->
                                <div id="modalActionDropdown" class="hidden absolute right-12 top-0 w-48 bg-[#0b0f19] border border-slate-800 rounded-xl shadow-2xl overflow-hidden z-50">
                                    <button onclick="triggerInlineActionSeeMoreFromModal()" class="w-full text-left px-4 py-2.5 text-xs text-slate-300 hover:bg-slate-800/60 transition flex items-center gap-2"><i class="fa-solid fa-eye text-amber-400"></i> See more like this</button>
                                    <button onclick="downloadFromLightbox()" class="w-full text-left px-4 py-2.5 text-xs text-slate-300 hover:bg-slate-800/60 transition flex items-center gap-2"><i class="fa-solid fa-download text-green-400"></i> Download image</button>
                                    <button onclick="triggerNotificationToast('Report logged.')" class="w-full text-left px-4 py-2.5 text-xs text-red-400 hover:bg-slate-800/60 transition flex items-center gap-2"><i class="fa-solid fa-flag"></i> Report Pin</button>
                                </div>
                            </div>
                        </div>
                        <h2 id="lightboxTitle" class="text-2xl font-bold text-white tracking-wide uppercase">Asset Title</h2>
                        <p class="text-xs text-slate-400 mt-3 leading-relaxed">High fidelity ultra-premium environment resource allocation grid mapping verified pipeline output.</p>
                    </div>
                </div>
            </div>

            <!-- Deep Recommendation Stream Section -->
            <div class="p-8 bg-[#05070c]">
                <h3 class="text-sm font-bold text-gray-300 uppercase tracking-wider mb-6 text-center">More Like This</h3>
                <div id="lightboxRelatedGridStream" class="pinterest-grid"></div>
            </div>
        </div>
    </div>

    <!-- MAIN INTERFACE LAYOUT -->
    <div class="flex h-screen w-full">
        <!-- SIDEBAR -->
        <aside class="w-20 flex flex-col items-center justify-between py-6 bg-[#020306] border-r border-slate-900/60 z-50">
            <div class="flex flex-col items-center gap-6 w-full">
                <div onclick="forceResetToHomeGrid()" class="w-10 h-10 rounded-full border border-amber-500/30 flex items-center justify-center cursor-pointer hover:border-amber-400/80 transition">
                    <span class="luxury-brand-title text-sm">L</span>
                </div>
                <div class="flex flex-col items-center gap-3 w-full">
                    <button onclick="forceResetToHomeGrid()" class="w-14 h-14 rounded-xl flex flex-col items-center justify-center text-amber-500/90 hover:bg-slate-900/40 gap-0.5 transition"><i class="fa-solid fa-house text-sm"></i><span class="text-[9px]">Home</span></button>
                    <button onclick="navigateToAppSection('explore')" class="w-14 h-14 rounded-xl flex flex-col items-center justify-center text-slate-400 hover:text-cyan-400 gap-0.5 transition"><i class="fa-solid fa-compass text-sm"></i><span class="text-[9px]">Explore</span></button>
                    <button onclick="openYourBoardsPanelSection()" class="w-14 h-14 rounded-xl flex flex-col items-center justify-center text-slate-400 hover:text-rose-400 gap-0.5 transition"><i class="fa-solid fa-folder-heart text-sm"></i><span class="text-[9px]">Boards</span></button>
                </div>
            </div>
        </aside>

        <!-- MAIN SCROLL CONTEXT -->
        <div id="mainContentScrollNode" class="flex-1 flex flex-col relative" onscroll="handleWindowInfiniteScrollTrigger()">
            <header class="sticky top-0 z-30 px-8 py-4 bg-[#05070c]/90 backdrop-blur-md flex items-center justify-between gap-4 border-b border-slate-900/40">
                <div onclick="forceResetToHomeGrid()" class="luxury-brand-title text-2xl md:text-3xl cursor-pointer">Lusso</div>
                <div class="flex-1 relative max-w-xl mx-4">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input type="text" id="appSearchEngineInput" oninput="executeLiveSearchQuery(this.value)" class="w-full pl-11 pr-4 py-2 bg-[#0b0f19] border border-slate-800 rounded-full text-xs text-gray-200 outline-none focus:border-slate-700 transition" placeholder="Search elite matrices...">
                </div>
            </header>

            <div id="dashboardSection" class="w-full app-view-block p-6">
                <div id="pinterestMainMasonryContainer" class="pinterest-grid"></div>
            </div>
            
            <div id="exploreSection" class="hidden w-full app-view-block p-6">
                <div id="exploreMasonryContainerGrid" class="pinterest-grid"></div>
            </div>

            <div id="yourBoardsSection" class="hidden w-full app-view-block p-6">
                <div id="yourSavedPinsMasonryGrid" class="pinterest-grid"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://ezfxgevsjxfyluxprkls.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_jlyevQqezPjFmlqar5pmNw_EV8DTtVL"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allAssetsDatabaseMemory = [];
        let displayedAssetsMemory = []; 
        const ITEMS_PER_PAGE = 12;
        let currentPaginationPage = 1;
        let isInfiniteScrollLoadingActive = false;
        let isDatabaseCompletelyExhausted = false;
        let activeFilterSearchQuery = "";
        let currentActiveIndexInLightbox = -1;

        function triggerNotificationToast(msg) {
            const node = document.getElementById('appGlobalToast');
            document.getElementById('toastMessageText').innerText = msg;
            node.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => node.classList.add('opacity-0', 'translate-y-4'), 3000);
        }

        function navigateToAppSection(id) {
            document.querySelectorAll('.app-view-block').forEach(v => v.classList.add('hidden'));
            const targetSection = document.getElementById(id + 'Section');
            if(targetSection) targetSection.classList.remove('hidden');
            if(id === 'explore') renderGrid(allAssetsDatabaseMemory.slice(0, 8), 'exploreMasonryContainerGrid');
            document.querySelectorAll('.pinterest-grid').forEach(g => { g.style.columnCount = 4; });
        }

        function forceResetToHomeGrid() { navigateToAppSection('dashboard'); }

        function openPremiumLightbox(id) {
            currentActiveIndexInLightbox = allAssetsDatabaseMemory.findIndex(w => w.id == id);
            if (currentActiveIndexInLightbox === -1) return;
            
            const item = allAssetsDatabaseMemory[currentActiveIndexInLightbox];
            document.getElementById('lightboxImage').src = item.image_url;
            document.getElementById('lightboxTitle').innerText = item.title || "Untitled Asset";
            document.getElementById('premiumLightboxModal').classList.remove('hidden');
            document.getElementById('modalActionDropdown').classList.add('hidden');
            
            const innerStreamGrid = document.getElementById('lightboxRelatedGridStream');
            innerStreamGrid.innerHTML = "";
            const relatedElements = allAssetsDatabaseMemory.filter(w => w.id != item.id).slice(0, 6);
            
            relatedElements.forEach(rel => {
                const card = document.createElement('div');
                card.className = "pinterest-card group cursor-pointer relative overflow-hidden rounded-2xl border border-slate-800/40";
                card.innerHTML = `<img src="${rel.image_url}" onclick="openPremiumLightbox('${rel.id}')" class="w-full h-auto block rounded-2xl">`;
                innerStreamGrid.appendChild(card);
            });
            innerStreamGrid.style.columnCount = 3;
        }

        function toggleCardDropdown(id, event) {
            event.stopPropagation();
            document.querySelectorAll('.card-dropdown-menu').forEach(el => {
                if(el.id !== `drop-${id}`) el.classList.add('hidden');
            });
            const drop = document.getElementById(`drop-${id}`);
            if(drop) drop.classList.toggle('hidden');
        }

        function toggleModalDropdown(event) {
            event.stopPropagation();
            document.getElementById('modalActionDropdown').classList.toggle('hidden');
        }

        function triggerInlineActionSeeMore(title, event) {
            event.stopPropagation();
            executeLiveSearchQuery(title || "Anime");
            triggerNotificationToast("Filtering related elements...");
        }

        function triggerInlineActionSeeMoreFromModal() {
            if(currentActiveIndexInLightbox !== -1) {
                const item = allAssetsDatabaseMemory[currentActiveIndexInLightbox];
                closePremiumLightbox();
                executeLiveSearchQuery(item.title || "Anime");
            }
        }

        function navigateLightboxAsset(direction, event) {
            if(event) event.stopPropagation();
            currentActiveIndexInLightbox += direction;
            if(currentActiveIndexInLightbox < 0) currentActiveIndexInLightbox = allAssetsDatabaseMemory.length - 1;
            if(currentActiveIndexInLightbox >= allAssetsDatabaseMemory.length) currentActiveIndexInLightbox = 0;
            openPremiumLightbox(allAssetsDatabaseMemory[currentActiveIndexInLightbox].id);
        }

        function closePremiumLightbox() { document.getElementById('premiumLightboxModal').classList.add('hidden'); }

        function handleInlineActionSave(id, event) {
            if(event) event.stopPropagation();
            const asset = allAssetsDatabaseMemory.find(w => w.id == id);
            if(!asset) return;
            let currentPins = getSavedBoardsStorageArray();
            if(!currentPins.some(p => p.id == id)) {
                currentPins.push(asset);
                localStorage.setItem('lusso_guest_board', JSON.stringify(currentPins));
                triggerNotificationToast("Saved to Vault Boards!");
            } else {
                triggerNotificationToast("Already saved.");
            }
        }

        function handleInlineActionDownload(url, event) {
            if(event) event.stopPropagation();
            const link = document.createElement('a');
            link.href = url;
            link.target = "_blank";
            link.download = "LUSSO_Wallpaper.jpg";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function saveFromLightbox() {
            if(currentActiveIndexInLightbox !== -1) handleInlineActionSave(allAssetsDatabaseMemory[currentActiveIndexInLightbox].id, null);
        }

        function downloadFromLightbox() {
            if(currentActiveIndexInLightbox !== -1) handleInlineActionDownload(allAssetsDatabaseMemory[currentActiveIndexInLightbox].image_url, null);
        }

        function executeLiveSearchQuery(val) {
            activeFilterSearchQuery = val.toLowerCase();
            document.getElementById('appSearchEngineInput').value = val;
            
            const domainRewrite = "lusso.com"; // Custom domain routing setup target mapping configuration
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + (val ? `?search=${encodeURIComponent(val)}` : '');
            window.history.pushState({ path: newUrl }, '', newUrl);

            let filtered = allAssetsDatabaseMemory.filter(item => !activeFilterSearchQuery || (item.title && item.title.toLowerCase().includes(activeFilterSearchQuery)));
            renderGrid(filtered.slice(0, ITEMS_PER_PAGE), 'pinterestMainMasonryContainer');
        }

        async function initializeApplicationDataEngine() {
            const { data } = await supabaseClient.from('wallpapers').select('*').order('created_at', { ascending: false });
            allAssetsDatabaseMemory = data || [];

            const urlParams = new URLSearchParams(window.location.search);
            const queryParam = urlParams.get('search');
            if(queryParam) executeLiveSearchQuery(queryParam);
            else renderGrid(allAssetsDatabaseMemory.slice(0, ITEMS_PER_PAGE), 'pinterestMainMasonryContainer');

            document.querySelectorAll('.pinterest-grid').forEach(g => { g.style.columnCount = 4; });
        }

        function renderGrid(list, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = "";
            
            list.forEach(item => {
                const card = document.createElement('div');
                card.className = "pinterest-card group cursor-pointer relative overflow-hidden rounded-2xl border border-slate-800/40";
                card.innerHTML = `
                    <div class="relative w-full overflow-hidden bg-[#0b0f19]">
                        <img src="${item.image_url}" onclick="openPremiumLightbox('${item.id}')" class="w-full h-auto block hover:scale-105 transition-all duration-500 rounded-2xl relative z-10">
                        
                        <!-- PINTEREST ACTIONS HOVER INTERFACE LAYER -->
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-20 flex flex-col justify-between p-4">
                            <div class="flex justify-between items-center w-full">
                                <span class="text-xs text-white/80 font-medium truncate max-w-[50%] bg-black/40 px-2 py-1 rounded">${item.title || 'Anime'}</span>
                                <button onclick="handleInlineActionSave('${item.id}', event)" class="bg-[#e60023] hover:bg-[#b6001a] text-white font-bold text-xs px-4 py-2 rounded-full shadow-md transition">Save</button>
                            </div>
                            <div class="flex justify-end items-center gap-1.5 relative w-full">
                                <button onclick="handleInlineActionDownload('${item.image_url}', event)" class="w-8 h-8 bg-white hover:bg-neutral-200 text-black rounded-full flex items-center justify-center shadow-md transition"><i class="fa-solid fa-arrow-down text-xs"></i></button>
                                <button onclick="toggleCardDropdown('${item.id}', event)" class="w-8 h-8 bg-white hover:bg-neutral-200 text-black rounded-full flex items-center justify-center shadow-md transition"><i class="fa-solid fa-ellipsis text-xs"></i></button>
                                
                                <!-- Dropdown Action Grid Context List -->
                                <div id="drop-${item.id}" class="card-dropdown-menu hidden absolute right-0 bottom-10 w-44 bg-[#0b0f19] border border-slate-800 rounded-xl shadow-2xl overflow-hidden z-50">
                                    <button onclick="triggerInlineActionSeeMore('${item.title}', event)" class="w-full text-left px-4 py-2 text-[11px] text-slate-300 hover:bg-slate-800 transition flex items-center gap-2"><i class="fa-solid fa-eye text-amber-400"></i> See more like this</button>
                                    <button onclick="handleInlineActionDownload('${item.image_url}', event)" class="w-full text-left px-4 py-2 text-[11px] text-slate-300 hover:bg-slate-800 transition flex items-center gap-2"><i class="fa-solid fa-download text-green-400"></i> Download image</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.addEventListener('click', () => {
            document.querySelectorAll('.card-dropdown-menu').forEach(el => el.classList.add('hidden'));
            document.getElementById('modalActionDropdown').classList.add('hidden');
        });

        function handleWindowInfiniteScrollTrigger() {}
        function getSavedBoardsStorageArray() { return localStorage.getItem('lusso_guest_board') ? JSON.parse(localStorage.getItem('lusso_guest_board')) : []; }
        function openYourBoardsPanelSection() { navigateToAppSection('yourBoards'); renderGrid(getSavedBoardsStorageArray(), 'yourSavedPinsMasonryGrid'); }

        window.onload = () => initializeApplicationDataEngine();
    </script>
</body>
</html>
