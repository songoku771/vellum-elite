<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUSSO | Premium Matrix System</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- Base Reset & Theme Variables --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        :root {
            --bg-dark: #0d0d11;
            --panel-bg: #14141c;
            --accent-red: #e60023; /* Pinterest inspired but styled for premium dark theme */
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
            --border-color: #222230;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- 1st Layer: Welcome Screen Anim --- */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .welcome-title {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 8px;
            color: var(--text-main);
            text-shadow: 0 0 20px rgba(230, 0, 35, 0.5);
            margin-bottom: 10px;
            opacity: 0;
            animation: fadeInLusso 1.5s forwards 0.3s;
        }

        .welcome-subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeInLusso 1.5s forwards 0.8s;
        }

        @keyframes fadeInLusso {
            to {
                opacity: 1;
                transform: translateY(0);
            }
            from {
                opacity: 0;
                transform: translateY(20px);
            }
        }

        .welcome-fade-out {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.05);
        }

        /* --- Header Navigation --- */
        header {
            background-color: var(--panel-bg);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, var(--accent-red), #990012);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(230, 0, 35, 0.4);
        }

        .brand-logo i {
            color: white;
            font-size: 1.1rem;
        }

        .brand-name {
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 3px;
            color: var(--text-main);
        }

        .nav-actions {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.3rem;
            cursor: pointer;
            position: relative;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .icon-btn:hover, .icon-btn.active {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .badge {
            position: absolute;
            top: 4px;
            right: 4px;
            background-color: var(--accent-red);
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* --- Main Content Layout --- */
        .wrapper {
            display: flex;
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        /* --- Main Dashboard View --- */
        main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background-color: #222;
        }

        .card-body {
            padding: 15px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 500;
        }

        /* --- Pinterest Styled Updates Side Panel --- */
        .updates-panel {
            position: absolute;
            top: 0;
            left: -360px; /* Initially hidden to the left */
            width: 350px;
            height: 100%;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
            transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .updates-panel.open {
            left: 0; /* Slide in action */
        }

        .panel-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
        }

        .section-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            margin: 15px 5px 10px 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Notification Rows Styling (Pinterest Interface Matching) */
        .update-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-bottom: 8px;
        }

        .update-item:hover {
            background-color: rgba(255, 255, 255, 0.04);
        }

        .update-thumb {
            width: 55px;
            height: 55px;
            border-radius: 8px;
            object-fit: cover;
            background-color: #333;
        }

        .update-details {
            flex: 1;
        }

        .update-text {
            font-size: 0.9rem;
            color: var(--text-main);
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .update-time {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .update-opt-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 5px;
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-title">LUSSO</div>
        <div class="welcome-subtitle">Welcome To Lusso System</div>
    </div>

    <header>
        <div class="brand">
            <div class="brand-logo">
                <i class="fa-solid fa-layer-group"></i>
            </div>
            <div class="brand-name">LUSSO</div>
        </div>
        <div class="nav-actions">
            <button class="icon-btn" id="update-toggle-btn" title="Updates">
                <i class="fa-solid fa-bell"></i>
                <div class="badge"></div>
            </button>
            <button class="icon-btn" title="Profile">
                <i class="fa-solid fa-user"></i>
            </button>
        </div>
    </header>

    <div class="wrapper">
        
        <div class="updates-panel" id="side-updates-panel">
            <div class="panel-header">
                <h2>Updates</h2>
                <button class="close-btn" id="panel-close-btn">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="panel-content">
                
                <div class="section-label">New</div>
                
                <div class="update-item">
                    <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=100&auto=format&fit=crop" alt="update thumb" class="update-thumb">
                    <div class="update-details">
                        <div class="update-text">Take a moment for yourself ❤️</div>
                        <div class="update-time">1h</div>
                    </div>
                    <button class="update-opt-btn"><i class="fa-solid fa-ellipsis"></i></button>
                </div>

                <div class="update-item">
                    <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=100&auto=format&fit=crop" alt="update thumb" class="update-thumb">
                    <div class="update-details">
                        <div class="update-text">Your inspo awaits</div>
                        <div class="update-time">1d</div>
                    </div>
                    <button class="update-opt-btn"><i class="fa-solid fa-ellipsis"></i></button>
                </div>

                <div class="update-item">
                    <img src="https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?w=100&auto=format&fit=crop" alt="update thumb" class="update-thumb">
                    <div class="update-details">
                        <div class="update-text">New ideas are calling</div>
                        <div class="update-time">2d</div>
                    </div>
                    <button class="update-opt-btn"><i class="fa-solid fa-ellipsis"></i></button>
                </div>

                <div class="section-label">Seen</div>

                <div class="update-item" style="opacity: 0.7;">
                    <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=100&auto=format&fit=crop" alt="update thumb" class="update-thumb">
                    <div class="update-details">
                        <div class="update-text">Take a moment for yourself ❤️</div>
                        <div class="update-time">5d</div>
                    </div>
                    <button class="update-opt-btn"><i class="fa-solid fa-ellipsis"></i></button>
                </div>

            </div>
        </div>

        <main>
            <h3>Elite Matrix Setup</h3>
            <div class="demo-grid">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=500&auto=format&fit=crop" class="card-img" alt="gaming">
                    <div class="card-body">
                        <div class="card-title">Elite Gaming Setup</div>
                    </div>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=500&auto=format&fit=crop" class="card-img" alt="tech">
                    <div class="card-body">
                        <div class="card-title">Matrix Core Terminal</div>
                    </div>
                </div>
            </div>
        </main>

    </div>

    <script>
        // Welcome Screen Fadeout Sequence
        document.addEventListener('DOMContentLoaded', () => {
            const welcomeScreen = document.getElementById('welcome-screen');
            
            // 2 Seconds display duration, then fade out smoothly
            setTimeout(() => {
                welcomeScreen.classList.add('welcome-fade-out');
            }, 2000);
        });

        // Sidebar Dynamic Navigation Controls
        const updateToggleBtn = document.getElementById('update-toggle-btn');
        const panelCloseBtn = document.getElementById('panel-close-btn');
        const sideUpdatesPanel = document.getElementById('side-updates-panel');

        // Open Side Panel
        updateToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            sideUpdatesPanel.classList.toggle('open');
            updateToggleBtn.classList.toggle('active');
            
            // Hide notification dot badge once clicked
            const badge = updateToggleBtn.querySelector('.badge');
            if(badge) badge.style.display = 'none';
        });

        // Close via 'X' Button
        panelCloseBtn.addEventListener('click', () => {
            sideUpdatesPanel.classList.remove('open');
            updateToggleBtn.classList.remove('active');
        });

        // Close side panel if clicked anywhere else on screen
        document.addEventListener('click', (e) => {
            if (!sideUpdatesPanel.contains(e.target) && e.target !== updateToggleBtn && !updateToggleBtn.contains(e.target)) {
                sideUpdatesPanel.classList.remove('open');
                updateToggleBtn.classList.remove('active');
            }
        });
    </script>
</body>
</html>
