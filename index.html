<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vellum Elite | Premium Matrix Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* PREMIUM MIDNIGHT GRADIENT BACKGROUND */
        body { 
            background: radial-gradient(circle at top right, #1a1c25, #050505); 
            color: #e2e8f0; 
            min-height: 100vh;
        }
        .glass-panel { background: rgba(15, 17, 26, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <aside class="fixed left-0 top-0 h-full w-24 flex flex-col items-center py-8 gap-8 border-r border-white/5">
        <div class="text-amber-500 font-black text-xl">VE</div>
        <nav class="flex flex-col gap-6">
            <button onclick="showSection('dashboard')" class="text-white"><i class="fa-solid fa-house"></i></button>
            <button onclick="toggleUpdates()" class="text-slate-400 relative">
                <i class="fa-solid fa-bell"></i>
                <span class="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full"></span>
            </button>
        </nav>
    </aside>

    <main class="ml-24 p-8">
        <div class="max-w-2xl mb-8">
            <input type="text" id="searchInput" oninput="liveSearch()" 
            class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm focus:outline-none focus:border-amber-500" 
            placeholder="Search premium matrix designs...">
        </div>

        <div id="wallpaperContainer" class="grid grid-cols-5 gap-6"></div>
    </main>

    <div id="updatesPanel" class="hidden fixed right-0 top-0 h-full w-80 glass-panel p-6 z-50">
        <h3 class="font-bold mb-6">Updates</h3>
        <div id="updatesList" class="space-y-6">
            <div class="border-l border-slate-700 pl-4">
                <p class="text-xs text-slate-300">New Cyberpunk drop added</p>
                <p class="text-[10px] text-slate-500">June 09, 2026</p>
            </div>
        </div>
    </div>

    <script>
        // 1. IMPROVED SEARCH: No more load screens
        function liveSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allWallpapers.filter(wp => wp.title.toLowerCase().includes(query));
            renderWallpapers(filtered);
        }

        // 2. UPDATED THREE DOTS: Share Menu + Favorite (Star)
        function renderActions(wpId) {
            return `
                <div class="flex gap-2">
                    <button onclick="toggleFavorite('${wpId}')" class="p-2 bg-white/5 rounded-full hover:text-yellow-400"><i class="fa-solid fa-star"></i></button>
                    <button onclick="openShareMenu()" class="p-2 bg-white/5 rounded-full"><i class="fa-solid fa-share-nodes"></i></button>
                </div>
            `;
        }

        function openShareMenu() {
            if (navigator.share) {
                navigator.share({ title: 'Vellum Design', url: window.location.href });
            } else {
                alert("Copy Link: " + window.location.href);
            }
        }

        // 3. REMOVED DOWNLOAD BUTTON FROM DETAILS, ADDED "MORE FROM COLLECTION"
        function showDetails(wp) {
            document.getElementById('wallpaperContainer').innerHTML = `
                <div class="col-span-3">
                    <img src="${wp.image_url}" class="rounded-3xl w-full">
                </div>
                <div class="col-span-2 glass-panel p-8 rounded-3xl">
                    <h2 class="text-2xl font-black mb-4">${wp.title}</h2>
                    <div class="flex gap-4 mb-6">
                        ${renderActions(wp.id)}
                    </div>
                    <h4 class="text-sm font-bold mb-4">More from this collection</h4>
                    <div id="relatedGrid" class="grid grid-cols-2 gap-4"></div>
                </div>
            `;
        }

        function toggleUpdates() {
            document.getElementById('updatesPanel').classList.toggle('hidden');
        }
    </script>
</body>
</html>
