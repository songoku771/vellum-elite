<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUSSO | Premium Matrix System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- 1. CORE RESET & ORIGINAL VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #0b0b0f;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- 2. WELCOME TO LUSSO ENGINE SCREEN (NEW ADDITION) --- */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0b0f;
            z-index: 9999; /* Isse screen sabse upar load hogi */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .welcome-title {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 12px;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(230, 0, 35, 0.6);
            margin-bottom: 15px;
            opacity: 0;
            transform: translateY(20px);
            animation: lussoFadeIn 1.2s forwards 0.3s;
        }

        .welcome-subtitle {
            font-size: 0.95rem;
            color: #a0a0b0;
            letter-spacing: 6px;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(20px);
            animation: lussoFadeIn 1.2s forwards 0.8s;
        }

        @keyframes lussoFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-fade-out {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.03);
        }

        /* --- 3. ORIGINAL DYNAMIC GRADIENT BACKGROUND --- */
        /* Aapka vellum-elite wala iconic vibrant red-blue gradient mesh setup */
        .desktop-bg-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #7c0014 0%, #1a0033 40%, #0044ff 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* --- 4. ORIGINAL LUSSO HEADER & BRANDING BAR --- */
        header {
            background-color: rgba(15, 15, 22, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Original premium icon container look */
        .brand-logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #e60023, #7c0014);
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 12px rgba(230, 0, 35, 0.3);
        }

        .brand-logo-icon i {
            color: #ffffff;
            font-size: 1rem;
        }

        .brand-name-text {
            font-family: 'Cinzel', serif;
            font-size: 1.7rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: #ffffff;
        }

        .nav-actions-right {
            display: flex;
            gap: 18px;
            align-items: center;
        }

        .action-icon-btn {
            background: none;
            border: none;
            color: #a0a0b0;
            font-size: 1.25rem;
            cursor: pointer;
            position: relative;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.25s ease;
        }

        .action-icon-btn:hover, .action-icon-btn.active {
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.06);
        }

        /* Red notification dot element on bell icon */
        .notification-alert-dot {
            position: absolute;
            top: 6px;
            right: 6px;
            background-color: #e60023;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            box-shadow: 0 0 8px #e60023;
        }

        /* --- 5. ORIGINAL WORKSPACE WINDOW CONTAINER LAYOUT --- */
        .workspace-canvas {
            position: relative;
            flex: 1;
            z-index: 5;
            padding: 25px;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        /* Original Glassmorphic Window Design from image_68a27a */
        .original-window-frame {
            background: rgba(20, 20, 28, 0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 460px;
            height: 340px;
        }

        .window-top-bar {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .window-title {
            font-size: 0.9rem;
            font-weight: 500;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .window-controls-mock {
            display: flex;
            gap: 12px;
            opacity: 0.6;
            font-size: 0.85rem;
        }

        .window-content-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* --- 6. PINTEREST UPDATES PANEL OVERLAY (SIDEBAR) --- */
        .pinterest-updates-sidebar {
            position: absolute;
            top: 0;
            left: -360px; /* Hidden outside the screen by default */
            width: 350px;
            height: 100%;
            background-color: #14141c; /* Solid structure dark theme */
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 15px 0 40px rgba(0, 0, 0, 0.6);
            transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100; /* Sidebar window boxes ke upar overlay hogi */
            display: flex;
            flex-direction: column;
        }

        .pinterest-updates-sidebar.open {
            left: 0; /* Slide in inside screen */
        }

        .panel-top-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-top-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .panel-close-cross-btn {
            background: none;
            border: none;
            color: #a0a0b0;
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .panel-close-cross-btn:hover {
            color: #ffffff;
        }

        .panel-scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
        }

        .panel-category-tag {
            font-size: 0.85rem;
            color: #a0a0b0;
            font-weight: 600;
            margin: 15px 5px 10px 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Notification Elements Styling based on your image_690b1e */
        .notification-card-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-bottom: 6px;
        }

        .notification-card-row:hover {
            background-color: rgba(255, 255, 255, 0.04);
        }

        .notification-thumbnail-img {
            width: 52px;
            height: 52px;
            border-radius: 8px;
            object-fit: cover;
            background-color: #252530;
        }

        .notification-info-text-block {
            flex: 1;
        }

        .notification-main-msg {
            font-size: 0.9rem;
            color: #ffffff;
            line-height: 1.35;
            margin-bottom: 2px;
        }

        .notification-timestamp {
            font-size: 0.75rem;
            color: #a0a0b0;
        }

        .notification-more-options-btn {
            background: none;
            border: none;
            color: #a0a0b0;
            cursor: pointer;
            font-size: 0.95rem;
            padding: 5px;
        }

        .notification-more-options-btn:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-title">LUSSO</div>
        <div class="welcome-subtitle">Welcome To Lusso System</div>
    </div>

    <div class="desktop-bg-gradient"></div>

    <header>
        <div class="brand">
            <div class="brand-logo-icon">
                <i class="fa-solid fa-cube"></i>
            </div>
            <div class="brand-name-text">LUSSO</div>
        </div>
        <div class="nav-actions-right">
            <button class="action-icon-btn" id="bell-updates-toggle-trigger" title="Updates">
                <i class="fa-solid fa-bell"></i>
                <div class="notification-alert-dot"></div>
            </button>
            <button class="action-icon-btn" title="Navigation">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
        </div>
    </header>

    <div class="wrapper" style="position: relative; flex: 1; display: flex;">
        
        <div class="pinterest-updates-sidebar" id="app-updates-slidebar-panel">
            <div class="panel-top-header">
                <h2>Updates</h2>
                <button class="panel-close-cross-btn" id="app-updates-panel-close-trigger">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="panel-scroll-area">
                
                <div class="panel-category-tag">New</div>
                
                <div class="notification-card-row">
                    <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=100&auto=format&fit=crop" alt="thumb" class="notification-thumbnail-img">
                    <div class="notification-info-text-block">
                        <div class="notification-main-msg">Take a moment for yourself ❤️</div>
                        <div class="notification-timestamp">1h</div>
                    </div>
                    <button class="notification-more-options-btn"><i class="fa-solid fa-ellipsis"></i></button>
                </div>

                <div class="notification-card-row">
                    <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=100&auto=format&fit=crop" alt="thumb" class="notification-thumbnail-img">
                    <div class="notification-info-text-block">
                        <div class="notification-main-msg">Your inspo awaits</div>
                        <div class="notification-timestamp">1d</div>
                    </div>
                    <button class="notification-more-options-btn"><i class="fa-solid fa-ellipsis"></i></button>
                </div>

                <div class="notification-card-row">
                    <img src="https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?w=100&auto=format&fit=crop" alt="thumb" class="notification-thumbnail-img">
                    <div class="notification-info-text-block">
                        <div class="notification-main-msg">New ideas are calling</div>
                        <div class="notification-timestamp">2d</div>
                    </div>
                    <button class="notification-more-options-btn"><i class="fa-solid fa-ellipsis"></i></button>
                </div>

                <div class="panel-category-tag">Seen</div>

                <div class="notification-card-row" style="opacity: 0.65;">
                    <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=100&auto=format&fit=crop" alt="thumb" class="notification-thumbnail-img">
                    <div class="notification-info-text-block">
                        <div class="notification-main-msg">Take a moment for yourself ❤️</div>
                        <div class="notification-timestamp">5d</div>
                    </div>
                    <button class="notification-more-options-btn"><i class="fa-solid fa-ellipsis"></i></button>
                </div>

            </div>
        </div>

        <div class="workspace-canvas">
            
            <div class="original-window-frame">
                <div class="window-top-bar">
                    <div class="window-title">
                        <i class="fa-regular fa-image"></i> Lusso Media Engine
                    </div>
                    <div class="window-controls-mock">
                        <i class="fa-solid fa-minus"></i>
                        <i class="fa-solid fa-expand"></i>
                        <i class="fa-solid fa-xmark"></i>
                    </div>
                </div>
                <div class="window-content-body">
                    <p style="font-size: 0.85rem; color: #a0a0b0; margin-bottom: 12px;">Main System Active Viewport</p>
                    <div style="font-size: 0.95rem; line-height: 1.5; color: rgba(255,255,255,0.95);">
                        Aapka dynamic content container aur functional workflows yahan chalte rhenge...
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // 1. Welcome Screen Display Countdown (Fades out after exactly 2 seconds)
        document.addEventListener('DOMContentLoaded', () => {
            const welcomeOverlay = document.getElementById('welcome-screen');
            setTimeout(() => {
                welcomeOverlay.classList.add('welcome-fade-out');
            }, 2000);
        });

        // 2. Sidebar Transition System Mechanics
        const bellTriggerBtn = document.getElementById('bell-updates-toggle-trigger');
        const closeTriggerBtn = document.getElementById('app-updates-panel-close-trigger');
        const updatesSidebarPanel = document.getElementById('app-updates-slidebar-panel');

        // Click on Bell: Toggle sliding action
        bellTriggerBtn.addEventListener('click', (event) => {
            event.stopPropagation();
            updatesSidebarPanel.classList.toggle('open');
            bellTriggerBtn.classList.toggle('active');
            
            // Notification badge hidden action upon active view
            const alertDot = bellTriggerBtn.querySelector('.notification-alert-dot');
            if (alertDot) alertDot.style.display = 'none';
        });

        // Click on X: Close current sidebar panel
        closeTriggerBtn.addEventListener('click', () => {
            updatesSidebarPanel.classList.remove('open');
            bellTriggerBtn.classList.remove('active');
        });

        // Smart Close feature: Closes side window if user clicks anywhere else on wallpaper area
        document.addEventListener('click', (event) => {
            if (!updatesSidebarPanel.contains(event.target) && event.target !== bellTriggerBtn && !bellTriggerBtn.contains(event.target)) {
                updatesSidebarPanel.classList.remove('open');
                bellTriggerBtn.classList.remove('active');
            }
        });
    </script>
</body>
</html>
