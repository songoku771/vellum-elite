<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUSSO | Premium Matrix System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --sidebar-color: #070a13;
            --card-bg: #111827;
            --text-primary: #f3f4f6;
            --text-secondary: #94a3b8;
            --border-color: rgba(30, 41, 59, 0.8);
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-primary); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        #mainContentScrollNode {
            height: 100vh;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        /* Perfect Pinterest Column Grid Setup for Wallpaper Fit */
        .pinterest-grid {
            column-count: 2;
            column-gap: 16px;
            width: 100%;
        }
        @media (min-width: 640px) { .pinterest-grid { column-count: 3; } }
        @media (min-width: 1024px) { .pinterest-grid { column-count: 4; } }
        @media (min-width: 1280px) { .pinterest-grid { column-count: 5; } }
        @media (min-width: 1536px) { .pinterest-grid { column-count: 6; } }

        .pinterest-card {
            break-inside: avoid;
            margin-bottom: 20px;
            display: inline-block;
            width: 100%;
        }

        .brand-font { font-family: 'Cinzel', serif; letter-spacing: 0.1em; }
        .iphone-script-font { font-family: 'Great Vibes', cursive; letter-spacing: 0; font-weight: 500; }
        
        #mainContentScrollNode::-webkit-scrollbar { width: 6px; }
        #mainContentScrollNode::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        .settings-nav-btn { width: 100%; text-align: left; padding: 10px 15px; font-size: 13px; font-weight: 600; color: var(--text-secondary); border-radius: 8px; transition: all 0.2s; }
        .settings-nav-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
        .settings-active { color: #000 !important; background: #fbbf24 !important; }

        .toggle-checkbox:checked + .toggle-label { background-color: #fbbf24; }
        .toggle-checkbox:checked + .toggle-label .toggle-dot { transform: translateX(100%); background-color: #070a13; }
    </style>
</head>
<body>

    <div id="appGlobalToast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-amber-500 text-neutral-900 text-xs font-bold px-6 py-3 rounded-full shadow-2xl z-[999] opacity-0 pointer-events-none transition-all duration-300 transform translate-y-4">
        <span id="toastMessageText">Syncing...</span>
    </div>

    <div class="flex h-screen w-full">
        
        <aside id="sidebarMainNode" class="w-20 flex flex-col items-center justify-between py-6 bg-[#070a13] border-r border-slate-900/80 z-50 transition-colors duration-300">
            <div class="flex flex-col items-center gap-8 w-full">
                <div onclick="forceResetToHomeGrid()" class="w-14 h-14 bg-gradient-to-br from-amber-300 via-amber-400 to-amber-600 rounded-full flex items-center justify-center text-neutral-900 text-3xl cursor-pointer shadow-xl iphone-script-font hover:scale-110 transition-transform">Lusso</div>
                
                <div class="flex flex-col items-center gap-5 w-full">
                    <button onclick="forceResetToHomeGrid()" class="w-12 h-12 rounded-xl flex flex-col items-center justify-center text-amber-500 hover:bg-slate-800/40 transition-all gap-1"><i class="fa-solid fa-house text-base"></i><span class="text-[9px] font-medium">Home</span></button>
                    <button onclick="openLeftSliderUploadEngine()" class="w-12 h-12 rounded-xl flex flex-col items-center justify-center text-slate-400 hover:text-emerald-400 hover:bg-slate-800/40 transition-all gap-1"><i class="fa-solid fa-square-plus text-base"></i><span class="text-[9px] font-medium">Create</span></button>
                    <button onclick="toggleGlobalNotificationDrawer()" class="w-12 h-12 rounded-xl flex flex-col items-center justify-center text-slate-400 hover:text-gray-100 hover:bg-slate-800/40 relative transition-all gap-1"><i class="fa-solid fa-bell text-base"></i><span class="text-[9px] font-medium">Updates</span><span class="absolute top-2 right-3 w-1.5 h-1.5 bg-amber-500 rounded-full animate-pulse"></span></button>
                    <button onclick="navigateToAppSection('boards')" class="w-12 h-12 rounded-xl flex flex-col items-center justify-center text-slate-400 hover:text-gray-100 hover:bg-slate-800/40 transition-all gap-1"><i class="fa-solid fa-chart-pie text-base"></i><span class="text-[9px] font-medium">Analytics</span></button>
                </div>
            </div>
            <button onclick="navigateToAppSection('settings')" class="w-12 h-12 rounded-xl flex flex-col items-center justify-center text-slate-500 hover:text-amber-500 transition-all gap-1"><i class="fa-solid fa-gear text-base"></i><span class="text-[9px] font-medium">Settings</span></button>
        </aside>

        <div id="updatesDrawerPanel" class="fixed inset-y-0 left-20 w-80 bg-[#070a13] border-r border-slate-900/90 z-40 transform -translate-x-full transition-transform duration-300 ease-out shadow-2xl flex flex-col p-5">
            <div class="flex items-center justify-between border-b border-slate-800 pb-3 mb-4"><span class="font-bold text-xs text-gray-400 uppercase tracking-wider">Live Updates</span><button onclick="toggleGlobalNotificationDrawer()" class="text-slate-500"><i class="fa-solid fa-xmark"></i></button></div>
            <div id="updatesTimelineWrapper" class="flex-1 overflow-y-auto space-y-3"></div>
        </div>

        <div id="premiumUploadSideDrawer" class="fixed inset-y-0 left-20 w-88 bg-[#070a13] border-r border-slate-900 z-40 transform -translate-x-full transition-transform duration-300 ease-out shadow-2xl flex flex-col p-6">
            <div class="flex items-center justify-between border-b border-slate-800 pb-4 mb-5"><span class="font-bold text-xs text-gray-200 uppercase brand-font">Upload Studio</span><button onclick="closeLeftSliderUploadEngine()" class="text-slate-500"><i class="fa-solid fa-xmark"></i></button></div>
            <form onsubmit="handleLocalFormUploadSubmit(event)" class="space-y-4">
                <div><label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Asset Title</label><input type="text" id="formUploadTitle" required class="w-full px-3 py-2 bg-[#111827] border border-slate-800 rounded-xl text-xs text-gray-200 outline-none focus:border-amber-500"></div>
                <div class="relative w-full h-56 border-2 border-dashed border-slate-800 rounded-2xl flex flex-col items-center justify-center bg-slate-950/40 cursor-pointer overflow-hidden group">
                    <img id="formLiveImagePreview" class="hidden absolute inset-0 w-full h-full object-cover z-10">
                    <input type="file" id="formFileInputTrigger" accept="image/*" required onchange="processLocalFileSelection(this)" class="absolute inset-0 opacity-0 cursor-pointer z-20">
                    <div class="flex flex-col items-center gap-2 text-center p-4 z-0">
                        <i class="fa-solid fa-cloud-arrow-up text-amber-500 text-2xl group-hover:scale-110 transition-transform"></i>
                        <span class="text-[11px] text-slate-400 font-medium">Click or Drag wallpaper here</span>
                    </div>
                </div>
                <button type="submit" id="formSubmitBtn" class="w-full py-3 bg-amber-500 text-neutral-900 font-bold text-xs rounded-xl uppercase tracking-wider transition-opacity hover:opacity-90">Publish to Grid</button>
            </form>
        </div>

        <div id="mainContentScrollNode" class="flex-1 flex flex-col relative">
            
            <header id="mainHeaderNode" class="sticky top-0 z-30 px-8 py-4 bg-[#0b0f19]/90 backdrop-blur-md flex items-center justify-between gap-4 border-b border-slate-900/60 transition-colors duration-300">
                <div onclick="forceResetToHomeGrid()" class="iphone-script-font text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-amber-400 to-amber-500 cursor-pointer hidden md:block">Lusso</div>
                <div class="flex-1 relative max-w-xl">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="text" id="appSearchEngineInput" oninput="executeLiveSearchQuery()" class="w-full pl-11 pr-4 py-2.5 bg-[#111827] border border-slate-800 rounded-full text-xs text-gray-200 outline-none" placeholder="Search elite assets...">
                </div>
                <div class="flex items-center gap-2 relative">
                    <div id="navUserInitial" onclick="navigateToAppSection('boards')" class="w-8 h-8 rounded-full bg-amber-500/10 border border-amber-500/30 flex items-center justify-center text-amber-400 font-bold text-xs cursor-pointer">T</div>
                    <button onclick="toggleTopProfileDropdownMenu(event)" class="w-7 h-7 rounded-full flex items-center justify-center hover:bg-slate-800 text-slate-400 transition-colors"><i class="fa-solid fa-ellipsis-vertical text-xs"></i></button>
                    <div id="topProfileDropdownNode" class="hidden absolute right-0 top-10 w-44 bg-[#070a13] border border-slate-800 rounded-xl shadow-2xl py-1.5 z-50">
                        <button onclick="navigateToAppSection('settings')" class="w-full text-left px-3 py-2 text-[10px] font-bold text-gray-300 hover:bg-slate-900 flex items-center gap-2 uppercase border-b border-slate-900"><i class="fa-solid fa-user-gear text-amber-500"></i> Edit Profile</button>
                        <button onclick="navigateToAppSection('boards')" class="w-full text-left px-3 py-2 text-[10px] font-bold text-gray-300 hover:bg-slate-900 flex items-center gap-2 uppercase"><i class="fa-solid fa-images text-amber-500"></i> Active Boards</button>
                    </div>
                </div>
            </header>

            <div id="dashboardSection" class="w-full app-view-block p-6">
                <div id="pinterestMainMasonryContainer" class="pinterest-grid"></div>
            </div>

            <div id="boardsSection" class="hidden w-full app-view-block p-8">
                <div class="flex justify-between items-center border-b border-slate-900 pb-6 mb-6">
                    <div><h1 class="text-xl font-bold text-gray-100 brand-font" id="boardsProfileName">Tejendar Prajapati</h1><p class="text-[10px] text-amber-500/70 uppercase">Elite Creator</p></div>
                    <button onclick="triggerNotificationToast('Custom board pipeline integration ready.')" class="px-5 py-2.5 bg-amber-500 text-neutral-900 font-bold text-xs rounded-xl uppercase">+ Create Board</button>
                </div>
                <div class="flex gap-4 border-b border-slate-900 pb-2 mb-6"><button onclick="toggleSavedProfileTabs('pins')" id="tabBtn-pins" class="text-xs font-bold text-amber-500 border-b-2 border-amber-500 pb-2 px-2">PINS</button><button onclick="toggleSavedProfileTabs('boards')" id="tabBtn-boards" class="text-xs font-bold text-gray-400 pb-2 px-2">BOARDS</button></div>
                <div id="tabContent-pins" class="pinterest-grid"></div>
                <div id="tabContent-boards" class="hidden grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6"></div>
            </div>

            <div id="detailSection" class="hidden w-full app-view-block p-6">
                <button onclick="triggerBackNavigation()" class="mb-6 px-4 py-2 bg-slate-900 border border-slate-800 text-gray-300 font-bold text-xs rounded-xl flex items-center gap-2"><i class="fa-solid fa-arrow-left text-amber-500"></i> Back</button>
                <div class="grid grid-cols-1 md:grid-cols-12 gap-8 items-start">
                    <div class="md:col-span-6 bg-slate-950/40 rounded-2xl p-4 flex items-center justify-center border border-slate-900"><img id="detailPreviewImageNode" src="" class="max-w-full max-h-[75vh] object-contain rounded-xl shadow-2xl"></div>
                    <div class="md:col-span-3 bg-[#070a13] border border-slate-900 rounded-xl p-5" id="detailInteractiveControlBox">
                        <h2 id="detailAssetTitleText" class="text-sm font-bold text-gray-200 mb-6 truncate brand-font">Matrix Detail</h2>
                        <div class="space-y-2">
                            <a id="directDownloadLinkNode" target="_blank" download class="w-full text-left px-4 py-3 platform-btn text-xs font-bold text-gray-300 bg-white/5 border border-slate-800 hover:bg-slate-800 rounded-xl flex items-center gap-3"><i class="fa-solid fa-circle-down text-amber-500"></i> Download Full Image</a>
                            <button onclick="triggerNotificationToast('Saved to your profile array')" class="w-full text-left px-4 py-3 text-xs font-bold text-gray-300 bg-white/5 border border-slate-800 hover:bg-slate-800 rounded-xl flex items-center gap-3"><i class="fa-solid fa-folder-plus text-amber-500"></i> Save to Board</button>
                            <button onclick="copyAssetLinkToClipboard()" class="w-full text-left px-4 py-3 text-xs font-bold text-gray-300 bg-white/5 border border-slate-800 hover:bg-slate-800 rounded-xl flex items-center gap-3"><i class="fa-solid fa-link text-amber-500"></i> Copy Asset Link</button>
                        </div>
                    </div>
                    <div class="md:col-span-3"><span class="text-[10px] font-bold uppercase text-slate-500 block mb-3 border-b border-slate-900 pb-1 tracking-widest">More Stream</span><div id="sideCascadedStreamGrid" class="flex flex-col gap-4"></div></div>
                </div>
            </div>

            <div id="settingsSection" class="hidden w-full app-view-block min-h-screen flex flex-col md:flex-row">
                <div id="settingsSidebarNode" class="w-full md:w-64 border-r border-slate-900 p-4 space-y-1 bg-[#070a13] flex-shrink-0 transition-colors duration-300">
                    <button onclick="showSettingTab('edit-profile')" class="settings-nav-btn settings-active" id="sbtn-edit-profile">Edit Profile</button>
                    <button onclick="showSettingTab('account')" class="settings-nav-btn" id="sbtn-account">Account Configurations</button>
                    <button onclick="showSettingTab('visibility')" class="settings-nav-btn" id="sbtn-visibility">Visibility Control</button>
                    <button onclick="showSettingTab('labs')" class="settings-nav-btn" id="sbtn-labs">Labs Canvas Theme</button>
                </div>
                <div class="flex-1 p-6 md:p-10 max-w-3xl overflow-y-auto"><div id="settingsTabContent" class="space-y-6"></div></div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://ezfxgevsjxfyluxprkls.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_jlyevQqezPjFmlqar5pmNw_EV8DTtVL"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allAssetsDatabaseMemory = [];
        let navigationHistoryBuffer = [];
        let selectedRawFileObject = null;
        let activeSelectedAssetUrlGlobal = "";
        
        let profile = JSON.parse(localStorage.getItem('lusso_profile')) || { 
            name: "Tejendar Prajapati", 
            about: "Elite System Designer & Computer Application Architect.",
            username: "prajapatitejendar",
            website: "https://github.com",
            email: "prajapatitejendar@gmail.com",
            birthdate: "2007-09-10",
            gender: "male",
            country: "India",
            privateProfile: false,
            bgColor: "#0b0f19"
        };

        let localLiveUpdatesTimeline = [
            { id: "101", title: "Cyberpunk Red Neon Horizon", date: "Just Now", img: "https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=400&q=80", targetUrl: "https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=1200&q=80" },
            { id: "102", title: "Dark Samurai Eclipse Armor", date: "1h ago", img: "https://images.unsplash.com/photo-1578632767115-351597cf2477?w=400&q=80", targetUrl: "https://images.unsplash.com/photo-1578632767115-351597cf2477?w=1200&q=80" }
        ];

        let customUserAlbumBoards = JSON.parse(localStorage.getItem('lusso_boards')) || {
            "Anime Array": [], "Vaporwave Grid": [], "Dark Aesthetics": []
        };

        function triggerNotificationToast(msg) {
            const node = document.getElementById('appGlobalToast');
            document.getElementById('toastMessageText').innerText = msg;
            node.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
            setTimeout(() => node.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4'), 3000);
        }

        function applyAdaptiveThemeColor(hexcolor) {
            profile.bgColor = hexcolor;
            localStorage.setItem('lusso_profile', JSON.stringify(profile));
            
            const r = parseInt(hexcolor.substr(1,2),16);
            const g = parseInt(hexcolor.substr(3,2),16);
            const b = parseInt(hexcolor.substr(5,2),16);
            const yiq = ((r*299)+(g*587)+(b*114))/1000;
            
            const isLight = yiq >= 128;
            const primaryTextColor = isLight ? "#0f172a" : "#f3f4f6";
            const secondaryTextColor = isLight ? "#475569" : "#94a3b8";
            const borderLinesColor = isLight ? "rgba(15, 23, 42, 0.15)" : "rgba(255, 255, 255, 0.1)";
            const secondaryContainers = isLight ? "#ffffff" : "#070a13";

            document.documentElement.style.setProperty('--bg-color', hexcolor);
            document.documentElement.style.setProperty('--text-primary', primaryTextColor);
            document.documentElement.style.setProperty('--text-secondary', secondaryTextColor);
            document.documentElement.style.setProperty('--border-color', borderLinesColor);

            document.getElementById('sidebarMainNode').style.backgroundColor = secondaryContainers;
            document.getElementById('updatesDrawerPanel').style.backgroundColor = secondaryContainers;
            document.getElementById('premiumUploadSideDrawer').style.backgroundColor = secondaryContainers;
            document.getElementById('settingsSidebarNode').style.backgroundColor = secondaryContainers;
            document.getElementById('mainHeaderNode').style.backgroundColor = hexcolor + "dd";
        }

        function navigateToAppSection(viewId) {
            document.querySelectorAll('.app-view-block').forEach(v => v.classList.add('hidden'));
            document.getElementById(`${viewId}Section`).classList.remove('hidden');
            const mainContent = document.getElementById('mainContentScrollNode');
            if(mainContent) mainContent.scrollTop = 0;
            closeAllOpenDrawers();
            if(viewId === 'boards') renderCustomUserBoardsMarkup();
            if(viewId === 'settings') showSettingTab('edit-profile');
        }

        function forceResetToHomeGrid() {
            document.getElementById('appSearchEngineInput').value = ""; 
            navigateToAppSection('dashboard');
            renderPinterestGridItems(allAssetsDatabaseMemory);
        }

        function closeAllOpenDrawers() {
            document.getElementById('updatesDrawerPanel').classList.add('-translate-x-full');
            document.getElementById('premiumUploadSideDrawer').classList.add('-translate-x-full');
            document.getElementById('topProfileDropdownNode').classList.add('hidden');
        }

        function toggleGlobalNotificationDrawer() {
            const panel = document.getElementById('updatesDrawerPanel');
            const hidden = panel.classList.contains('-translate-x-full');
            closeAllOpenDrawers(); if(hidden) panel.classList.remove('-translate-x-full');
        }

        function openLeftSliderUploadEngine() {
            closeAllOpenDrawers(); document.getElementById('premiumUploadSideDrawer').classList.remove('-translate-x-full');
        }

        function closeLeftSliderUploadEngine() {
            document.getElementById('premiumUploadSideDrawer').classList.add('-translate-x-full');
            selectedRawFileObject = null;
            document.getElementById('formLiveImagePreview').classList.add('hidden');
            document.getElementById('formUploadTitle').value = "";
        }

        function toggleTopProfileDropdownMenu(e) {
            e.stopPropagation();
            const node = document.getElementById('topProfileDropdownNode');
            const hidden = node.classList.contains('hidden');
            closeAllOpenDrawers(); if(hidden) node.classList.remove('hidden');
        }

        function updateGlobalUI() {
            const initial = profile.name.charAt(0).toUpperCase();
            document.getElementById('navUserInitial').innerText = initial;
            document.getElementById('boardsProfileName').innerText = profile.name;
        }

        function showSettingTab(tab) {
            document.querySelectorAll('.settings-nav-btn').forEach(b => b.classList.remove('settings-active'));
            const dynamicButtonNode = document.getElementById(`sbtn-${tab}`);
            if(dynamicButtonNode) dynamicButtonNode.classList.add('settings-active');
            
            const content = document.getElementById('settingsTabContent');
            
            switch(tab) {
                case 'edit-profile':
                    content.innerHTML = `
                        <h2 class="text-xl font-bold mb-1">Edit Profile</h2>
                        <p class="text-xs text-slate-400 mb-6">Modify platform public identities.</p>
                        <div class="space-y-4">
                            <div><label class="text-[10px] font-bold block mb-1 uppercase text-slate-400">Public Name</label><input type="text" id="setNameInput" class="w-full bg-[#111827] border border-slate-800 p-2.5 rounded-xl text-xs outline-none text-gray-200 focus:border-amber-500" value="${profile.name}"></div>
                            <div><label class="text-[10px] font-bold block mb-1 uppercase text-slate-400">Bio Description</label><textarea id="setAboutInput" rows="3" class="w-full bg-[#111827] border border-slate-800 p-2.5 rounded-xl text-xs outline-none text-gray-200 focus:border-amber-500">${profile.about}</textarea></div>
                            <div class="flex justify-end pt-2"><button onclick="saveEditProfileForm()" class="px-5 py-2 bg-amber-500 text-neutral-900 text-xs font-bold rounded-full uppercase tracking-wider">Save Alterations</button></div>
                        </div>`;
                    break;

                case 'account':
                    content.innerHTML = `
                        <h2 class="text-xl font-bold mb-4">Account Configurations</h2>
                        <div class="space-y-4">
                            <div><label class="text-[10px] font-bold block mb-1 text-slate-400">EMAIL ADDRESS</label><input type="email" id="setAccEmail" class="w-full bg-[#111827] border border-slate-800 p-2.5 rounded-xl text-xs text-gray-400 outline-none" value="${profile.email}"></div>
                            <div class="flex justify-end"><button onclick="triggerNotificationToast('Account variable synced')" class="px-5 py-2.5 bg-amber-500 text-neutral-900 text-xs font-bold rounded-full uppercase">Update Core</button></div>
                        </div>`;
                    break;

                case 'visibility':
                    content.innerHTML = `
                        <h2 class="text-xl font-bold mb-4">Visibility Engine</h2>
                        <div class="p-4 bg-slate-900/40 border border-slate-800 rounded-xl flex items-center justify-between">
                            <div><h4 class="text-xs font-bold">Private Array Status</h4><p class="text-[11px] text-slate-400">Restrict telemetry downloads from unknown sources.</p></div>
                            <input type="checkbox" id="tglPrivate" ${profile.privateProfile?'checked':''} onchange="profile.privateProfile=this.checked; localStorage.setItem('lusso_profile', JSON.stringify(profile)); triggerNotificationToast('Privacy updated');" class="w-4 h-4 accent-amber-500">
                        </div>`;
                    break;

                case 'labs':
                    content.innerHTML = `
                        <h2 class="text-xl font-bold mb-2">Labs Color Core</h2>
                        <div class="p-4 bg-slate-900/40 rounded-xl border border-slate-800 flex items-center gap-4">
                            <input type="color" oninput="applyAdaptiveThemeColor(this.value)" class="w-12 h-12 bg-transparent border-0 cursor-pointer" value="${profile.bgColor}">
                            <div><h4 class="text-xs font-bold">Live Grid Space Shading</h4><p class="text-[11px] text-slate-400">Calculates and renders contrasting layout fields automatically.</p></div>
                        </div>`;
                    break;
            }
        }

        function saveEditProfileForm() {
            profile.name = document.getElementById('setNameInput').value;
            profile.about = document.getElementById('setAboutInput').value;
            localStorage.setItem('lusso_profile', JSON.stringify(profile));
            updateGlobalUI();
            triggerNotificationToast("Profile metadata saved successfully.");
            navigateToAppSection('boards');
        }

        async function initializeApplicationDataEngine() {
            try {
                applyAdaptiveThemeColor(profile.bgColor);

                const { data, error } = await supabaseClient.from('wallpapers').select('*').order('created_at', { ascending: false });
                if(error) throw error;

                let dbData = data || [];
                let updatesAttached = localLiveUpdatesTimeline.map(u => ({ id: u.id, title: u.title, image_url: u.targetUrl }));
                allAssetsDatabaseMemory = [...updatesAttached, ...dbData];
                
                if(allAssetsDatabaseMemory.length === 0) {
                    allAssetsDatabaseMemory = [{ id: "fallback-01", title: "Cyber Vibe Matrix", image_url: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800&q=80" }];
                }
                
                renderPinterestGridItems(allAssetsDatabaseMemory);
                refreshUpdates();
                updateGlobalUI();
            } catch (err) { 
                console.error("Database Engine Mount Error:", err); 
                triggerNotificationToast("Offline mode active. Check your RLS policies or tables.");
            }
        }

        // Pinterest Native Fitting Layout Pipeline Generator
        function renderPinterestGridItems(list) {
            const container = document.getElementById('pinterestMainMasonryContainer');
            container.innerHTML = "";
            list.forEach(item => {
                const card = document.createElement('div');
                card.className = "pinterest-card group relative cursor-pointer";
                card.innerHTML = `
                    <div class="relative w-full overflow-hidden rounded-2xl bg-slate-900/40 border border-slate-800/40 shadow-md hover:shadow-xl transition-all duration-300">
                        <img src="${item.image_url}" onclick="openImageDetailStudioView('${item.id}', true)" class="w-full h-auto object-cover block hover:scale-[1.02] transition-transform duration-300" loading="lazy">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end p-3 pointer-events-none">
                            <p class="text-xs font-bold text-white truncate">${item.title}</p>
                        </div>
                    </div>
                    <div class="mt-1.5 px-1 flex justify-between items-center">
                        <span class="text-[11px] text-slate-300 font-semibold truncate max-w-[80%]">${item.title}</span>
                        <button onclick="window.open('${item.image_url}','_blank')" class="text-slate-500 hover:text-amber-500 transition-colors text-xs p-1"><i class="fa-solid fa-arrow-up-right-from-square"></i></button>
                    </div>`;
                container.appendChild(card);
            });
        }

        function openImageDetailStudioView(id, clearHistory = false) {
            const item = allAssetsDatabaseMemory.find(w => w.id.toString() === id.toString());
            if (!item) return;
            if (clearHistory) navigationHistoryBuffer = [];
            navigationHistoryBuffer.push(id);
            navigateToAppSection('detail');
            
            activeSelectedAssetUrlGlobal = item.image_url;
            document.getElementById('detailPreviewImageNode').src = item.image_url;
            document.getElementById('detailAssetTitleText').innerText = item.title;
            document.getElementById('directDownloadLinkNode').href = item.image_url;
            
            renderStream(item.id);
        }

        function copyAssetLinkToClipboard() {
            navigator.clipboard.writeText(activeSelectedAssetUrlGlobal);
            triggerNotificationToast("Asset CDN Link Copied!");
        }

        function renderStream(currentId) {
            const container = document.getElementById('sideCascadedStreamGrid'); container.innerHTML = "";
            let items = allAssetsDatabaseMemory.filter(w => w.id.toString() !== currentId.toString()).slice(0, 4);
            items.forEach(item => {
                container.innerHTML += `<div class="w-full rounded-xl overflow-hidden border border-slate-800/60 bg-slate-950/40"><img src="${item.image_url}" onclick="openImageDetailStudioView('${item.id}', false)" class="w-full h-auto object-cover cursor-pointer hover:opacity-80 transition-opacity"></div>`;
            });
        }

        function renderCustomUserBoardsMarkup() {
            toggleSavedProfileTabs('pins');
            const gBoards = document.getElementById('tabContent-boards'); gBoards.innerHTML = "";
            Object.keys(customUserAlbumBoards).forEach(bName => {
                gBoards.innerHTML += `<div class="bg-[#070a13] border border-slate-800 rounded-2xl p-4 flex flex-col justify-between h-36"><div><h3 class="font-bold text-xs truncate brand-font text-slate-200">${bName}</h3><p class="text-[9px] text-amber-500 font-bold uppercase mt-1">0 Verified Pins</p></div><button class="w-full py-2 bg-slate-900 text-gray-400 font-bold text-[10px] rounded-xl border border-slate-800 hover:text-white transition-colors">Access Sector</button></div>`;
            });
        }

        function toggleSavedProfileTabs(name) {
            document.getElementById('tabBtn-pins').className = "text-xs font-bold text-gray-400 pb-2 px-2";
            document.getElementById('tabBtn-boards').className = "text-xs font-bold text-gray-400 pb-2 px-2";
            document.getElementById('tabContent-pins').classList.add('hidden');
            document.getElementById('tabContent-boards').classList.add('hidden');
            document.getElementById(`tabBtn-${name}`).className = "text-xs font-bold text-amber-500 border-b-2 border-amber-500 pb-2 px-2";
            document.getElementById(`tabContent-${name}`).classList.remove('hidden');
            
            if(name === 'pins') {
                const pinsContainer = document.getElementById('tabContent-pins'); pinsContainer.innerHTML = "";
                allAssetsDatabaseMemory.slice(0, 8).forEach(w => {
                    pinsContainer.innerHTML += `<div class="pinterest-card overflow-hidden rounded-2xl border border-slate-800/60 shadow"><img src="${w.image_url}" class="w-full object-cover"></div>`;
                });
            }
        }

        function processLocalFileSelection(input) {
            if (input.files && input.files[0]) {
                selectedRawFileObject = input.files[0];
                const reader = new FileReader();
                reader.onload = (e) => { 
                    document.getElementById('formLiveImagePreview').src = e.target.result; 
                    document.getElementById('formLiveImagePreview').classList.remove('hidden'); 
                };
                reader.readAsDataURL(selectedRawFileObject);
            }
        }

        // Robust Supabase Storage Syncing Core Engine
        async function handleLocalFormUploadSubmit(e) {
            e.preventDefault();
            if (!selectedRawFileObject) {
                triggerNotificationToast("Select a compilation asset first.");
                return;
            }

            const title = document.getElementById('formUploadTitle').value.trim();
            const submitBtn = document.getElementById('formSubmitBtn');
            
            try {
                submitBtn.disabled = true;
                submitBtn.innerText = "UPLOADING PIPELINE...";
                triggerNotificationToast("Uploading asset to Supabase Array...");

                const fileExtension = selectedRawFileObject.name.split('.').pop();
                const uniqueFileName = `${Date.now()}-${Math.random().toString(36).substr(2, 9)}.${fileExtension}`;

                // Injecting asset binary into 'wallpapers' bucket
                const { data: storageData, error: storageError } = await supabaseClient
                    .storage
                    .from('wallpapers')
                    .upload(uniqueFileName, selectedRawFileObject, {
                        cacheControl: '3600',
                        upsert: false
                    });

                if (storageError) {
                    if (storageError.message.includes("not found")) {
                        alert("Error: Supabase Storage me 'wallpapers' naam ka bucket nahi mila. Kripya use banayein aur status public karein!");
                    } else {
                        alert("Storage Error: Kripya bucket ki RLS (Row Level Security) policies check karein aur use INSERT/SELECT access allow karein! Msg: " + storageError.message);
                    }
                    throw storageError;
                }

                const { data: urlData } = supabaseClient
                    .storage
                    .from('wallpapers')
                    .getPublicUrl(uniqueFileName);

                const publicImageUrl = urlData.publicUrl;

                // Inserting structural data row into database table
                const { error: dbError } = await supabaseClient
                    .from('wallpapers')
                    .insert([{ title: title, image_url: publicImageUrl }]);

                if (dbError) {
                    alert("Database Error: Database 'wallpapers' table me insert operations standard nahi hain. Check RLS policies!");
                    throw dbError;
                }

                triggerNotificationToast("Asset Published Successfully!");
                closeLeftSliderUploadEngine();
                
                await initializeApplicationDataEngine(); 
                navigateToAppSection('dashboard');

            } catch (err) {
                console.error("Critical Failure Details:", err);
                triggerNotificationToast(err.message || "Pipeline Upload Failed.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "PUBLISH TO GRID";
            }
        }

        function refreshUpdates() {
            const wrapper = document.getElementById('updatesTimelineWrapper'); wrapper.innerHTML = "";
            localLiveUpdatesTimeline.forEach(item => {
                wrapper.innerHTML += `
                    <div onclick="openImageDetailStudioView('${item.id}', true)" class="p-2 bg-slate-900/40 rounded-xl flex gap-3 items-center border border-slate-800/60 cursor-pointer hover:border-amber-500/40 transition-colors">
                        <img src="${item.img}" class="w-10 h-12 object-cover rounded-md flex-shrink-0">
                        <div class="min-w-0 flex-1">
                            <h4 class="text-xs font-semibold text-slate-200 truncate">${item.title}</h4>
                            <span class="text-[9px] font-bold text-slate-500 block mt-0.5">${item.date} • <span class="text-amber-500">Inspect Node</span></span>
                        </div>
                    </div>`;
            });
        }

        function executeLiveSearchQuery() {
            const query = document.getElementById('appSearchEngineInput').value.toLowerCase().trim();
            renderPinterestGridItems(allAssetsDatabaseMemory.filter(item => item.title.toLowerCase().includes(query)));
        }

        function triggerBackNavigation() {
            navigationHistoryBuffer.pop();
            if (navigationHistoryBuffer.length > 0) openImageDetailStudioView(navigationHistoryBuffer.pop(), false);
            else forceResetToHomeGrid();
        }

        window.onload = () => initializeApplicationDataEngine();
    </script>
</body>
