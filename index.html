<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUSSO | Premium Matrix Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@500;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #05070c;
            --sidebar-color: #020306;
            --card-bg: #0b0f19;
            --text-primary: #f3f4f6;
            --text-secondary: #94a3b8;
            --gold-primary: #dfb76c;
            --gold-light: #f7e7c4;
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-primary); 
            font-family: 'Poppins', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        #mainContentScrollNode { height: 100vh; overflow-y: auto; scroll-behavior: smooth; }
        .luxury-brand-title {
            font-family: 'Cinzel Decorative', serif;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #f7e7c4 0%, #dfb76c 50%, #b2873f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 10px rgba(223, 183, 108, 0.3));
            transition: all 0.4s ease;
        }
        .luxury-brand-icon {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            background: linear-gradient(135deg, #f7e7c4 0%, #dfb76c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .pinterest-grid { column-gap: 16px; width: 100%; }
        .pinterest-card { break-inside: avoid; margin-bottom: 16px; width: 100%; display: block; position: relative; }
        #mainContentScrollNode::-webkit-scrollbar { width: 6px; }
        #mainContentScrollNode::-webkit-scrollbar-thumb { background: rgba(223, 183, 108, 0.2); border-radius: 10px; }
        
        /* Smooth Custom Scrollbar for Lightbox Content */
        .custom-lightbox-scroll::-webkit-scrollbar { width: 6px; }
        .custom-lightbox-scroll::-webkit-scrollbar-thumb { background: #dfb76c; border-radius: 10px; }

        .slide-panel-node {
            position: fixed; top: 0; left: 80px; width: calc(100% - 80px); height: 100vh;
            background-color: #05070c; z-index: 40; transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); overflow-y: auto;
        }
        .slide-panel-node.active-slide { transform: translateX(0); }
        .skeleton-shimmer-node {
            background: linear-gradient(90deg, #0b0f19 25%, #1e293b 50%, #0b0f19 75%);
            background-size: 200% 100%; animation: lussoLoadingShimmer 1.5s infinite linear;
        }
        @keyframes lussoLoadingShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

    <div id="appGlobalToast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-amber-500 text-neutral-900 text-xs font-bold px-6 py-3 rounded-full shadow-2xl z-[999] opacity-0 pointer-events-none transition-all duration-300 transform translate-y-4">
        <span id="toastMessageText">Syncing...</span>
    </div>

    <div id="premiumLightboxModal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-[150] p-4 md:p-8" onclick="closePremiumLightbox()">
        <button class="absolute top-6 right-6 text-slate-400 hover:text-white text-3xl transition z-[160]" onclick="closePremiumLightbox()"><i class="fa-solid fa-xmark"></i></button>
        
        <button onclick="navigateLightboxAsset(-1, event)" class="absolute left-6 top-1/2 -translate-y-1/2 w-12 h-12 bg-neutral-900/80 border border-neutral-800 rounded-full flex items-center justify-center text-white text-xl hover:bg-white hover:text-black transition z-[160]"><i class="fa-solid fa-chevron-left"></i></button>
        <button onclick="navigateLightboxAsset(1, event)" class="absolute right-6 top-1/2 -translate-y-1/2 w-12 h-12 bg-neutral-900/80 border border-neutral-800 rounded-full flex items-center justify-center text-white text-xl hover:bg-white hover:text-black transition z-[160]"><i class="fa-solid fa-chevron-right"></i></button>

        <div class="max-w-4xl w-full h-[90vh] bg-[#0b0f19] border border-slate-800/80 rounded-3xl shadow-2xl overflow-y-auto custom-lightbox-scroll" onclick="event.stopPropagation()">
            <div class="flex flex-col md:flex-row border-b border-slate-900">
                <div class="w-full md:w-1/2 bg-black/40 flex items-center justify-center p-6 min-h-[45vh]">
                    <img id="lightboxImage" src="" class="max-w-full max-h-[60vh] object-contain rounded-2xl shadow-lg">
                </div>
                <div class="w-full md:w-1/2 p-8 flex flex-col justify-between bg-[#070a12]">
                    <div>
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-xs font-bold text-amber-500 uppercase tracking-widest">Premium Node</span>
                            <div class="flex gap-2">
                                <button class="w-9 h-9 bg-slate-900 hover:bg-slate-800 text-white rounded-full flex items-center justify-center transition"><i class="fa-solid fa-ellipsis"></i></button>
                                <button onclick="saveFromLightbox()" class="px-5 py-2 bg-[#e60023] hover:bg-[#b6001a] text-white font-bold text-xs rounded-full transition">Save</button>
                            </div>
                        </div>
                        <h2 id="lightboxTitle" class="text-2xl font-bold text-white tracking-wide uppercase">Asset Title</h2>
                        <p class="text-xs text-slate-400 mt-3 leading-relaxed">High fidelity ultra-premium environment resource allocation grid mapping verified pipeline output.</p>
                    </div>
                    <div class="mt-8">
                        <button onclick="downloadFromLightbox()" class="w-full py-3.5 bg-amber-500 hover:bg-amber-400 text-black font-bold text-xs rounded-xl uppercase tracking-wider flex items-center justify-center gap-2 transition shadow-lg shadow-amber-500/10"><i class="fa-solid fa-download"></i> Download Matrix Asset</button>
                    </div>
                </div>
            </div>

            <div class="p-8 bg-[#05070c]">
                <h3 class="text-sm font-bold text-gray-300 uppercase tracking-wider mb-6 text-center">More Like This</h3>
                <div id="lightboxRelatedGridStream" class="pinterest-grid">
                    </div>
            </div>
        </div>
    </div>

    <div class="flex h-screen w-full">
        <aside id="sidebarMainNode" class="w-20 flex flex-col items-center justify-between py-6 bg-[#020306] border-r border-slate-900/60 z-50">
            <div class="flex flex-col items-center gap-6 w-full">
                <div onclick="forceResetToHomeGrid()" class="w-10 h-10 rounded-full border border-amber-500/30 flex items-center justify-center cursor-pointer hover:border-amber-400/80 transition">
                    <span class="luxury-brand-icon text-lg">L</span>
                </div>
                <div class="flex flex-col items-center gap-3 w-full">
                    <button onclick="forceResetToHomeGrid()" class="sidebar-btn w-14 h-14 rounded-xl flex flex-col items-center justify-center text-amber-500/90 hover:bg-slate-900/40 gap-0.5 transition"><i class="fa-solid fa-house text-sm"></i><span class="text-[9px]">Home</span></button>
                    <button onclick="openLeftSliderUploadEngine()" class="sidebar-btn w-14 h-14 rounded-xl flex flex-col items-center justify-center text-slate-400 hover:text-emerald-400 gap-0.5 transition"><i class="fa-solid fa-square-plus text-sm"></i><span class="text-[9px]">Create</span></button>
                    <button onclick="navigateToAppSection('explore')" class="sidebar-btn w-14 h-14 rounded-xl flex flex-col items-center justify-center text-slate-400 hover:text-cyan-400 gap-0.5 transition"><i class="fa-solid fa-compass text-sm"></i><span class="text-[9px]">Explore</span></button>
                    <button onclick="openYourBoardsPanelSection()" class="sidebar-btn w-14 h-14 rounded-xl flex flex-col items-center justify-center text-slate-400 hover:text-rose-400 gap-0.5 transition"><i class="fa-solid fa-folder-heart text-sm"></i><span class="text-[9px]">Boards</span></button>
                    <button onclick="openUpdatesNotificationDrawer()" class="sidebar-btn w-14 h-14 rounded-xl flex flex-col items-center justify-center text-slate-400 hover:text-amber-400 gap-0.5 transition relative">
                        <i class="fa-solid fa-bell text-sm"></i><span class="text-[9px]">Updates</span>
                        <span id="notificationBadge" class="hidden absolute top-2 right-3 w-2 h-2 bg-amber-500 rounded-full"></span>
                    </button>
                </div>
            </div>
            <button onclick="openSlidePanelAnimationLayer('settingsSection')" class="sidebar-btn w-12 h-12 rounded-xl flex flex-col items-center justify-center text-slate-500 hover:text-amber-500 gap-1 transition"><i class="fa-solid fa-gear text-sm"></i><span class="text-[9px]">Settings</span></button>
        </aside>

        <div id="updatesNotificationDrawerPanel" class="fixed inset-y-0 left-20 w-80 bg-[#020306] border-r border-slate-900/80 z-40 transform -translate-x-full transition-transform duration-300 p-5 overflow-y-auto">
            <div class="flex items-center justify-between border-b border-slate-800/80 pb-3 mb-4">
                <span class="font-bold text-sm text-gray-200 tracking-wide">Updates</span>
                <button onclick="closeUpdatesNotificationDrawer()" class="text-slate-500 hover:text-white transition"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="updatesNotificationsContainerList" class="space-y-3"></div>
        </div>

        <div id="premiumUploadSideDrawer" class="fixed inset-y-0 left-20 w-88 bg-[#020306] border-r border-slate-900 z-40 transform -translate-x-full transition-transform duration-300 p-6">
            <div class="flex items-center justify-between border-b border-slate-800 pb-4 mb-5"><span class="font-bold text-xs text-amber-400 uppercase tracking-wider">Upload Terminal</span><button onclick="closeLeftSliderUploadEngine()" class="text-slate-500 hover:text-white transition"><i class="fa-solid fa-xmark"></i></button></div>
            <form onsubmit="handleLocalFormUploadSubmit(event)" class="space-y-4">
                <input type="text" id="formUploadTitle" placeholder="Asset Title" required class="w-full px-3 py-2 bg-[#0b0f19] border border-slate-800 rounded-xl text-xs outline-none text-white focus:border-amber-500 transition">
                <div class="relative w-full h-56 border-2 border-dashed border-slate-800 rounded-2xl flex items-center justify-center bg-slate-950/40 cursor-pointer overflow-hidden hover:border-amber-500/50 transition">
                    <img id="formLiveImagePreview" class="hidden absolute inset-0 w-full h-full object-cover z-10">
                    <input type="file" id="formFileInputTrigger" accept="image/*" required onchange="processLocalFileSelection(this)" class="absolute inset-0 opacity-0 z-20 cursor-pointer">
                    <div class="text-center p-4"><i class="fa-cloud-arrow-up fa-solid text-amber-500 text-2xl"></i><p class="text-[10px] text-slate-500 mt-2">Select Wall Asset</p></div>
                </div>
                <button type="submit" id="formSubmitBtn" class="w-full py-3 bg-amber-500 hover:bg-amber-400 text-black font-bold text-xs rounded-xl uppercase tracking-wider transition">Publish Asset</button>
            </form>
        </div>

        <div id="mainContentScrollNode" class="flex-1 flex flex-col relative" onscroll="handleWindowInfiniteScrollTrigger()">
            <header id="mainHeaderNode" class="sticky top-0 z-30 px-8 py-4 bg-[#05070c]/90 backdrop-blur-md flex items-center justify-between gap-4 border-b border-slate-900/40">
                <div onclick="forceResetToHomeGrid()" class="luxury-brand-title text-2xl md:text-3xl cursor-pointer">Lusso</div>
                <div class="flex-1 relative max-w-xl mx-4">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input type="text" id="appSearchEngineInput" oninput="executeLiveSearchQuery(this.value)" class="w-full pl-11 pr-4 py-2 bg-[#0b0f19] border border-slate-800 rounded-full text-xs text-gray-200 outline-none focus:border-slate-700 transition" placeholder="Search elite matrices...">
                </div>
                <button class="px-5 py-2 border border-amber-500/30 text-amber-400/90 font-bold text-xs rounded-full tracking-wider">ACCOUNT NODE</button>
            </header>

            <div id="dashboardSection" class="w-full app-view-block p-6">
                <div id="pinterestMainMasonryContainer" class="pinterest-grid"></div>
                <div id="infiniteScrollLoadStatusIndicator" class="hidden w-full py-8" style="column-count: 4;">
                    <div class="pinterest-card h-64 rounded-2xl skeleton-shimmer-node"></div>
                    <div class="pinterest-card h-80 rounded-2xl skeleton-shimmer-node"></div>
                </div>
            </div>

            <div id="exploreSection" class="hidden w-full app-view-block p-6">
                <div class="max-w-4xl mx-auto mb-8 bg-gradient-to-r from-amber-500/10 to-transparent p-6 rounded-3xl border border-amber-500/10">
                    <h2 class="text-xl text-amber-400 font-bold mb-2 uppercase tracking-wide">Explore Premium Matrices</h2>
                    <div class="relative w-full max-w-md">
                        <i class="fa-solid fa-compass absolute left-4 top-1/2 -translate-y-1/2 text-amber-500"></i>
                        <input type="text" id="exploreSearchEngineInput" oninput="executeLiveSearchQuery(this.value)" class="w-full pl-10 pr-4 py-2 bg-[#0b0f19] border border-slate-800 rounded-xl text-xs text-gray-200 outline-none focus:border-amber-500 transition" placeholder="Explore specific tags or labels...">
                    </div>
                </div>
                <div id="exploreMasonryContainerGrid" class="pinterest-grid"></div>
            </div>

            <div id="yourBoardsSection" class="hidden w-full app-view-block p-6">
                <div class="border-b border-slate-800 pb-4 mb-8 flex items-center justify-between">
                    <h1 class="text-2xl text-rose-400 font-bold"><i class="fa-solid fa-folder-heart mr-2"></i>Vault Boards</h1>
                    <button onclick="clearAllSavedBoardsStorage()" class="text-slate-500 hover:text-red-400 text-xs transition border border-slate-800 rounded-full px-4 py-1.5">Clear Board</button>
                </div>
                <div id="yourSavedPinsMasonryGrid" class="pinterest-grid"></div>
            </div>
        </div>

        <div id="settingsSection" class="slide-panel-node p-6 md:p-12">
            <div class="max-w-5xl mx-auto relative">
                <button onclick="closeSlidePanelAnimationLayer()" class="absolute top-0 right-0 bg-slate-900 border border-slate-800 w-10 h-10 rounded-full flex items-center justify-center text-slate-400 hover:text-white transition"><i class="fa-solid fa-xmark"></i></button>
                <div class="border-b border-slate-800 pb-4 mb-8"><h1 class="text-2xl text-amber-400 font-bold uppercase tracking-wide">Configuration</h1></div>
                <div class="bg-[#0b0f19] border border-slate-800 rounded-3xl p-6">
                    <h3 class="text-xs font-bold uppercase text-slate-400 mb-3">Grid Density Modification</h3>
                    <div class="grid grid-cols-4 gap-2 max-w-sm">
                        <button onclick="updateGridDensityLayout(2)" class="p-2 bg-slate-800 rounded-xl text-xs font-bold transition">2 Col</button>
                        <button onclick="updateGridDensityLayout(3)" class="p-2 bg-slate-800 rounded-xl text-xs font-bold transition">3 Col</button>
                        <button onclick="updateGridDensityLayout(4)" class="p-2 bg-amber-500 text-black rounded-xl text-xs font-bold transition">4 Col</button>
                        <button onclick="updateGridDensityLayout(5)" class="p-2 bg-slate-800 rounded-xl text-xs font-bold transition">5 Col</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://ezfxgevsjxfyluxprkls.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_jlyevQqezPjFmlqar5pmNw_EV8DTtVL"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allAssetsDatabaseMemory = [];
        let displayedAssetsMemory = []; 
        let currentForcedGridDensity = null; 
        const ITEMS_PER_PAGE = 12;
        let currentPaginationPage = 1;
        let isInfiniteScrollLoadingActive = false;
        let isDatabaseCompletelyExhausted = false;
        let activeFilterSearchQuery = "";
        let currentActiveIndexInLightbox = -1;

        function triggerNotificationToast(msg) {
            const node = document.getElementById('appGlobalToast');
            document.getElementById('toastMessageText').innerText = msg;
            node.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => node.classList.add('opacity-0', 'translate-y-4'), 3000);
        }

        function openSlidePanelAnimationLayer(id) {
            closeSlidePanelAnimationLayer();
            const target = document.getElementById(id);
            if(target) target.classList.add('active-slide');
        }

        function closeSlidePanelAnimationLayer() {
            document.querySelectorAll('.slide-panel-node').forEach(panel => panel.classList.remove('active-slide'));
        }

        function updateGridDensityLayout(columns) {
            currentForcedGridDensity = columns;
            applyDynamicColumnsStyle(columns);
        }

        function applyDynamicColumnsStyle(cols) {
            document.querySelectorAll('.pinterest-grid').forEach(g => { g.style.columnCount = cols; });
        }

        function navigateToAppSection(id) {
            closeSlidePanelAnimationLayer();
            closeUpdatesNotificationDrawer();
            document.querySelectorAll('.app-view-block').forEach(v => v.classList.add('hidden'));
            const targetSection = document.getElementById(id + 'Section');
            if(targetSection) targetSection.classList.remove('hidden');
            if(currentForcedGridDensity) applyDynamicColumnsStyle(currentForcedGridDensity);
            
            if(id === 'explore') {
                renderGrid(allAssetsDatabaseMemory.slice(0, 8), 'exploreMasonryContainerGrid', false);
            }
        }

        function forceResetToHomeGrid() { navigateToAppSection('dashboard'); }
        function openLeftSliderUploadEngine() { document.getElementById('premiumUploadSideDrawer').classList.remove('-translate-x-full'); }
        function closeLeftSliderUploadEngine() { document.getElementById('premiumUploadSideDrawer').classList.add('-translate-x-full'); }

        function openUpdatesNotificationDrawer() {
            closeLeftSliderUploadEngine();
            document.getElementById('updatesNotificationDrawerPanel').classList.remove('-translate-x-full');
            document.getElementById('notificationBadge').classList.add('hidden');
            populateUpdatesNotificationPanelItems();
        }

        function closeUpdatesNotificationDrawer() {
            document.getElementById('updatesNotificationDrawerPanel').classList.add('-translate-x-full');
        }

        // PINTEREST STYLE MODAL DISPLAY METHOD
        function openPremiumLightbox(id) {
            currentActiveIndexInLightbox = allAssetsDatabaseMemory.findIndex(w => w.id == id);
            if (currentActiveIndexInLightbox === -1) return;
            
            const item = allAssetsDatabaseMemory[currentActiveIndexInLightbox];
            document.getElementById('lightboxImage').src = item.image_url;
            document.getElementById('lightboxTitle').innerText = item.title || "Untitled Asset";
            document.getElementById('premiumLightboxModal').classList.remove('hidden');
            
            // Generate clean masonry flow streams underneath recommendations list
            const innerStreamGrid = document.getElementById('lightboxRelatedGridStream');
            innerStreamGrid.innerHTML = "";
            const relatedElements = allAssetsDatabaseMemory.filter(w => w.id != item.id).slice(0, 8);
            
            relatedElements.forEach(rel => {
                const card = document.createElement('div');
                card.className = "pinterest-card group cursor-pointer";
                card.innerHTML = `
                    <div class="relative w-full overflow-hidden rounded-2xl bg-[#141a29] border border-slate-800/40">
                        <img src="${rel.image_url}" onclick="openPremiumLightbox('${rel.id}')" class="w-full h-auto block hover:scale-105 transition-all duration-500 rounded-2xl">
                    </div>
                `;
                innerStreamGrid.appendChild(card);
            });
            innerStreamGrid.style.columnCount = 3;
        }

        function navigateLightboxAsset(direction, event) {
            if(event) event.stopPropagation();
            if(allAssetsDatabaseMemory.length === 0) return;
            currentActiveIndexInLightbox += direction;
            if(currentActiveIndexInLightbox < 0) currentActiveIndexInLightbox = allAssetsDatabaseMemory.length - 1;
            if(currentActiveIndexInLightbox >= allAssetsDatabaseMemory.length) currentActiveIndexInLightbox = 0;
            
            openPremiumLightbox(allAssetsDatabaseMemory[currentActiveIndexInLightbox].id);
        }

        function closePremiumLightbox() {
            document.getElementById('premiumLightboxModal').classList.add('hidden');
        }

        // Action Handlers from Cards / Buttons
        function handleInlineActionSave(id, event) {
            if(event) event.stopPropagation();
            const asset = allAssetsDatabaseMemory.find(w => w.id == id);
            if(!asset) return;
            let currentPins = getSavedBoardsStorageArray();
            if(!currentPins.some(p => p.id == id)) {
                currentPins.push(asset);
                localStorage.setItem('lusso_guest_board', JSON.stringify(currentPins));
                triggerNotificationToast("Saved to Vault Boards!");
            } else {
                triggerNotificationToast("Already in Vault!");
            }
        }

        function handleInlineActionDownload(url, event) {
            if(event) event.stopPropagation();
            if(!url) return;
            const link = document.createElement('a');
            link.href = url;
            link.target = "_blank";
            link.download = "LUSSO_Premium_Matrix.jpg";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            triggerNotificationToast("Download Pipe Stream Initialized!");
        }

        function saveFromLightbox() {
            if(currentActiveIndexInLightbox !== -1) {
                handleInlineActionSave(allAssetsDatabaseMemory[currentActiveIndexInLightbox].id, null);
            }
        }

        function downloadFromLightbox() {
            if(currentActiveIndexInLightbox !== -1) {
                handleInlineActionDownload(allAssetsDatabaseMemory[currentActiveIndexInLightbox].image_url, null);
            }
        }

        function executeLiveSearchQuery(val) {
            activeFilterSearchQuery = val.toLowerCase();
            document.getElementById('appSearchEngineInput').value = val;
            document.getElementById('exploreSearchEngineInput').value = val;

            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + (val ? `?search=${encodeURIComponent(val)}` : '');
            window.history.pushState({ path: newUrl }, '', newUrl);

            currentPaginationPage = 1;
            isDatabaseCompletelyExhausted = false;

            let filtered = allAssetsDatabaseMemory.filter(item => !activeFilterSearchQuery || (item.title && item.title.toLowerCase().includes(activeFilterSearchQuery)));
            displayedAssetsMemory = filtered.slice(0, ITEMS_PER_PAGE);
            
            renderGrid(displayedAssetsMemory, 'pinterestMainMasonryContainer', false);
            if(!document.getElementById('exploreSection').classList.contains('hidden')) {
                renderGrid(filtered.slice(0, 10), 'exploreMasonryContainerGrid', false);
            }

            if (displayedAssetsMemory.length >= filtered.length) isDatabaseCompletelyExhausted = true;
        }

        async function initializeApplicationDataEngine() {
            const { data } = await supabaseClient.from('wallpapers').select('*').order('created_at', { ascending: false });
            allAssetsDatabaseMemory = data || [];

            const urlParams = new URLSearchParams(window.location.search);
            const queryParam = urlParams.get('search');
            if(queryParam) {
                activeFilterSearchQuery = queryParam.toLowerCase();
                document.getElementById('appSearchEngineInput').value = queryParam;
                document.getElementById('exploreSearchEngineInput').value = queryParam;
            }

            currentPaginationPage = 1;
            isDatabaseCompletelyExhausted = false;
            
            let activeSource = allAssetsDatabaseMemory;
            if (activeFilterSearchQuery) {
                activeSource = allAssetsDatabaseMemory.filter(item => item.title && item.title.toLowerCase().includes(activeFilterSearchQuery));
            }

            displayedAssetsMemory = activeSource.slice(0, ITEMS_PER_PAGE);
            renderGrid(displayedAssetsMemory, 'pinterestMainMasonryContainer', false);

            if (displayedAssetsMemory.length >= activeSource.length) isDatabaseCompletelyExhausted = true;

            const w = window.innerWidth;
            let autoCols = w >= 1280 ? 5 : (w >= 1024 ? 4 : (w >= 640 ? 3 : 2));
            applyDynamicColumnsStyle(autoCols);
        }

        function handleWindowInfiniteScrollTrigger() {
            const dashboardSection = document.getElementById('dashboardSection');
            if (dashboardSection.classList.contains('hidden')) return;
            if (isInfiniteScrollLoadingActive || isDatabaseCompletelyExhausted) return;

            const scrollNode = document.getElementById('mainContentScrollNode');
            if ((scrollNode.scrollTop + scrollNode.clientHeight) >= (scrollNode.scrollHeight - 150)) {
                isInfiniteScrollLoadingActive = true;
                document.getElementById('infiniteScrollLoadStatusIndicator').classList.remove('hidden');

                setTimeout(() => {
                    currentPaginationPage++;
                    let activeSource = allAssetsDatabaseMemory;
                    if (activeFilterSearchQuery) {
                        activeSource = allAssetsDatabaseMemory.filter(item => item.title && item.title.toLowerCase().includes(activeFilterSearchQuery));
                    }

                    const start = (currentPaginationPage - 1) * ITEMS_PER_PAGE;
                    const nextBatch = activeSource.slice(start, start + ITEMS_PER_PAGE);
                    
                    if (nextBatch.length > 0) {
                        displayedAssetsMemory = displayedAssetsMemory.concat(nextBatch);
                        renderGrid(nextBatch, 'pinterestMainMasonryContainer', true);
                    }

                    if (displayedAssetsMemory.length >= activeSource.length || nextBatch.length === 0) isDatabaseCompletelyExhausted = true;
                    isInfiniteScrollLoadingActive = false;
                    document.getElementById('infiniteScrollLoadStatusIndicator').classList.add('hidden');
                }, 600);
            }
        }

        // RENDERS CARDS COMPREHENSIVELY WITH ACTIONS DIRECTLY ACCESSIBLE ON OVERLAY
        function renderGrid(list, containerId, appendMode = false) {
            const container = document.getElementById(containerId);
            if (!container) return;
            if (!appendMode) container.innerHTML = "";
            
            list.forEach(item => {
                const card = document.createElement('div');
                card.className = "pinterest-card group cursor-pointer relative overflow-hidden rounded-2xl border border-slate-800/40";
                card.innerHTML = `
                    <div class="relative w-full overflow-hidden bg-[#0b0f19]">
                        <div class="skeleton-shimmer-node w-full h-64 rounded-2xl absolute inset-0"></div>
                        <img src="${item.image_url}" 
                             onload="this.previousElementSibling ? this.previousElementSibling.remove() : null; this.classList.remove('opacity-0');"
                             onerror="this.src='data:image/svg+xml;utf8,<rect width=\'100%\' height=\'100%\' fill=\'%23111827\'/>';"
                             onclick="openPremiumLightbox('${item.id}')" 
                             class="w-full h-auto block opacity-0 hover:scale-105 transition-all duration-500 rounded-2xl relative z-10">
                        
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-20 flex flex-col justify-between p-4 pointer-events-none">
                            <div class="flex justify-end pointer-events-auto">
                                <button onclick="handleInlineActionSave('${item.id}', event)" class="bg-[#e60023] hover:bg-[#b6001a] text-white font-bold text-xs px-4 py-2 rounded-full shadow-md transition">Save</button>
                            </div>
                            <div class="flex justify-between items-center pointer-events-auto">
                                <span class="text-xs font-semibold text-white truncate max-w-[60%] bg-black/60 px-2 py-1 rounded">${item.title || 'Matrix'}</span>
                                <div class="flex gap-1">
                                    <button onclick="handleInlineActionDownload('${item.image_url}', event)" class="w-8 h-8 bg-white hover:bg-neutral-200 text-black rounded-full flex items-center justify-center shadow-md transition"><i class="fa-solid fa-arrow-down text-xs"></i></button>
                                    <button class="w-8 h-8 bg-white hover:bg-neutral-200 text-black rounded-full flex items-center justify-center shadow-md transition"><i class="fa-solid fa-ellipsis text-xs"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function populateUpdatesNotificationPanelItems() {
            const container = document.getElementById('updatesNotificationsContainerList');
            if(!container || allAssetsDatabaseMemory.length === 0) return;
            container.innerHTML = "";
            allAssetsDatabaseMemory.slice(0, 5).forEach(asset => {
                const row = document.createElement('div');
                row.className = "flex items-center gap-3 p-2 rounded-xl hover:bg-slate-900/60 cursor-pointer transition";
                row.onclick = () => openPremiumLightbox(asset.id);
                row.innerHTML = `
                    <img src="${asset.image_url}" class="w-10 h-12 rounded-lg object-cover border border-slate-800">
                    <div class="flex-1 min-w-0">
                        <h4 class="text-xs font-semibold text-gray-200 truncate">${asset.title || 'Premium Wallpaper'}</h4>
                        <p class="text-[10px] text-slate-400">Stream synchronized.</p>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        let selectedFile = null;
        function processLocalFileSelection(input) {
            if(input.files && input.files[0]) {
                selectedFile = input.files[0];
                document.getElementById('formLiveImagePreview').src = URL.createObjectURL(selectedFile);
                document.getElementById('formLiveImagePreview').classList.remove('hidden');
            }
        }

        async function handleLocalFormUploadSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('formSubmitBtn');
            const title = document.getElementById('formUploadTitle').value;
            if(!selectedFile) return;

            btn.disabled = true; btn.innerText = "STREAMING NODE...";
            try {
                const fileName = `${Date.now()}_${selectedFile.name.replace(/\s+/g, '_')}`;
                await supabaseClient.storage.from('wallpapers').upload(fileName, selectedFile, { cacheControl: '3600', upsert: true });
                const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/wallpapers/${fileName}`;
                await supabaseClient.from('wallpapers').insert([{ title: title, image_url: publicUrl }]);
                
                triggerNotificationToast("Asset Stream Dispatched!");
                closeLeftSliderUploadEngine();
                await initializeApplicationDataEngine();
            } catch (err) { alert("Pipeline connection refused."); }
            finally { btn.disabled = false; btn.innerText = "PUBLISH ASSET"; }
        }

        function getSavedBoardsStorageArray() { return localStorage.getItem('lusso_guest_board') ? JSON.parse(localStorage.getItem('lusso_guest_board')) : []; }
        function openYourBoardsPanelSection() { navigateToAppSection('yourBoards'); renderGrid(getSavedBoardsStorageArray(), 'yourSavedPinsMasonryGrid', false); }
        function clearAllSavedBoardsStorage() { localStorage.removeItem('lusso_guest_board'); openYourBoardsPanelSection(); }

        window.onload = () => initializeApplicationDataEngine();
    </script>
</body>
</html>
