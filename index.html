<!DOCTYPE html>
<html lang="en">
<head>

    <style>

        .pinterest-grid { columns: 2; column-gap: 16px; }
        @media (min-width: 640px) { .pinterest-grid { columns: 3; } }
        @media (min-width: 1024px) { .pinterest-grid { columns: 4; } }
        @media (min-width: 1280px) { .pinterest-grid { columns: 5; } }
        .pin-card { break-inside: avoid; margin-bottom: 16px; display: inline-block; width: 100%; }
    </style>
</head>
<body>

    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center space-x-2 cursor-pointer" onclick="location.reload()">
            <i class="fa-solid fa-wand-magic-sparkles text-amber-400 text-2xl"></i>
            <span class="text-xl font-black tracking-wider bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent">VELLUM ELITE</span>
        </div>
        <div id="authStatus" class="flex items-center space-x-4">
            <button onclick="openAuthModal('login')" class="px-5 py-2.5 rounded-xl bg-gradient-to-r from-amber-500 to-orange-600 font-bold text-sm shadow-md hover:opacity-90 transition-all cursor-pointer">Login / Sign Up</button>
        </div>
    </nav>

    <header class="text-center py-12 px-4">
        <h1 class="text-4xl md:text-5xl font-black mb-4 tracking-tight"><i class="fa-solid fa-bolt text-amber-400 mr-2"></i>PREMIUM WALLPAPERS</h1>
        <p class="text-slate-400 max-w-xl mx-auto">High-refresh-rate ultra premium wallpapers dashboard synced with real-time cloud database.</p>
    </header>

    <main class="max-w-[1600px] mx-auto px-4 md:px-8 pb-24">
        <div class="pinterest-grid" id="wallpaperContainer">
            <div class="text-center col-span-full py-12 text-slate-500" id="loadingText">
                <i class="fa-solid fa-spinner fa-spin text-2xl mb-2 text-amber-400"></i><br>Connecting Secure Database...
            </div>
        </div>
    </main>

    <div id="authModal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden z-50 flex items-center justify-center p-4">
        <div class="w-full max-w-md glass p-8 rounded-3xl relative shadow-2xl">
            <button onclick="closeAuthModal()" class="absolute top-5 right-5 text-slate-400 hover:text-white cursor-pointer"><i class="fa-solid fa-xmark text-xl"></i></button>
            <h2 id="modalTitle" class="text-2xl font-black text-center mb-6 tracking-wide text-amber-400">LOGIN TO VELLUM</h2>
            <form id="authForm" class="space-y-4">
                <div>
                    <label class="text-xs font-bold tracking-wider text-slate-400 uppercase block mb-2">Email Address</label>
                    <input type="email" id="authEmail" required class="w-full px-4 py-3 rounded-xl bg-slate-900/80 border border-slate-700 text-white focus:outline-none focus:border-amber-400 transition-all" placeholder="yourname@gmail.com">
                </div>
                <div id="passwordField">
                    <label class="text-xs font-bold tracking-wider text-slate-400 uppercase block mb-2">Password</label>
                    <input type="password" id="authPassword" class="w-full px-4 py-3 rounded-xl bg-slate-900/80 border border-slate-700 text-white focus:outline-none focus:border-amber-400 transition-all" placeholder="••••••••">
                    <div class="text-right mt-2">
                        <a href="#" onclick="openAuthModal('forgot')" class="text-xs text-amber-400 hover:underline">Forgot Password?</a>
                    </div>
                </div>
                <button type="submit" id="submitBtn" class="w-full py-3.5 rounded-xl bg-gradient-to-r from-amber-500 to-orange-600 font-black tracking-wide shadow-lg hover:opacity-95 transition-all mt-4 cursor-pointer">Continue <i class="fa-solid fa-arrow-right-to-bracket ml-2"></i></button>
            </form>
            <div class="text-center mt-6 text-sm text-slate-400">
                <span id="switchText">Don't have an account?</span>
                <a href="#" id="switchLink" onclick="toggleAuthMode()" class="text-amber-400 font-bold ml-1 hover:underline">Sign Up Now</a>
            </div>
        </div>
    </div>
