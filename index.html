<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUSSO | Premium Matrix System</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- Base Reset & Core Setup --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        :root {
            --bg-dark: #0d0d11;
            --panel-bg: rgba(20, 20, 28, 0.85);
            --panel-solid: #14141c;
            --accent-red: #e60023;
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- 1. WELCOME LAYER ANIMATION --- */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .welcome-title {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 10px;
            color: var(--text-main);
            text-shadow: 0 0 25px rgba(230, 0, 35, 0.6);
            margin-bottom: 12px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInLusso 1.2s forwards 0.2s;
        }

        .welcome-subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInLusso 1.2s forwards 0.6s;
        }

        @keyframes fadeInLusso {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-fade-out {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.02);
        }

        /* --- 2. MAIN DYNAMIC DESKTOP WALLPAPER BACKGROUND --- */
        #desktop-wallpaper-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            object-fit: cover;
            pointer-events: none;
        }

        /* --- 3. PREMIUM HEADER (LUSSO STYLE) --- */
        header {
            background: linear-gradient(to bottom, rgba(20,20,28,0.95), rgba(20,20,28,0.8));
            backdrop-filter: blur(20px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, var(--accent-red), #990012);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(230, 0, 35, 0.4);
        }

        .brand-logo i {
            color: white;
            font-size: 1.1rem;
        }

        .brand-name {
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 3px;
            color: var(--text-main);
        }

        .nav-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            position: relative;
            padding: 10px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .icon-btn:hover, .icon-btn.active {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.08);
        }

        .badge {
            position: absolute;
            top: 6px;
            right: 6px;
            background-color: var(--accent-red);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-red);
        }

        /* --- 4. PURANA WORKSPACE ENGINE LAYER --- */
        .workspace {
            position: relative;
            flex: 1;
            z-index: 5; /* Wallpaper ke upar dikhega */
            padding: 20px;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        /* Purani Grid Elements, Chat Aur Window System Unchanged */
        .window-frame {
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Image viewport handle context mimicking requested styles */
        .image-viewer-window {
            width: 480px; 
            height: 380px;
        }

        .window-header {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .window-title-text {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .window-body {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            position: relative;
        }

        /* Divider underline as requested below elements */
        .section-underline {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-red), transparent);
            margin: 15px 0;
        }

        /* --- 5. PINTEREST UPDATES PANEL SIDEBAR (NEW SLIDE-IN) --- */
        .updates-panel {
            position: absolute;
            top: 0;
            left: -360px; /* Hidden state */
            width: 350px;
            height: 100%;
            background-color: var(--panel-solid);
            border-right: 1px solid var(--border-color);
            box-shadow: 15px 0 40px rgba(0, 0, 0, 0.6);
            transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100; /* Sub-elements se upar render hoga */
            display: flex;
            flex-direction: column;
        }

        .updates-panel.open {
            left: 0; /* Slide in trigger */
        }

        .panel-header {
            padding: 22px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: var(--text-main);
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
        }

        .section-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            margin: 15px 5px 10px 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Pinterest Match List Layout Row Items */
        .update-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-bottom: 8px;
        }

        .update-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .update-thumb {
            width: 55px;
            height: 55px;
            border-radius: 10px;
            object-fit: cover;
            background-color: #252530;
        }

        .update-details {
            flex: 1;
        }

        .update-text {
            font-size: 0.9rem;
            color: var(--text-main);
            line-height: 1.35;
            margin-bottom: 4px;
        }

        .update-time {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .update-opt-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 5px;
        }
        
        .update-opt-btn:hover {
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <!-- 1. INITIAL WELCOME SCREEN OVERLAY -->
    <div id="welcome-screen">
        <div class="welcome-title">LUSSO</div>
        <div class="welcome-subtitle">Welcome To Lusso System</div>
    </div>

    <!-- 2. PURANA WALLPAPER CONTAINER (DASHBOARD BACKGROUND EFFECT) -->
    <!-- Aapka dynamic ya static current wallpaper path src="" me apply rahega -->
    <img id="desktop-wallpaper-container" src="https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?w=1600&auto=format&fit=crop" alt="Matrix Base Background">

    <!-- 3. HEADER WITH RESTORED BRANDING STYLE -->
    <header>
        <div class="brand">
            <div class="brand-logo">
                <i class="fa-solid fa-layer-group"></i>
            </div>
            <div class="brand-name">LUSSO</div>
        </div>
        <div class="nav-actions">
            <!-- New Notification Panel Button (Updates Menu Element) -->
            <button class="icon-btn" id="update-toggle-btn" title="Updates">
                <i class="fa-solid fa-bell"></i>
                <div class="badge"></div>
            </button>
            <button class="icon-btn" title="System Status">
                <i class="fa-solid fa-terminal"></i>
            </button>
        </div>
    </header>

    <!-- 4. CORE DESKTOP WORKSPACE (PURA PURANA CODE & DATA WORKSPACE AREA) -->
    <div class="wrapper" style="position: relative; flex: 1; display: flex;">
        
        <!-- PINTEREST STYLE UPDATES PANEL SIDEBAR INTERFACE -->
        <div class="updates-panel" id="side-updates-panel">
            <div class="panel-header">
                <h2>Updates</h2>
                <button class="close-btn" id="panel-close-btn">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="panel-content">
                
                <div class="section-label">New</div>
                
                <!-- Notification Row 1 -->
                <div class="update-item">
                    <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=100&auto=format&fit=crop" alt="update thumb" class="update-thumb">
                    <div class="update-details">
                        <div class="update-text">Take a moment for yourself ❤️</div>
                        <div class="update-time">1h</div>
                    </div>
                    <button class="update-opt-btn"><i class="fa-solid fa-ellipsis"></i></button>
                </div>

                <!-- Notification Row 2 -->
                <div class="update-item">
                    <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=100&auto=format&fit=crop" alt="update thumb" class="update-thumb">
                    <div class="update-details">
                        <div class="update-text">Your inspo awaits</div>
                        <div class="update-time">1d</div>
                    </div>
                    <button class="update-opt-btn"><i class="fa-solid fa-ellipsis"></i></button>
                </div>

                <!-- Notification Row 3 -->
                <div class="update-item">
                    <img src="https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?w=100&auto=format&fit=crop" alt="update thumb" class="update-thumb">
                    <div class="update-details">
                        <div class="update-text">New ideas are calling</div>
                        <div class="update-time">2d</div>
                    </div>
                    <button class="update-opt-btn"><i class="fa-solid fa-ellipsis"></i></button>
                </div>

                <div class="section-label">Seen</div>

                <!-- Notification Row 4 -->
                <div class="update-item" style="opacity: 0.65;">
                    <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=100&auto=format&fit=crop" alt="update thumb" class="update-thumb">
                    <div class="update-details">
                        <div class="update-text">Take a moment for yourself ❤️</div>
                        <div class="update-time">5d</div>
                    </div>
                    <button class="update-opt-btn"><i class="fa-solid fa-ellipsis"></i></button>
                </div>

            </div>
        </div>

        <!-- PURANI WINDOWS LAYER (Aapki Image sizing, large rules aur Chat windows yahan load hoti hain) -->
        <div class="workspace">
            
            <!-- EXAMPLED WORKSPACE WINDOW MATCHING YOUR ARCHITECTURE -->
            <div class="window-frame image-viewer-window">
                <div class="window-header">
                    <div class="window-title-text"><i class="fa-regular fa-image" style="margin-right: 6px;"></i> Lusso Media Engine</div>
                    <div style="display:flex; gap:8px; opacity:0.7;"><i class="fa-solid fa-minus"></i><i class="fa-solid fa-expand"></i><i class="fa-solid fa-xmark"></i></div>
                </div>
                <div class="window-body">
                    <p style="font-size:0.85rem; color:var(--text-muted);">Main System Active Viewport</p>
                    
                    <!-- Badi Underline Structure (Jo aapne dynamic features ke niche build karwayi thi) -->
                    <div class="section-underline"></div>
                    
                    <!-- Placeholder representing your chat or layout configuration -->
                    <div style="font-size:0.9rem; color:rgba(255,255,255,0.9);">
                        Aapka dynamic content container aur functional workflows yahan chalte rhenge...
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- 5. INTERACTION ENGINE JAVASCRIPT -->
    <script>
        // 1. Welcome Screen Animation Control (Runs for 2 seconds then unblocks interface)
        document.addEventListener('DOMContentLoaded', () => {
            const welcomeScreen = document.getElementById('welcome-screen');
            setTimeout(() => {
                welcomeScreen.classList.add('welcome-fade-out');
            }, 2000);
        });

        // 2. Sidebar Functional Control
        const updateToggleBtn = document.getElementById('update-toggle-btn');
        const panelCloseBtn = document.getElementById('panel-close-btn');
        const sideUpdatesPanel = document.getElementById('side-updates-panel');

        // Toggle Open/Close
        updateToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            sideUpdatesPanel.classList.toggle('open');
            updateToggleBtn.classList.toggle('active');
            
            // Hide badge dot upon check
            const badge = updateToggleBtn.querySelector('.badge');
            if(badge) badge.style.display = 'none';
        });

        // Close panel via Cross button
        panelCloseBtn.addEventListener('click', () => {
            sideUpdatesPanel.classList.remove('open');
            updateToggleBtn.classList.remove('active');
        });

        // Safe Auto-close when clicked outside the panel boundaries on workspace
        document.addEventListener('click', (e) => {
            if (!sideUpdatesPanel.contains(e.target) && e.target !== updateToggleBtn && !updateToggleBtn.contains(e.target)) {
                sideUpdatesPanel.classList.remove('open');
                updateToggleBtn.classList.remove('active');
            }
        });
    </script>
</body>
</html>
