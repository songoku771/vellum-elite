<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUSSO | Premium Matrix System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --sidebar-color: #070a13;
            --card-bg: #111827;
            --text-primary: #f3f4f6;
            --text-secondary: #94a3b8;
            --border-color: rgba(30, 41, 59, 0.8);
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-primary); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        
        #mainContentScrollNode { height: 100vh; overflow-y: auto; scroll-behavior: smooth; }

        /* 🌟 PERFECT PINTEREST MASONRY COLUMNS: No Stretching, Asli Size Content 🌟 */
        .pinterest-grid { 
            column-count: 2;
            column-gap: 16px;
            width: 100%;
        }
        @media (min-width: 640px) { .pinterest-grid { column-count: 3; } }
        @media (min-width: 1024px) { .pinterest-grid { column-count: 4; } }
        @media (min-width: 1280px) { .pinterest-grid { column-count: 5; } }

        /* Preventing cards from breaking across columns */
        .pinterest-card { 
            break-inside: avoid;
            margin-bottom: 16px;
            width: 100%; 
            display: block;
        }
        
        .brand-font { font-family: 'Cinzel', serif; letter-spacing: 0.1em; }
        .iphone-script-font { font-family: 'Great Vibes', cursive; font-weight: 500; }
        
        #mainContentScrollNode::-webkit-scrollbar { width: 6px; }
        #mainContentScrollNode::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        /* Detail Modal Container */
        .detail-container {
            display: flex;
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 32px;
            overflow: hidden;
            max-width: 1000px;
            margin: 0 auto;
            min-height: 75vh;
        }
    </style>
</head>
<body>

    <div id="appGlobalToast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-amber-500 text-neutral-900 text-xs font-bold px-6 py-3 rounded-full shadow-2xl z-[999] opacity-0 pointer-events-none transition-all duration-300 transform translate-y-4">
        <span id="toastMessageText">Syncing...</span>
    </div>

    <div id="appNotificationDrawer" class="fixed top-20 right-6 w-80 bg-[#070a13] border border-slate-800 rounded-2xl shadow-2xl p-4 hidden z-50 transform transition-all duration-300">
        <div class="flex items-center justify-between border-b border-slate-800 pb-2 mb-3">
            <span class="text-xs font-bold uppercase tracking-wider text-amber-500">System Logs</span>
            <button onclick="toggleGlobalNotificationDrawer()" class="text-slate-500 text-xs">Close</button>
        </div>
        <div class="space-y-2 max-h-60 overflow-y-auto pr-1">
            <div class="p-2 bg-slate-900/60 rounded-xl border border-slate-800 text-[11px] text-slate-300">Lusso Matrix core node updated successfully.</div>
            <div class="p-2 bg-slate-900/60 rounded-xl border border-slate-800 text-[11px] text-slate-300">Supabase Storage buckets connected.</div>
        </div>
    </div>

    <div class="flex h-screen w-full">
        
        <aside id="sidebarMainNode" class="w-20 flex flex-col items-center justify-between py-6 bg-[#070a13] border-r border-slate-900/80 z-50">
            <div class="flex flex-col items-center gap-8 w-full">
                <div onclick="forceResetToHomeGrid()" class="w-14 h-14 bg-gradient-to-br from-amber-300 via-amber-400 to-amber-600 rounded-full flex items-center justify-center text-neutral-900 text-3xl cursor-pointer shadow-xl iphone-script-font">Lusso</div>
                <div class="flex flex-col items-center gap-5 w-full">
                    <button onclick="forceResetToHomeGrid()" class="w-12 h-12 rounded-xl flex flex-col items-center justify-center text-amber-500 hover:bg-slate-800/40 gap-1"><i class="fa-solid fa-house"></i><span class="text-[9px]">Home</span></button>
                    <button onclick="openLeftSliderUploadEngine()" class="w-12 h-12 rounded-xl flex flex-col items-center justify-center text-slate-400 hover:text-emerald-400 gap-1"><i class="fa-solid fa-square-plus"></i><span class="text-[9px]">Create</span></button>
                    <button onclick="toggleGlobalNotificationDrawer()" class="w-12 h-12 rounded-xl flex flex-col items-center justify-center text-slate-400 relative gap-1"><i class="fa-solid fa-bell"></i><span class="text-[9px]">Updates</span><span class="absolute top-2 right-3 w-1.5 h-1.5 bg-amber-500 rounded-full"></span></button>
                </div>
            </div>
            <button onclick="navigateToAppSection('settings')" class="w-12 h-12 rounded-xl flex flex-col items-center justify-center text-slate-500 hover:text-amber-500 gap-1"><i class="fa-solid fa-gear"></i><span class="text-[9px]">Settings</span></button>
        </aside>

        <div id="premiumUploadSideDrawer" class="fixed inset-y-0 left-20 w-88 bg-[#070a13] border-r border-slate-900 z-40 transform -translate-x-full transition-transform duration-300 p-6">
            <div class="flex items-center justify-between border-b border-slate-800 pb-4 mb-5"><span class="font-bold text-xs brand-font">Upload Terminal</span><button onclick="closeLeftSliderUploadEngine()" class="text-slate-500"><i class="fa-solid fa-xmark"></i></button></div>
            <form onsubmit="handleLocalFormUploadSubmit(event)" class="space-y-4">
                <input type="text" id="formUploadTitle" placeholder="Asset Title" required class="w-full px-3 py-2 bg-[#111827] border border-slate-800 rounded-xl text-xs outline-none text-white">
                <div class="relative w-full h-56 border-2 border-dashed border-slate-800 rounded-2xl flex items-center justify-center bg-slate-950/40 cursor-pointer overflow-hidden">
                    <img id="formLiveImagePreview" class="hidden absolute inset-0 w-full h-full object-cover z-10">
                    <input type="file" id="formFileInputTrigger" accept="image/*" required onchange="processLocalFileSelection(this)" class="absolute inset-0 opacity-0 z-20 cursor-pointer">
                    <div class="text-center p-4"><i class="fa-solid fa-cloud-arrow-up text-amber-500 text-2xl"></i><p class="text-[10px] text-slate-500 mt-2">Tap to Select</p></div>
                </div>
                <button type="submit" id="formSubmitBtn" class="w-full py-3 bg-amber-500 text-black font-bold text-xs rounded-xl uppercase tracking-wider">Publish Asset</button>
            </form>
        </div>

        <div id="mainContentScrollNode" class="flex-1 flex flex-col relative">
            <header id="mainHeaderNode" class="sticky top-0 z-30 px-8 py-4 bg-[#0b0f19]/90 backdrop-blur-md flex items-center justify-between gap-4 border-b border-b-slate-900/60">
                <div onclick="forceResetToHomeGrid()" class="iphone-script-font text-3xl font-bold text-amber-400 cursor-pointer">Lusso</div>
                <div class="flex-1 relative max-w-xl">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input type="text" id="appSearchEngineInput" oninput="executeLiveSearchQuery()" class="w-full pl-11 pr-4 py-2 bg-[#111827] border border-slate-800 rounded-full text-xs text-gray-200 outline-none" placeholder="Search elite matrices...">
                </div>
                <div id="navUserInitial" class="w-8 h-8 rounded-full bg-amber-500 text-neutral-900 flex items-center justify-center font-bold text-xs">T</div>
            </header>

            <div id="dashboardSection" class="w-full app-view-block p-6">
                <div id="pinterestMainMasonryContainer" class="pinterest-grid"></div>
            </div>

            <div id="detailSection" class="hidden w-full app-view-block p-4 md:p-10">
                <button onclick="forceResetToHomeGrid()" class="mb-6 text-slate-400 text-sm flex items-center gap-2 hover:text-white transition"><i class="fa-solid fa-arrow-left"></i> Back</button>
                
                <div class="detail-container flex flex-col md:flex-row">
                    <div class="w-full md:w-[50%] bg-black flex items-center justify-center p-2">
                        <img id="detailPreviewImageNode" src="" class="w-full h-auto max-h-[80vh] object-contain rounded-2xl">
                    </div>
                    
                    <div class="w-full md:w-[50%] p-8 flex flex-col justify-between bg-[#111827]">
                        
                        <div>
                            <div class="flex items-center justify-between gap-4 w-full mb-6">
                                <div class="relative flex-1">
                                    <select id="albumSelectorDropdown" class="w-full bg-slate-800 border border-slate-700 text-gray-200 text-xs font-bold px-4 py-2.5 rounded-xl outline-none cursor-pointer appearance-none">
                                        <option value="Anime">Anime</option>
                                        <option value="Gaming">Gaming</option>
                                        <option value="Nature">Nature</option>
                                        <option value="Dark Aesthetic">Dark Aesthetic</option>
                                    </select>
                                    <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-[10px] pointer-events-none"></i>
                                </div>
                                <button onclick="saveAssetToSelectedAlbum()" class="px-6 py-2.5 bg-[#e60023] hover:bg-[#b6001a] text-white font-bold text-xs rounded-xl transition shadow-lg shadow-red-900/20">Save</button>
                            </div>

                            <h1 id="detailAssetTitleText" class="text-2xl font-bold brand-font text-gray-100 mt-4 mb-2">Asset Title</h1>
                            <p class="text-xs text-slate-400 mb-6">Premium asset synchronization pipeline.</p>

                            <div class="flex items-center gap-3 mb-8 border-t border-b border-slate-800/60 py-4">
                                <div class="w-10 h-10 rounded-full bg-amber-500 text-black flex items-center justify-center font-bold text-xs">T</div>
                                <div>
                                    <p class="text-xs font-bold text-gray-200">Tejendar Prajapati</p>
                                    <p class="text-[10px] text-slate-500">12k Followers</p>
                                </div>
                                <button class="ml-auto px-4 py-1.5 bg-slate-800 text-gray-300 rounded-full text-[11px] font-bold hover:bg-slate-700 transition">Follow</button>
                            </div>
                        </div>

                        <div class="w-full">
                            <div class="flex items-center justify-between bg-slate-900/60 p-3 rounded-2xl border border-slate-800/80">
                                <div class="flex items-center gap-2">
                                    <button onclick="triggerNotificationToast('Added to Liked Items')" class="w-10 h-10 rounded-full hover:bg-slate-800 flex items-center justify-center text-slate-300 transition text-sm"><i class="fa-regular fa-heart"></i></button>
                                    <button onclick="triggerNotificationToast('Comments section coming soon')" class="w-10 h-10 rounded-full hover:bg-slate-800 flex items-center justify-center text-slate-300 transition text-sm"><i class="fa-regular fa-comment"></i></button>
                                    <button onclick="copyAssetLinkToClipboard()" class="w-10 h-10 rounded-full hover:bg-slate-800 flex items-center justify-center text-slate-300 transition text-sm"><i class="fa-solid fa-arrow-up-from-bracket"></i></button>
                                </div>
                                
                                <div class="relative">
                                    <button onclick="toggleThreeDotsMenu(event)" class="w-10 h-10 rounded-full bg-slate-800/80 hover:bg-slate-700 text-white flex items-center justify-center transition"><i class="fa-solid fa-ellipsis"></i></button>
                                    <div id="threeDotsMenuBox" class="hidden absolute right-0 bottom-12 w-52 bg-[#1f2937] border border-slate-700 rounded-2xl shadow-2xl py-2 z-50">
                                        <button onclick="handleRealDownload()" class="w-full text-left px-4 py-3 text-xs font-bold text-gray-200 hover:bg-slate-800 flex items-center gap-3"><i class="fa-solid fa-download text-amber-500"></i> Download Image</button>
                                        <button onclick="copyAssetLinkToClipboard()" class="w-full text-left px-4 py-3 text-xs font-bold text-gray-200 hover:bg-slate-800 flex items-center gap-3"><i class="fa-solid fa-link text-amber-500"></i> Copy Asset URL</button>
                                        <button onclick="triggerNotificationToast('Report Logged to Matrix')" class="w-full text-left px-4 py-3 text-xs font-bold text-red-400 hover:bg-red-950/30 flex items-center gap-3"><i class="fa-solid fa-flag"></i> Report Wallpaper</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

                <div class="mt-20">
                    <h3 class="text-center brand-font text-slate-500 mb-8 uppercase tracking-widest text-xs">More For Your System</h3>
                    <div id="bottomStreamGrid" class="pinterest-grid"></div>
                </div>
            </div>

            <div id="settingsSection" class="hidden w-full app-view-block p-10">
                <h1 class="brand-font text-2xl mb-6">Settings</h1>
                <input type="color" oninput="applyAdaptiveThemeColor(this.value)" class="w-20 h-20 bg-transparent cursor-pointer">
                <p class="text-xs text-slate-500 mt-2">Change Grid Shading</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://ezfxgevsjxfyluxprkls.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_jlyevQqezPjFmlqar5pmNw_EV8DTtVL"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allAssetsDatabaseMemory = [];
        let activeSelectedAssetUrlGlobal = "";
        
        function triggerNotificationToast(msg) {
            const node = document.getElementById('appGlobalToast');
            document.getElementById('toastMessageText').innerText = msg;
            node.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => node.classList.add('opacity-0', 'translate-y-4'), 3000);
        }

        function toggleGlobalNotificationDrawer() {
            const drawer = document.getElementById('appNotificationDrawer');
            drawer.classList.toggle('hidden');
        }

        function applyAdaptiveThemeColor(hex) {
            document.documentElement.style.setProperty('--bg-color', hex);
            document.getElementById('mainHeaderNode').style.backgroundColor = hex + "dd";
        }

        function navigateToAppSection(id) {
            document.querySelectorAll('.app-view-block').forEach(v => v.classList.add('hidden'));
            document.getElementById(id + 'Section').classList.remove('hidden');
        }

        function forceResetToHomeGrid() { navigateToAppSection('dashboard'); }
        function openLeftSliderUploadEngine() { document.getElementById('premiumUploadSideDrawer').classList.remove('-translate-x-full'); }
        function closeLeftSliderUploadEngine() { document.getElementById('premiumUploadSideDrawer').classList.add('-translate-x-full'); }

        function toggleThreeDotsMenu(e) {
            e.stopPropagation();
            document.getElementById('threeDotsMenuBox').classList.toggle('hidden');
        }

        // --- FETCH ENGINE ---
        async function initializeApplicationDataEngine() {
            const { data } = await supabaseClient.from('wallpapers').select('*').order('created_at', { ascending: false });
            allAssetsDatabaseMemory = data || [];
            renderGrid(allAssetsDatabaseMemory, 'pinterestMainMasonryContainer');
        }

        // 🌟 UPDATED RENDER ENGINE: Image updates dynamically with native sizes
        function renderGrid(list, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = "";
            list.forEach(item => {
                const card = document.createElement('div');
                card.className = "pinterest-card group cursor-pointer";
                card.innerHTML = `
                    <div class="relative w-full overflow-hidden rounded-2xl bg-slate-900 border border-slate-800/80 shadow-md">
                        <img src="${item.image_url}" onclick="openDetail('${item.id}')" class="w-full h-auto block hover:scale-105 transition-transform duration-500 object-cover">
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- SEARCH ENGINE INTERFACE ---
        function executeLiveSearchQuery() {
            const q = document.getElementById('appSearchEngineInput').value.toLowerCase();
            const filtered = allAssetsDatabaseMemory.filter(item => item.title.toLowerCase().includes(q));
            renderGrid(filtered, 'pinterestMainMasonryContainer');
        }

        function openDetail(id) {
            const item = allAssetsDatabaseMemory.find(w => w.id == id);
            if(!item) return;
            activeSelectedAssetUrlGlobal = item.image_url;
            document.getElementById('detailPreviewImageNode').src = item.image_url;
            document.getElementById('detailAssetTitleText').innerText = item.title;
            navigateToAppSection('detail');
            renderGrid(allAssetsDatabaseMemory.filter(w => w.id != id).slice(0,10), 'bottomStreamGrid');
        }

        function saveAssetToSelectedAlbum() {
            const selectedAlbum = document.getElementById('albumSelectorDropdown').value;
            triggerNotificationToast(`Saved to ${selectedAlbum} Album!`);
        }

        async function handleRealDownload() {
            try {
                const response = await fetch(activeSelectedAssetUrlGlobal);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Lusso-${Date.now()}.jpg`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                triggerNotificationToast("Saved to Storage!");
            } catch (e) { triggerNotificationToast("Download Blocked"); }
        }

        function copyAssetLinkToClipboard() {
            navigator.clipboard.writeText(activeSelectedAssetUrlGlobal);
            triggerNotificationToast("URL Copied!");
        }

        // --- UPLOAD PIPELINE PROCESSOR ---
        let selectedFile = null;
        function processLocalFileSelection(input) {
            if(input.files[0]) {
                selectedFile = input.files[0];
                document.getElementById('formLiveImagePreview').src = URL.createObjectURL(selectedFile);
                document.getElementById('formLiveImagePreview').classList.remove('hidden');
            }
        }

        async function handleLocalFormUploadSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('formSubmitBtn');
            const title = document.getElementById('formUploadTitle').value;
            
            if(!selectedFile) return alert("Select an image first!");

            btn.disabled = true;
            btn.innerText = "STREAMING...";

            try {
                const fileName = `${Date.now()}_${selectedFile.name}`;
                const { error: stErr } = await supabaseClient.storage.from('wallpapers').upload(fileName, selectedFile);
                if(stErr) throw stErr;

                const { data: urlData } = supabaseClient.storage.from('wallpapers').getPublicUrl(fileName);
                
                const { error: dbErr } = await supabaseClient.from('wallpapers').insert([{ title, image_url: urlData.publicUrl }]);
                if(dbErr) throw dbErr;

                triggerNotificationToast("Published Successfully!");
                closeLeftSliderUploadEngine();
                
                document.getElementById('formUploadTitle').value = "";
                document.getElementById('formLiveImagePreview').classList.add('hidden');
                selectedFile = null;

                initializeApplicationDataEngine();
            } catch (err) {
                alert("Pipeline Error: Check Storage RLS Policies!");
            } finally {
                btn.disabled = false;
                btn.innerText = "PUBLISH ASSET";
            }
        }

        window.onclick = () => document.getElementById('threeDotsMenuBox').classList.add('hidden');
        window.onload = () => initializeApplicationDataEngine();
    </script>
</body>
</html>
