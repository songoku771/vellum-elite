<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vellum Elite - Premium 4K Wallpapers</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Default Smooth Transition Background Colors */
        body { 
            background-color: #ffffff; 
            color: #1e293b; 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* Dynamic Theme classes managed by JS */
        body.theme-white { background-color: #ffffff; color: #1e293b; }
        body.theme-grey { background-color: #f1f5f9; color: #0f172a; }
        body.theme-black { background-color: #0b0f19; color: #f8fafc; }

        /* Card styles adjusting with body text */
        .wp-card { background: transparent; transition: all 0.2s ease; }
        body.theme-black .wp-card h3 { color: #f1f5f9; }
        body.theme-black .wp-card p { color: #94a3b8; }
        
        /* PINTEREST MASONRY GRID SYSTEM */
        .pinterest-grid { columns: 2; column-gap: 16px; }
        @media (min-width: 640px) { .pinterest-grid { columns: 3; column-gap: 20px; } }
        @media (min-width: 1024px) { .pinterest-grid { columns: 4; } }
        @media (min-width: 1280px) { .pinterest-grid { columns: 5; } }
        .pin-card { break-inside: avoid; margin-bottom: 20px; display: inline-block; width: 100%; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="theme-white">

    <!-- COPIED TOAST -->
    <div id="shareToast" class="fixed bottom-5 right-5 bg-neutral-900 text-white font-bold px-6 py-3 rounded-full shadow-2xl z-50 transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none flex items-center gap-2 text-sm">
        <i class="fa-solid fa-circle-check text-emerald-400"></i> Link Copied! Share with your crew!
    </div>

    <!-- MAIN APP WRAPPER INTERFACE -->
    <div class="flex min-h-screen">

        <!-- PINTEREST STYLE LEFT NAVIGATION BAR -->
        <aside class="hidden md:flex flex-col items-center justify-between py-6 px-4 border-r border-slate-200/60 w-20 sticky top-0 h-screen z-40 bg-inherit">
            <div class="flex flex-col items-center gap-6 w-full">
                <div onclick="resetToDashboard()" class="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center text-white text-xl font-black cursor-pointer shadow-md hover:bg-red-700 transition-all">
                    V
                </div>
                <button onclick="resetToDashboard()" class="w-12 h-12 rounded-xl flex items-center justify-center text-slate-500 hover:text-slate-900 hover:bg-slate-100 transition-all cursor-pointer">
                    <i class="fa-solid fa-house text-lg"></i>
                </button>
                <button onclick="alert('Explore feature launching next build!')" class="w-12 h-12 rounded-xl flex items-center justify-center text-slate-500 hover:text-slate-900 hover:bg-slate-100 transition-all cursor-pointer">
                    <i class="fa-solid fa-compass text-lg"></i>
                </button>
            </div>
            <div class="flex flex-col items-center gap-4">
                <button onclick="alert('Notifications panel!')" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-400 hover:text-slate-800 transition-all">
                    <i class="fa-solid fa-bell text-lg"></i>
                </button>
                <button onclick="alert('Direct messages open!')" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-400 hover:text-slate-800 transition-all">
                    <i class="fa-solid fa-comment-dots text-lg"></i>
                </button>
            </div>
        </aside>

        <!-- RIGHT SIDE: CONTENT STREAM CONTAINER -->
        <div class="flex-1 flex flex-col min-w-0 bg-inherit">

            <!-- HEADER BAR NAVBAR -->
            <nav class="sticky top-0 z-40 px-4 md:px-8 py-4 flex justify-between items-center bg-inherit border-b border-slate-200/40 backdrop-blur-md">
                <div class="flex items-center gap-3 md:hidden cursor-pointer" onclick="resetToDashboard()">
                    <i class="fa-solid fa-wand-magic-sparkles text-red-600 text-xl"></i>
                    <span class="text-lg font-black tracking-wider text-red-600">VELLUM</span>
                </div>
                
                <!-- Expanded search alignment mimicking standard profile row design -->
                <div class="hidden md:flex flex-1 max-w-xl mx-4 relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="searchInput" oninput="filterWallpapers()" class="w-full pl-10 pr-4 py-2.5 rounded-full bg-slate-100 border-0 focus:outline-none focus:ring-2 focus:ring-slate-300 text-sm transition-all text-slate-900" placeholder="Search premium vibes...">
                </div>

                <!-- RIGHT CORNER DYNAMIC STATUS PROFILE DROPDOWN -->
                <div id="authStatus" class="relative flex items-center gap-2">
                    <button id="loginBtn" onclick="openAuthModal()" class="px-5 py-2.5 rounded-full bg-red-600 text-white font-bold text-sm shadow-md hover:bg-red-700 transition-all cursor-pointer">Login / Sign Up</button>
                    
                    <!-- AUTHENTICATED PROFILE WRAPPER LAYER -->
                    <div id="userProfileArea" class="hidden flex items-center gap-1.5">
                        <button onclick="toggleProfileDropdown()" class="w-10 h-10 rounded-full p-0.5 shadow-sm cursor-pointer focus:outline-none bg-slate-200 hover:opacity-90 transition-all">
                            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Kira" alt="User Profile" class="w-full h-full rounded-full">
                        </button>
                        
                        <!-- PINTEREST MORE OPTIONS 3-DOTS BUTTON -->
                        <button onclick="toggleProfileDropdown()" class="w-8 h-8 rounded-full flex items-center justify-center text-slate-500 hover:bg-slate-100 transition-all cursor-pointer">
                            <i class="fa-solid fa-chevron-down text-xs"></i>

                        <!-- DROP DOWN PANEL ARCHITECTURE -->
                        <div id="profileDropdown" class="hidden absolute right-0 top-12 w-64 bg-white text-slate-800 rounded-2xl border border-slate-200 shadow-2xl p-3 flex flex-col gap-1.5 z-50">
                            <div class="px-3 py-1.5 text-[11px] font-bold text-slate-400 tracking-wider">CURRENT USER</div>
                            <div id="userDisplayEmail" class="px-3 pb-2 text-xs font-semibold text-slate-600 border-b border-slate-100 truncate">kira@vellum.com</div>
                            
                            <!-- THEME SELECTION BLOCK -->
                            <div class="px-3 pt-2 text-[11px] font-bold text-slate-400 tracking-wider">BACKGROUND INTERFACE</div>
                            <div class="grid grid-cols-3 gap-1 p-1 bg-slate-50 rounded-xl border border-slate-100">
                                <button onclick="changeSiteTheme('white')" class="py-1.5 text-[10px] font-bold rounded-lg border bg-white border-slate-200 text-slate-800 cursor-pointer text-center">White</button>
                                <button onclick="changeSiteTheme('grey')" class="py-1.5 text-[10px] font-bold rounded-lg border bg-slate-200 border-slate-300 text-slate-700 cursor-pointer text-center">Grey</button>
                                <button onclick="changeSiteTheme('black')" class="py-1.5 text-[10px] font-bold rounded-lg border bg-slate-900 border-slate-950 text-white cursor-pointer text-center">Black</button>
                            </div>

                            <div class="border-t border-slate-100 my-1"></div>
                            
                            <button onclick="alert('Editing controls coming tomorrow!')" class="w-full text-left px-3 py-2 rounded-xl text-slate-700 hover:bg-slate-50 text-xs font-semibold transition-all cursor-pointer flex items-center gap-2">
                                <i class="fa-solid fa-sliders text-slate-400"></i> Settings & Options
                            </button>
                            <button onclick="alert('Saved Favorites Storage')" class="w-full text-left px-3 py-2 rounded-xl text-slate-700 hover:bg-slate-50 text-xs font-semibold transition-all cursor-pointer flex items-center gap-2">
                                <i class="fa-solid fa-heart text-red-500"></i> My Liked Wallpapers
                            </button>
                            <button onclick="handleLogout()" class="w-full text-left px-3 py-2 rounded-xl text-red-600 hover:bg-red-50 text-xs font-bold transition-all cursor-pointer flex items-center gap-2 mt-1 border-t border-slate-100 pt-2">
                                <i class="fa-solid fa-arrow-right-from-bracket"></i> Log Out
                            </button>
                        </div>
                    </div>
                </div>
            </nav>

            <!-- VIEW SCREEN 1: CENTRAL EXPLORE STREAM (HOME DASHBOARD) -->
            <div id="dashboardSection" class="w-full flex-1 flex flex-col">
                <!-- Mobile Search Option Bar -->
                <div class="px-4 pt-4 md:hidden">
                    <input type="text" oninput="filterWallpapers()" class="w-full px-4 py-2.5 rounded-full bg-slate-100 text-xs focus:outline-none" placeholder="Search wallpaper trends...">
                </div>

                <!-- CATEGORIES NAVIGATION BAR -->
                <div class="max-w-6xl mx-auto px-4 py-6 overflow-x-auto no-scrollbar flex items-center justify-start md:justify-center gap-2 w-full">
                    <button onclick="selectCategory('all')" id="cat-all" class="cat-btn px-4 py-2 rounded-full bg-slate-900 text-white font-bold text-xs transition-all cursor-pointer">All</button>
                    <button onclick="selectCategory('Anime')" id="cat-Anime" class="cat-btn px-4 py-2 rounded-full bg-slate-100 text-slate-700 font-semibold text-xs hover:bg-slate-200 transition-all cursor-pointer">Anime</button>
                    <button onclick="selectCategory('Gaming')" id="cat-Gaming" class="cat-btn px-4 py-2 rounded-full bg-slate-100 text-slate-700 font-semibold text-xs hover:bg-slate-200 transition-all cursor-pointer">Gaming</button>
                    <button onclick="selectCategory('Cyberpunk')" id="cat-Cyberpunk" class="cat-btn px-4 py-2 rounded-full bg-slate-100 text-slate-700 font-semibold text-xs hover:bg-slate-200 transition-all cursor-pointer">Cyberpunk</button>
                    <button onclick="selectCategory('Cars')" id="cat-Cars" class="cat-btn px-4 py-2 rounded-full bg-slate-100 text-slate-700 font-semibold text-xs hover:bg-slate-200 transition-all cursor-pointer">Cars & Bikes</button>
                </div>

                <!-- MASONRY WORK STREAM GRID -->
                <main class="max-w-[1600px] mx-auto px-4 md:px-8 pb-24 w-full">
                    <div class="pinterest-grid" id="wallpaperContainer">
                        <div class="text-center col-span-full py-12 text-slate-400" id="loadingText">
                            <i class="fa-solid fa-spinner fa-spin text-xl mb-2 text-red-500"></i><br>Loading Vellum Database Grid...
                        </div>
                    </div>
                </main>
            </div>

            <!-- VIEW SCREEN 2: PINTEREST DETAIL ENGINE & SUGGESTIONS PAGE (HIDDEN DEFAULT) -->
            <div id="detailSection" class="hidden w-full flex-1 flex flex-col animate-fade-in px-4 md:px-8 py-6">
                <!-- Back Navigator Row -->
                <div class="max-w-4xl mx-auto w-full mb-4">
                    <button onclick="resetToDashboard()" class="px-4 py-2 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-800 font-bold text-xs flex items-center gap-2 cursor-pointer transition-all">
                        <i class="fa-solid fa-arrow-left"></i> Back to feed
                    </button>
                </div>

                <!-- Main Layout Container Box Structure -->
                <div class="max-w-4xl mx-auto w-full bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm flex flex-col md:flex-row min-h-[500px]">
                    <!-- Left Side Column Image Display Layer -->
                    <div class="w-full md:w-1/2 bg-slate-50 flex items-center justify-center p-4">
                        <img id="detailImg" src="" alt="View Target" class="max-w-full max-h-[70vh] object-contain rounded-2xl shadow-md">
                    </div>
                    
                    <!-- Right Details Column Side Layer -->
                    <div class="w-full md:w-1/2 p-6 md:p-8 flex flex-col justify-between text-slate-800 bg-white">
                        <div>
                            <!-- Action Control Sub-bar line layer -->
                            <div class="flex items-center justify-between mb-6">
                                <div class="flex items-center gap-4 text-slate-500">
                                    <span class="text-sm"><i class="fa-solid fa-eye"></i> <span id="detailViews">0</span></span>
                                    <span class="text-sm"><i class="fa-solid fa-download"></i> <span id="detailDownloads">0</span></span>
                                </div>
                                <button id="saveCollectionBtn" onclick="alert('Saved to your Pinterest board style collection!')" class="bg-red-600 text-white font-bold px-5 py-2.5 rounded-full text-xs hover:bg-red-700 transition-all cursor-pointer">
                                    Save Artwork
                                </button>
                            </div>

                            <span id="detailRes" class="bg-slate-100 text-slate-600 text-[10px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-md border border-slate-200">4K ULTRA RES</span>
                            <h2 id="detailTitleText" class="text-2xl font-black mt-4 tracking-tight leading-tight">Artwork Studio Title</h2>
                            <p class="text-slate-500 text-xs mt-2 leading-relaxed">High fidelity cloud generation synced for custom dynamic backgrounds setup.</p>
                        </div>

                        <!-- Processing Operations Buttons layout block -->
                        <div class="flex flex-col gap-2 mt-8" id="detailActionRow">
                            <!-- Dynamic Content Inserted through core JS rendering engine -->
                        </div>
                    </div>
                </div>

                <!-- DYNAMIC SUGGESTIONS SECTION ("MORE LIKE THIS" VIEW) -->
                <div class="max-w-4xl mx-auto w-full mt-16">
                    <div class="text-center mb-8">
                        <h3 class="text-xl font-black tracking-tight text-slate-800" id="suggestionTitle">More Like This</h3>
                        <div class="w-12 h-1 bg-slate-300 mx-auto mt-2 rounded-full"></div>
                    </div>
                    
                    <!-- Suggestion Output Feed Mount Container -->
                    <div class="pinterest-grid" id="suggestionContainer"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- CLEAN AUTHENTICATION PORTAL OVERLAY CONTAINER -->
    <div id="authModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="w-full max-w-sm bg-white p-6 rounded-3xl relative shadow-2xl text-slate-800 border border-slate-100">
            <button onclick="closeAuthModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 cursor-pointer"><i class="fa-solid fa-xmark text-lg"></i></button>
            <h2 class="text-xl font-black text-center mb-6 tracking-tight text-red-600">SIGN IN TO VELLUM</h2>
            <form class="space-y-4" onsubmit="handleAuthSubmit(event)">
                <div>
                    <label class="text-[10px] font-bold tracking-wider text-slate-400 uppercase block mb-1.5">Email address</label>
                    <input type="email" id="authEmail" required class="w-full px-3 py-2.5 rounded-xl bg-slate-50 border border-slate-200 text-sm focus:outline-none focus:ring-1 focus:ring-red-500" placeholder="kira@example.com">
                </div>
                <div>
                    <label class="text-[10px] font-bold tracking-wider text-slate-400 uppercase block mb-1.5">Password</label>
                    <input type="password" required class="w-full px-3 py-2.5 rounded-xl bg-slate-50 border border-slate-200 text-sm focus:outline-none focus:ring-1 focus:ring-red-500" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full py-3 rounded-xl bg-red-600 text-white font-bold text-sm tracking-wide shadow-md hover:bg-red-700 transition-all mt-2 cursor-pointer">Continue</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://ezfxgevsjxfyluxprkls.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_jlyevQqezPjFmlqar5pmNw_EV8DTtVL"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allWallpapers = []; 
        let selectedCat = 'all';

        // THEME DISPATCH CONTROLLER ENGINE
        function changeSiteTheme(themeName) {
            const body = document.body;
            body.className = ''; // wipe clear all themes
            
            if (themeName === 'white') body.classList.add('theme-white');
            if (themeName === 'grey') body.classList.add('theme-grey');
            if (themeName === 'black') body.classList.add('theme-black');
            
            localStorage.setItem('vellum_user_theme', themeName);
        }

        // BOOTSTRAP USER CONFIGURATIONS
        function loadSavedUserTheme() {
            const savedTheme = localStorage.getItem('vellum_user_theme') || 'white';
            changeSiteTheme(savedTheme);
        }

        function checkUserSession() {
            const user = localStorage.getItem('vellum_logged_in_user');
            const loginBtn = document.getElementById('loginBtn');
            const userProfileArea = document.getElementById('userProfileArea');
            const userEmailDisplay = document.getElementById('userDisplayEmail');
            
            if (user) {
                if(loginBtn) loginBtn.classList.add('hidden');
                if(userProfileArea) userProfileArea.classList.remove('hidden');
                if(userEmailDisplay) userEmailDisplay.innerText = user;
            } else {
                if(loginBtn) loginBtn.classList.remove('hidden');
                if(userProfileArea) userProfileArea.classList.add('hidden');
            }
        }

        // DATA FETCHER CONTROLLER FROM BACKEND
        async function fetchWallpapers() {
            const container = document.getElementById('wallpaperContainer');
            const loadingEl = document.getElementById('loadingText');
            
            try {
                const { data: wallpapers, error } = await supabaseClient
                    .from('wallpapers')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                if (loadingEl) loadingEl.style.display = 'none';

                allWallpapers = wallpapers || [];
                renderWallpapers(allWallpapers);
                
                // Boot session check elements
                checkUserSession();
                loadSavedUserTheme();

            } catch (error) {
                console.error('Core Grid Load Error:', error);
                if (loadingEl) loadingEl.style.display = 'none';
                if (container) container.innerHTML = `<div class="text-center text-red-500 col-span-full py-10 w-full">Grid Stream offline. Try refreshing.</div>`;
            }
        }

        // RENDERING MAIN WALLPAPER GALLERY GRID
        function renderWallpapers(list) {
            const container = document.getElementById('wallpaperContainer');
            container.innerHTML = '';

            if (list.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-400 col-span-full py-12 w-full"><p>No trends matches found.</p></div>`;
                return;
            }

            list.forEach(wp => {
                const card = document.createElement('div');
                card.className = "pin-card bg-inherit overflow-hidden group cursor-pointer rounded-2xl";
                
                // Route target handler conversion directly inside stream click event
                card.addEventListener('click', () => showPinterestDetailView(wp.id));

                card.innerHTML = `
                    <div class="relative w-full overflow-hidden rounded-2xl bg-slate-100 shadow-sm group-hover:shadow-md transition-shadow duration-300">
                        <img src="${wp.image_url || ''}" alt="${wp.title}" class="w-full h-auto object-cover group-hover:opacity-90 transition-opacity duration-300" loading="lazy">
                        <div class="absolute inset-0 bg-black/10 opacity-0 group-hover:opacity-100 transition-opacity duration-200 flex items-end p-3">
                            <button class="ml-auto bg-red-600 text-white font-bold text-xs px-3 py-1.5 rounded-full shadow-md">Open</button>
                        </div>
                    </div>
                    <div class="pt-2 px-1">
                        <h3 class="text-xs font-bold text-slate-800 tracking-tight truncate">${wp.title}</h3>
                        <p class="text-[10px] text-slate-400 font-semibold mt-0.5"><i class="fa-solid fa-cloud-arrow-down"></i> ${wp.downloads || 0} saves</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // PINTEREST STYLE DYNAMIC DETAIL SCREEN NAVIGATOR VIEW WITH INTEGRATED DISCOVERY SUGGESTIONS 
        async function showPinterestDetailView(id) {
            const wp = allWallpapers.find(item => item.id === id);
            if (!wp) return;

            // Route view toggle operations
            document.getElementById('dashboardSection').classList.add('hidden');
            const detailSec = document.getElementById('detailSection');
            detailSec.classList.remove('hidden');
            
            // Force reset back to topmost level layer
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // Mount element parameters securely
            document.getElementById('detailImg').src = wp.image_url;
            document.getElementById('detailTitleText').innerText = wp.title;
            document.getElementById('detailRes').innerText = wp.resolution || '4K ULTRA ULTRA';
            document.getElementById('detailViews').innerText = (wp.views || 0) + 1;
            document.getElementById('detailDownloads').innerText = wp.downloads || 0;

            const actionRow = document.getElementById('detailActionRow');
            actionRow.innerHTML = `
                <button onclick="triggerDownload('${wp.id}', '${wp.image_url}', '${wp.title}')" class="w-full py-3.5 rounded-full bg-slate-900 text-white font-black text-xs hover:bg-slate-800 shadow-lg flex items-center justify-center gap-2 cursor-pointer transition-colors">
                    <i class="fa-solid fa-download"></i> Download Premium Resource
                </button>
                <button onclick="copyShareLink('${wp.id}')" class="w-full py-3 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-800 font-bold text-xs flex items-center justify-center gap-2 cursor-pointer transition-colors">
                    <i class="fa-solid fa-link text-slate-500"></i> Copy Link
                </button>
            `;

            // RENDER SUGGESTED DISCOVERY IMAGES UNDER THE POST
            renderSuggestions(wp.category, wp.id);

            // Background update tracking counter view triggers 
            try {
                await supabaseClient.from('wallpapers').update({ views: (wp.views || 0) + 1 }).eq('id', id);
                wp.views = (wp.views || 0) + 1; 
            } catch(e) {}
        }

        // RENDER SIMILAR WALLPAPERS AT BOTTOM
        function renderSuggestions(category, currentId) {
            const suggestionBox = document.getElementById('suggestionContainer');
            suggestionBox.innerHTML = '';

            // Filter wallpapers belonging to the same category, excluding the active item
            const matchingList = allWallpapers.filter(wp => wp.category === category && wp.id !== currentId);
            
            // Fallback content if insufficient exact categorizations found 
            const finalSuggestionList = matchingList.length > 0 ? matchingList : allWallpapers.filter(wp => wp.id !== currentId).slice(0, 6);

            finalSuggestionList.forEach(wp => {
                const card = document.createElement('div');
                card.className = "pin-card bg-inherit overflow-hidden group cursor-pointer rounded-2xl";
                card.addEventListener('click', () => showPinterestDetailView(wp.id));

                card.innerHTML = `
                    <div class="relative w-full overflow-hidden rounded-2xl bg-slate-100 shadow-sm">
                        <img src="${wp.image_url || ''}" alt="${wp.title}" class="w-full h-auto object-cover group-hover:opacity-90 transition-opacity duration-200" loading="lazy">
                    </div>
                    <div class="pt-2 px-1">
                        <h4 class="text-xs font-bold text-slate-800 truncate">${wp.title}</h4>
                    </div>
                `;
                suggestionBox.appendChild(card);
            });
        }

        function resetToDashboard() {
            document.getElementById('detailSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            window.scrollTo({ top: 0 });
        }

        // NAVIGATION HANDLERS DISPATCHERS
        function toggleProfileDropdown() {
            document.getElementById('profileDropdown').classList.toggle('hidden');
        }

        function handleAuthSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('authEmail').value;
            localStorage.setItem('vellum_logged_in_user', email);
            closeAuthModal();
            checkUserSession();
        }

        function handleLogout() {
            localStorage.removeItem('vellum_logged_in_user');
            document.getElementById('profileDropdown').classList.add('hidden');
            checkUserSession();
        }

        function copyShareLink(id) {
            navigator.clipboard.writeText(window.location.href).then(() => {
                const toast = document.getElementById('shareToast');
                toast.classList.remove('translate-y-20', 'opacity-0');
                toast.classList.add('translate-y-0', 'opacity-100');
                setTimeout(() => {
                    toast.classList.remove('translate-y-0', 'opacity-100');
                    toast.classList.add('translate-y-20', 'opacity-0');
                }, 2500);
            });
        }

        // LIVE FILTER INPUT TRACKERS
        function filterWallpapers() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const filtered = allWallpapers.filter(wp => {
                const matchesSearch = wp.title.toLowerCase().includes(query);
                const wpCategory = wp.category ? wp.category.toLowerCase() : 'all';
                return matchesSearch && (selectedCat === 'all' || wpCategory === selectedCat.toLowerCase());
            });
            renderWallpapers(filtered);
        }

        function selectCategory(category) {
            selectedCat = category;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.className = "cat-btn px-4 py-2 rounded-full bg-slate-100 text-slate-700 font-semibold text-xs hover:bg-slate-200 cursor-pointer";
            });
            const activeBtn = document.getElementById(`cat-${category}`);
            if (activeBtn) activeBtn.className = "cat-btn px-4 py-2 rounded-full bg-slate-900 text-white font-bold text-xs cursor-pointer";
            filterWallpapers();
        }

        // CORE STORAGE ACTIONS DOWNLOAD
        async function triggerDownload(id, imageUrl, title) {
            try {
                await supabaseClient.rpc('increment_downloads', { row_id: id });
                const wp = allWallpapers.find(item => item.id === id);
                if(wp) { 
                    wp.downloads = (wp.downloads || 0) + 1; 
                    const viewsEl = document.getElementById('detailDownloads');
                    if(viewsEl) viewsEl.innerText = wp.downloads;
                }
            } catch (e) {}

            try {
                const response = await fetch(imageUrl);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `${title.replace(/\s+/g, '_')}_Vellum.jpg`; 
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
            } catch (error) { window.open(imageUrl, '_blank'); }
        }

        function openAuthModal() { document.getElementById('authModal').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('authModal').classList.add('hidden'); }

        // Click outside closes dropdown menu automatically
        window.addEventListener('click', function(e){
            const userArea = document.getElementById('userProfileArea');
            const drop = document.getElementById('profileDropdown');
            if (userArea && !userArea.contains(e.target) && drop) {
                drop.classList.add('hidden');
            }
        });

        window.onload = fetchWallpapers;
    </script>
</body>
</html>
